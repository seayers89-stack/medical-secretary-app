name: Sync Healix fee schedule

# Manual-only for now — re-run this from the Actions tab each month
# ("Run workflow" button) until SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY
# are added as repo secrets, at which point the schedule trigger below can
# be restored for automatic monthly runs.
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync-healix-fees.js
