project_id = "veyn"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = []
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[edge_runtime]
enabled = true

[functions.sync-healix-fees]
# Browsers send the preflight OPTIONS request without the Authorization
# header, so the platform-level JWT gate (default on) rejects it before our
# code ever runs. We do our own admin check inside the function using the
# caller's token from the real POST request, so it's safe to disable here.
verify_jwt = false

[analytics]
enabled = false
