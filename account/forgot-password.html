<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://api.resend.com https://api.stripe.com; frame-src https://js.stripe.com;">
<title>Reset your password — Veyn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
<style>

  :root{
    --ink:#2E3F54;
    --paper:#F7F4ED;
    --gold:#B8924A;
    --slate:#5C6470;
    --green:#3F6B4F;
    --white:#FFFFFF;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Special Elite', cursive;
    -webkit-font-smoothing:antialiased;
  }
  a{ color:inherit; text-decoration:none; }

  header{
    position:sticky; top:0; z-index:50;
    background:rgba(247,244,237,0.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(46,63,84,0.08);
  }
  .nav{ display:flex; align-items:center; justify-content:space-between; padding:20px 32px; max-width:1180px; margin:0 auto; }
  .nav-left{ display:flex; align-items:center; gap:48px; }
  .logo{ font-family:'Cormorant Garamond', serif; font-weight:600; font-size:24px; display:flex; align-items:center; gap:8px; }
  .logo .dot{ width:7px; height:7px; border-radius:50%; background:var(--gold); display:inline-block; }
  .nav-links{ display:flex; flex-wrap:wrap; row-gap:8px; column-gap:20px; font-size:14px; font-weight:500; color:var(--slate); }
  .nav-links a:hover{ color:var(--ink); }
  @media (max-width:760px){ .nav-links{ display:none; } }
  .btn-login{
    font-family:'Special Elite', cursive; font-size:14px; font-weight:600; color:var(--ink);
    border:1.5px solid rgba(46,63,84,0.2); padding:9px 20px; border-radius:7px; cursor:pointer; background:none;
  }

  .auth-wrap{ display:flex; align-items:center; justify-content:center; padding:80px 32px 100px; min-height:60vh; }
  .auth-card{
    width:100%; max-width:420px; background:var(--white); border:1px solid rgba(46,63,84,0.08);
    border-radius:20px; padding:44px 40px;
  }
  .auth-eyebrow{
    font-family:'Special Elite', cursive; font-size:11.5px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--gold); margin-bottom:14px;
  }
  .auth-card h1{ font-family:'Cormorant Garamond', serif; font-weight:600; font-size:26px; margin-bottom:10px; }
  .auth-sub{ color:var(--slate); font-size:14.5px; line-height:1.6; margin-bottom:30px; }

  .field{ margin-bottom:22px; }
  .field label{ display:block; font-size:13px; font-weight:600; margin-bottom:7px; color:var(--ink); }
  .field input{
    width:100%; padding:12px 14px; font-family:'Special Elite', cursive; font-size:14.5px;
    border:1.5px solid rgba(46,63,84,0.15); border-radius:8px; background:var(--paper); color:var(--ink);
  }
  .field input:focus{ outline:none; border-color:var(--gold); }

  .btn{
    font-family:'Special Elite', cursive; font-weight:600; font-size:15px; padding:14px 28px;
    border-radius:8px; cursor:pointer; border:none; width:100%; text-align:center;
    background:var(--ink); color:var(--paper);
  }
  .btn:disabled{ opacity:0.6; cursor:not-allowed; }

  .auth-switch{ text-align:center; font-size:14px; color:var(--slate); margin-top:20px; }
  .auth-switch a{ color:var(--gold); font-weight:600; }
  .auth-switch a:hover{ text-decoration:underline; }

  #form-status{ display:none; font-size:13.5px; padding:12px 14px; border-radius:8px; margin-bottom:18px; }
  #form-status.error{ display:block; background:rgba(193,68,68,0.08); border:1px solid rgba(193,68,68,0.3); color:#a33; }
  #form-status.success{ display:block; background:rgba(63,107,79,0.08); border:1px solid rgba(63,107,79,0.3); color:var(--green); }

  footer{ background:var(--ink); color:rgba(247,244,237,0.7); padding:40px 32px 28px; }
  .foot-bottom{ max-width:1180px; margin:0 auto; font-size:12.5px; color:rgba(247,244,237,0.45); display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; }

</style>
<link rel="stylesheet" href="../veyn-buttons.css"></head>
<body>

<header>
  <div class="nav">
    <div class="nav-left">
      <a href="../index.html" class="logo"><span class="dot"></span>veyn</a>
      <nav class="nav-links">
        <a href="../index.html">Home</a>
        <a href="../veyn-for-secretaries.html">For Secretaries</a>
        <a href="../veyn-for-consultants.html">For Consultants</a>
        <a href="../veyn-about.html">About</a>
      </nav>
    </div>
    <a href="login.html" class="btn-login">Log in</a>
  </div>
</header>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-eyebrow">Reset password</div>
    <h1>Forgot your password?</h1>
    <p class="auth-sub">Enter the email address on your account and we'll send you a link to set a new password.</p>

    <p id="form-status"></p>

    <form id="reset-form">
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <button type="submit" class="btn" id="submit-btn">Send reset link</button>
    </form>

    <div class="auth-switch"><a href="login.html">Back to log in</a></div>
  </div>
</div>

<footer>
  <div class="foot-bottom">
    <span>© 2026 Veyn. All rights reserved.</span>
    <span>Founded by a medical secretary, not a market gap.</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0/dist/umd/supabase.js" integrity="sha384-3wY11tldQ5+yWqAvmTN4XtQvnjoTva0cV15O/O/O5NTtp0ivVopSzLOzsVXWZse9" crossorigin="anonymous"></script>
<script src="supabase-config.js"></script>
<script>
  const form = document.getElementById('reset-form');
  const statusEl = document.getElementById('form-status');
  const submitBtn = document.getElementById('submit-btn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    statusEl.style.display = 'none';
    statusEl.className = '';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending…';

    const email = document.getElementById('email').value.trim();
    const redirectTo = `${window.location.origin}${window.location.pathname.replace('forgot-password.html', 'reset-password.html')}`;

    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, { redirectTo });

    submitBtn.disabled = false;
    submitBtn.textContent = 'Send reset link';

    // Always show the same message, whether or not the email exists —
    // this avoids leaking which addresses are registered.
    statusEl.textContent = "If an account exists for that email, we've sent a link to reset your password.";
    statusEl.className = 'success';
    form.reset();
  });
</script>

<script src="../mobile-nav.js"></script>
<script src="../cookie-consent.js"></script>
</body>
</html>
