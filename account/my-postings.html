<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My postings — Veyn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

  :root{
    --ink:#1B2430;
    --paper:#F7F4ED;
    --gold:#B8924A;
    --slate:#5C6470;
    --green:#3F6B4F;
    --white:#FFFFFF;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{ color:inherit; text-decoration:none; }

  header{
    position:sticky; top:0; z-index:50;
    background:rgba(247,244,237,0.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(27,36,48,0.08);
  }
  .nav{ display:flex; align-items:center; justify-content:space-between; padding:20px 32px; max-width:1180px; margin:0 auto; }
  .nav-left{ display:flex; align-items:center; gap:48px; }
  .nav-links{ display:flex; gap:36px; font-size:14px; font-weight:500; color:var(--slate); }
  .nav-links a:hover{ color:var(--ink); }
  .nav-links a.active{ color:var(--ink); border-bottom:2px solid var(--gold); padding-bottom:2px; }
  @media (max-width:760px){ .nav-links{ display:none; } }
  .logo{ font-family:'Fraunces', serif; font-weight:600; font-size:24px; display:flex; align-items:center; gap:8px; }
  .logo .dot{ width:7px; height:7px; border-radius:50%; background:var(--gold); display:inline-block; }
  .btn-login{
    font-family:'Inter', sans-serif; font-size:14px; font-weight:600; color:var(--ink);
    border:1.5px solid rgba(27,36,48,0.2); padding:9px 20px; border-radius:7px;
  }

  .wrap{ max-width:760px; margin:0 auto; padding:48px 32px 100px; }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace; font-size:11.5px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--gold); margin-bottom:14px;
  }
  h1{ font-family:'Fraunces', serif; font-weight:600; font-size:30px; margin-bottom:10px; }
  .sub{ color:var(--slate); font-size:14.5px; line-height:1.6; margin-bottom:32px; }

  .job-card{
    background:var(--white); border:1px solid rgba(27,36,48,0.08); border-radius:16px;
    padding:24px 26px; margin-bottom:14px;
  }
  .job-title{ font-family:'Fraunces', serif; font-weight:600; font-size:18px; margin-bottom:4px; }
  .job-meta{ font-size:13px; color:var(--slate); margin-bottom:16px; }
  .respondents-label{
    font-family:'IBM Plex Mono', monospace; font-size:10.5px; letter-spacing:0.06em; text-transform:uppercase;
    color:var(--slate); margin-bottom:8px; display:block;
  }
  .respondent-row{
    display:flex; justify-content:space-between; align-items:center; padding:10px 0;
    border-top:1px solid rgba(27,36,48,0.06); font-size:14px;
  }
  .respondent-row:first-of-type{ border-top:none; }
  .open-thread{ font-size:13px; font-weight:600; color:var(--gold); }

  .job-status-badge{
    display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.05em;
    text-transform:uppercase; padding:3px 10px; border-radius:999px; font-weight:500; margin-bottom:12px;
  }
  .job-status-badge.open{ background:rgba(63,107,79,0.1); color:#3F6B4F; }
  .job-status-badge.closed{ background:rgba(92,100,112,0.1); color:var(--slate); }
  .job-status-badge.unpublished{ background:rgba(184,146,74,0.12); color:#8F6F36; }
  .job-card.closed{ opacity:0.65; }
  .job-card.unpublished{ opacity:0.75; }
  .card-actions{ display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; }
  .btn-action{
    font-family:'Inter',sans-serif; font-size:13px; font-weight:600; padding:8px 16px;
    border-radius:7px; border:1.5px solid rgba(27,36,48,0.2); background:none;
    color:var(--ink); cursor:pointer;
  }
  .btn-action:hover{ background:rgba(27,36,48,0.05); }
  .btn-action.danger{ border-color:rgba(193,57,60,0.3); color:#a33; }
  .btn-action.danger:hover{ background:rgba(193,57,60,0.05); }
  .edit-form{
    display:none; margin-top:18px; padding-top:18px;
    border-top:1px solid rgba(27,36,48,0.08);
  }
  .edit-form.open{ display:block; }
  .edit-field{ margin-bottom:14px; }
  .edit-field label{ display:block; font-size:12px; font-weight:600; margin-bottom:5px; color:var(--slate); text-transform:uppercase; letter-spacing:0.04em; }
  .edit-field input, .edit-field textarea{
    width:100%; padding:10px 13px; font-family:'Inter',sans-serif; font-size:14px;
    border:1.5px solid rgba(27,36,48,0.15); border-radius:8px; background:var(--paper); color:var(--ink);
  }
  .edit-field textarea{ resize:vertical; min-height:80px; }
  .edit-field input:focus, .edit-field textarea:focus{ outline:none; border-color:var(--gold); }
  .edit-save-row{ display:flex; gap:10px; align-items:center; }
  .btn-save{
    font-family:'Inter',sans-serif; font-size:13.5px; font-weight:600; padding:10px 20px;
    border-radius:8px; border:none; background:var(--ink); color:var(--paper); cursor:pointer;
  }
  .btn-save:disabled{ opacity:0.55; cursor:not-allowed; }
  .edit-status{ font-size:13px; color:var(--green); display:none; }
  .empty-state{ text-align:center; padding:60px 20px; color:var(--slate); font-size:14.5px; }
  #loading{ color:var(--slate); font-size:14.5px; }

</style>
</head>
<body>

<header>
  <div class="nav">
    <div class="nav-left">
      <a href="../index.html" class="logo"><span class="dot"></span>veyn</a>
      <nav class="nav-links" id="account-nav">
        <a href="../index.html">Home</a>
        <a href="../veyn-for-secretaries.html">For Secretaries</a>
        <a href="../veyn-for-consultants.html">For Consultants</a>
        <a href="../veyn-about.html">About</a>
      </nav>
    </div>
    <button class="btn-login" id="logout-btn">Log out</button>
  </div>
</header>

<div class="wrap">
  <div class="eyebrow">Job board</div>
  <h1>My postings</h1>
  <p class="sub">Every respondent below is already unlocked for messaging — no extra per-contact fee.</p>

  <p id="loading">Loading your postings…</p>
  <div id="jobs"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="account-nav.js"></script>
<script>
  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  (async () => {
    const navResult = await renderAccountNav(document.getElementById('account-nav'), supabaseClient, 'my-postings');
    if (!navResult) {
      window.location.href = 'login.html';
      return;
    }
    const userId = navResult.session.user.id;

    const { data: jobs, error } = await supabaseClient
      .from('job_postings')
      .select('*')
      .eq('consultant_id', userId)
      .order('created_at', { ascending: false });

    const loading = document.getElementById('loading');
    const jobsEl = document.getElementById('jobs');
    loading.style.display = 'none';

    if (error) {
      jobsEl.innerHTML = `<div class="empty-state">Could not load postings: ${error.message}</div>`;
      return;
    }

    if (!jobs || jobs.length === 0) {
      jobsEl.innerHTML = `<div class="empty-state">You haven't posted a role yet. <a href="post-job.html" style="text-decoration:underline;">Post one for £29</a>.</div>`;
      return;
    }

    for (const job of jobs) {
      const card = document.createElement('div');
      const statusClass = job.status === 'closed' ? 'closed' : job.status === 'unpublished' ? 'unpublished' : '';
      card.className = `job-card${statusClass ? ' ' + statusClass : ''}`;
      card.dataset.jobId = job.id;
      const metaParts = [job.specialty, job.location, job.day_rate].filter(Boolean);
      const badgeLabel = job.status === 'closed' ? 'Position filled' : job.status === 'unpublished' ? 'Unpublished' : 'Open';

      const activeActions = job.status === 'open' ? `
        <button class="btn-action btn-edit">Edit</button>
        <button class="btn-action btn-unpublish">Unpublish</button>
        <button class="btn-action danger btn-close">Mark as filled</button>
      ` : job.status === 'unpublished' ? `
        <button class="btn-action btn-edit">Edit</button>
        <button class="btn-action btn-republish">Republish</button>
        <button class="btn-action danger btn-close">Mark as filled</button>
      ` : '';

      card.innerHTML = `
        <div class="job-title">${job.title}</div>
        <div class="job-meta">${metaParts.join(' · ')}</div>
        <span class="job-status-badge ${job.status}">${badgeLabel}</span>
        <span class="respondents-label">Respondents</span>
        <div class="respondents-list">Loading…</div>
        <div class="card-actions">${activeActions}</div>
        <div class="edit-form">
          <div class="edit-field"><label>Job title</label><input type="text" class="ef-title" value="${escapeHtml(job.title)}"></div>
          <div class="edit-field"><label>Specialty</label><input type="text" class="ef-specialty" value="${escapeHtml(job.specialty || '')}"></div>
          <div class="edit-field"><label>Location</label><input type="text" class="ef-location" value="${escapeHtml(job.location || '')}"></div>
          <div class="edit-field"><label>Day rate</label><input type="text" class="ef-day-rate" value="${escapeHtml(job.day_rate || '')}"></div>
          <div class="edit-field"><label>Description</label><textarea class="ef-description">${escapeHtml(job.description || '')}</textarea></div>
          <div class="edit-save-row">
            <button class="btn-save btn-save-edit">Save changes</button>
            <button class="btn-action btn-cancel-edit">Cancel</button>
            <span class="edit-status">Saved</span>
          </div>
        </div>
      `;
      jobsEl.appendChild(card);

      const { data: responses } = await supabaseClient
        .from('job_responses')
        .select('secretary_id, created_at')
        .eq('job_id', job.id)
        .order('created_at', { ascending: false });

      const listEl = card.querySelector('.respondents-list');

      if (!responses || responses.length === 0) {
        listEl.innerHTML = `<div style="color:var(--slate); font-size:13.5px;">No respondents yet.</div>`;
        continue;
      }

      const secretaryIds = responses.map(r => r.secretary_id);
      const { data: secretaries } = await supabaseClient
        .from('profiles')
        .select('id, first_name, last_name')
        .in('id', secretaryIds);

      const nameById = {};
      (secretaries || []).forEach(s => { nameById[s.id] = `${s.first_name} ${s.last_name}`; });

      listEl.innerHTML = responses.map(r => `
        <div class="respondent-row">
          <span>${nameById[r.secretary_id] || 'Unknown'}</span>
          <a class="open-thread" href="thread.html?consultant_id=${userId}&secretary_id=${r.secretary_id}">Message →</a>
        </div>
      `).join('');
    }
    async function updateJobStatus(jobId, status) {
      const { error } = await supabaseClient.from('job_postings').update({ status }).eq('id', jobId);
      return error;
    }

    jobsEl.addEventListener('click', async (e) => {
      const card = e.target.closest('.job-card');
      if (!card) return;
      const jobId = card.dataset.jobId;

      // Edit
      if (e.target.closest('.btn-edit')) {
        card.querySelector('.edit-form').classList.toggle('open');
        return;
      }

      // Cancel edit
      if (e.target.closest('.btn-cancel-edit')) {
        card.querySelector('.edit-form').classList.remove('open');
        return;
      }

      // Save edit
      if (e.target.closest('.btn-save-edit')) {
        const btn = e.target.closest('.btn-save-edit');
        const statusEl = card.querySelector('.edit-status');
        btn.disabled = true;
        btn.textContent = 'Saving…';
        const updates = {
          title: card.querySelector('.ef-title').value.trim(),
          specialty: card.querySelector('.ef-specialty').value.trim(),
          location: card.querySelector('.ef-location').value.trim(),
          day_rate: card.querySelector('.ef-day-rate').value.trim(),
          description: card.querySelector('.ef-description').value.trim(),
        };
        const { error } = await supabaseClient.from('job_postings').update(updates).eq('id', jobId);
        btn.disabled = false;
        btn.textContent = 'Save changes';
        if (error) { alert('Could not save: ' + error.message); return; }
        card.querySelector('.job-title').textContent = updates.title;
        const metaParts = [updates.specialty, updates.location, updates.day_rate].filter(Boolean);
        card.querySelector('.job-meta').textContent = metaParts.join(' · ');
        statusEl.style.display = 'inline';
        setTimeout(() => { statusEl.style.display = 'none'; }, 2500);
        return;
      }

      // Unpublish
      if (e.target.closest('.btn-unpublish')) {
        const btn = e.target.closest('.btn-unpublish');
        btn.disabled = true;
        const error = await updateJobStatus(jobId, 'unpublished');
        if (error) { btn.disabled = false; alert('Could not unpublish: ' + error.message); return; }
        card.classList.remove('open'); card.classList.add('unpublished');
        card.querySelector('.job-status-badge').textContent = 'Unpublished';
        card.querySelector('.job-status-badge').className = 'job-status-badge unpublished';
        card.querySelector('.card-actions').innerHTML = `
          <button class="btn-action btn-edit">Edit</button>
          <button class="btn-action btn-republish">Republish</button>
          <button class="btn-action danger btn-close">Mark as filled</button>
        `;
        return;
      }

      // Republish
      if (e.target.closest('.btn-republish')) {
        const btn = e.target.closest('.btn-republish');
        btn.disabled = true;
        const error = await updateJobStatus(jobId, 'open');
        if (error) { btn.disabled = false; alert('Could not republish: ' + error.message); return; }
        card.classList.remove('unpublished');
        card.querySelector('.job-status-badge').textContent = 'Open';
        card.querySelector('.job-status-badge').className = 'job-status-badge open';
        card.querySelector('.card-actions').innerHTML = `
          <button class="btn-action btn-edit">Edit</button>
          <button class="btn-action btn-unpublish">Unpublish</button>
          <button class="btn-action danger btn-close">Mark as filled</button>
        `;
        return;
      }

      // Close / mark as filled
      if (e.target.closest('.btn-close')) {
        if (!confirm('Mark this position as filled? This cannot be undone.')) return;
        const btn = e.target.closest('.btn-close');
        btn.disabled = true;
        const error = await updateJobStatus(jobId, 'closed');
        if (error) { btn.disabled = false; alert('Could not close listing: ' + error.message); return; }
        card.classList.remove('unpublished'); card.classList.add('closed');
        card.querySelector('.job-status-badge').textContent = 'Position filled';
        card.querySelector('.job-status-badge').className = 'job-status-badge closed';
        card.querySelector('.card-actions').innerHTML = '';
        return;
      }
    });
  })();

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    window.location.href = 'login.html';
  });
</script>

<script src="../mobile-nav.js"></script>
</body>
</html>
