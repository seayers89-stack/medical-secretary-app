<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Training module — Veyn Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

  :root{
    --ink:#1B2430;
    --paper:#F7F4ED;
    --gold:#B8924A;
    --slate:#5C6470;
    --green:#3F6B4F;
    --white:#FFFFFF;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{ color:inherit; text-decoration:none; }

  header{
    position:sticky; top:0; z-index:50;
    background:rgba(247,244,237,0.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(27,36,48,0.08);
  }
  .nav{ display:flex; align-items:center; justify-content:space-between; padding:20px 32px; max-width:1180px; margin:0 auto; }
  .nav-left{ display:flex; align-items:center; gap:48px; }
  .logo{ font-family:'Fraunces', serif; font-weight:600; font-size:24px; display:flex; align-items:center; gap:8px; }
  .logo .dot{ width:7px; height:7px; border-radius:50%; background:var(--gold); display:inline-block; }
  .nav-links{ display:flex; gap:36px; font-size:14px; font-weight:500; color:var(--slate); }
  .nav-links a:hover{ color:var(--ink); }
  .nav-links a.active{ color:var(--ink); border-bottom:2px solid var(--gold); padding-bottom:2px; }
  @media (max-width:760px){ .nav-links{ display:none; } }
  .btn-login{
    font-family:'Inter', sans-serif; font-size:14px; font-weight:600; color:var(--ink);
    border:1.5px solid rgba(27,36,48,0.2); padding:9px 20px; border-radius:7px; cursor:pointer; background:none;
  }

  .wrap{ max-width:720px; margin:0 auto; padding:48px 32px 100px; }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace; font-size:11.5px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--gold); margin-bottom:14px;
  }
  h1{ font-family:'Fraunces', serif; font-weight:600; font-size:30px; margin-bottom:10px; }
  .aim{ color:var(--slate); font-size:14.5px; line-height:1.6; margin-bottom:32px; }

  .action-row{ display:flex; gap:12px; margin-bottom:36px; flex-wrap:wrap; }
  .action-btn{
    font-family:'Inter', sans-serif; font-weight:600; font-size:14px; padding:11px 20px;
    border-radius:8px; cursor:pointer; border:1.5px solid var(--ink); background:none; color:var(--ink);
  }
  .action-btn.primary{ background:var(--gold); border-color:var(--gold); color:var(--ink); }

  .section-card{
    background:var(--white); border:1px solid rgba(27,36,48,0.08); border-radius:16px;
    padding:26px 30px; margin-bottom:14px;
  }
  .section-card h2{ font-family:'Fraunces', serif; font-weight:600; font-size:18px; margin-bottom:12px; }
  .section-card p, .section-card ul{ color:var(--ink); font-size:14.5px; line-height:1.7; }
  .section-card ul{ padding-left:20px; margin-top:8px; }
  .section-card p + ul, .section-card ul + p{ margin-top:10px; }
  .section-card p{ margin-bottom:8px; }

  .completion-note{
    background:rgba(63,107,79,0.08); border:1px solid rgba(63,107,79,0.3); border-radius:10px;
    padding:14px 18px; font-size:13.5px; color:var(--green); margin-top:24px; display:none;
  }

  #loading{ color:var(--slate); font-size:14.5px; }

  footer{ background:var(--ink); color:rgba(247,244,237,0.7); padding:40px 32px 28px; margin-top:40px; }
  .foot-bottom{ max-width:1180px; margin:0 auto; font-size:12.5px; color:rgba(247,244,237,0.45); display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; }

</style>
</head>
<body>

<header>
  <div class="nav">
    <div class="nav-left">
      <a href="../index.html" class="logo"><span class="dot"></span>veyn</a>
      <nav class="nav-links" id="account-nav">
        <a href="../index.html">Home</a>
        <a href="../veyn-for-secretaries.html">For Secretaries</a>
        <a href="../veyn-for-consultants.html">For Consultants</a>
        <a href="../veyn-about.html">About</a>
      </nav>
    </div>
    <a href="academy.html" class="btn-login">Back to Academy</a>
  </div>
</header>

<div class="wrap">
  <div class="eyebrow">Academy · Training module</div>
  <p id="loading">Loading…</p>
  <div id="content" style="display:none;">
    <h1 id="module-title"></h1>
    <p class="aim" id="module-aim"></p>

    <div class="action-row">
      <a class="action-btn" id="flashcards-link" href="#">Revise with flashcards</a>
      <a class="action-btn primary" id="quiz-link" href="#">Take the quiz →</a>
    </div>

    <div id="sections-list"></div>

    <p class="completion-note" id="completion-note"></p>
  </div>
</div>

<footer>
  <div class="foot-bottom">
    <span>© 2026 Veyn. All rights reserved.</span>
    <span>Skills-tested, every time.</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="account-nav.js"></script>
<script src="training-modules-data.js"></script>
<script>
  (async () => {
    const navResult = await renderAccountNav(document.getElementById('account-nav'), supabaseClient, 'academy');
    if (!navResult) { window.location.href = 'login.html'; }
  })();

  const slug = new URLSearchParams(window.location.search).get('slug');
  const mod = TRAINING_MODULES[slug];

  const loading = document.getElementById('loading');
  const content = document.getElementById('content');

  if (!mod) {
    loading.textContent = 'Module not found.';
  } else {
    document.getElementById('module-title').textContent = mod.title;
    document.getElementById('module-aim').textContent = mod.aim;
    document.getElementById('flashcards-link').href = `module-flashcards.html?slug=${slug}`;
    document.getElementById('quiz-link').href = `module-quiz.html?slug=${slug}`;

    document.getElementById('sections-list').innerHTML = mod.sections.map(s => `
      <div class="section-card">
        <h2>${s.heading}</h2>
        ${s.body}
      </div>
    `).join('');

    loading.style.display = 'none';
    content.style.display = 'block';

    (async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) return;
      const { data } = await supabaseClient
        .from('training_module_results')
        .select('quiz_passed, quiz_score')
        .eq('profile_id', session.user.id)
        .eq('module_slug', slug)
        .maybeSingle();
      if (data && data.quiz_passed) {
        const note = document.getElementById('completion-note');
        note.style.display = 'block';
        note.textContent = `✓ Module completed — quiz passed with ${data.quiz_score}%.`;
      }
    })();
  }
</script>

<script src="../mobile-nav.js"></script>
<script src="../cookie-consent.js"></script>
</body>
</html>
