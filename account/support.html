<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://api.resend.com https://api.stripe.com; frame-src https://js.stripe.com;">
<title>Support — Veyn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#1B2430; --paper:#F7F4ED; --gold:#B8924A; --slate:#5C6470; --green:#3F6B4F; --white:#FFFFFF; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--paper); color:var(--ink); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  a{ color:inherit; text-decoration:none; }

  header{ position:sticky; top:0; z-index:50; background:rgba(247,244,237,0.92); backdrop-filter:blur(8px); border-bottom:1px solid rgba(27,36,48,0.08); }
  .nav{ display:flex; align-items:center; justify-content:space-between; padding:20px 32px; max-width:1180px; margin:0 auto; }
  .nav-left{ display:flex; align-items:center; gap:48px; }
  .logo{ font-family:'Fraunces',serif; font-weight:600; font-size:24px; display:flex; align-items:center; gap:8px; }
  .logo .dot{ width:7px; height:7px; border-radius:50%; background:var(--gold); display:inline-block; }
  .nav-links{ display:flex; gap:36px; font-size:14px; font-weight:500; color:var(--slate); }
  .nav-links a{ color:var(--slate); }
  .nav-links a:hover{ color:var(--ink); }
  .nav-links a.active{ color:var(--ink); border-bottom:2px solid var(--gold); padding-bottom:2px; }
  .btn-login{ font-family:'Inter',sans-serif; font-size:14px; font-weight:600; color:var(--ink); border:1.5px solid rgba(27,36,48,0.2); padding:9px 20px; border-radius:7px; cursor:pointer; background:none; }

  .wrap{ max-width:720px; margin:0 auto; padding:48px 32px 100px; }
  .eyebrow{ font-family:'IBM Plex Mono',monospace; font-size:11.5px; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); margin-bottom:14px; }
  h1{ font-family:'Fraunces',serif; font-weight:600; font-size:30px; margin-bottom:10px; }
  .sub{ color:var(--slate); font-size:14.5px; line-height:1.6; margin-bottom:32px; }

  .card{ background:var(--white); border:1px solid rgba(27,36,48,0.08); border-radius:14px; padding:24px 26px; margin-bottom:16px; }
  .card-head{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:6px; }
  .thread-subject{ font-weight:600; font-size:15px; }
  .thread-meta{ font-size:12.5px; color:var(--slate); margin-bottom:14px; }
  .status-badge{ font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.04em; text-transform:uppercase; padding:3px 9px; border-radius:999px; font-weight:500; white-space:nowrap; }
  .status-badge.open{ background:rgba(63,107,79,0.1); color:var(--green); }
  .status-badge.resolved{ background:rgba(92,100,112,0.1); color:var(--slate); }

  .messages-list{ display:flex; flex-direction:column; gap:12px; margin-bottom:16px; }
  .msg{ padding:12px 14px; border-radius:10px; font-size:14px; line-height:1.6; max-width:90%; }
  .msg.from-user{ background:var(--paper); align-self:flex-start; }
  .msg.from-admin{ background:var(--ink); color:var(--paper); align-self:flex-end; }
  .msg-meta{ font-size:11px; color:var(--slate); margin-top:4px; }
  .msg.from-admin .msg-meta{ color:rgba(247,244,237,0.55); }

  .reply-form textarea{
    width:100%; padding:11px 14px; font-family:'Inter',sans-serif; font-size:14px;
    border:1.5px solid rgba(27,36,48,0.15); border-radius:8px; background:var(--paper);
    color:var(--ink); resize:vertical; min-height:80px;
  }
  .reply-form textarea:focus{ outline:none; border-color:var(--gold); }

  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:13px; font-weight:600; margin-bottom:6px; }
  .field input, .field textarea{
    width:100%; padding:11px 14px; font-family:'Inter',sans-serif; font-size:14px;
    border:1.5px solid rgba(27,36,48,0.15); border-radius:8px; background:var(--paper); color:var(--ink);
  }
  .field textarea{ resize:vertical; min-height:100px; }
  .field input:focus, .field textarea:focus{ outline:none; border-color:var(--gold); }

  .btn{ font-family:'Inter',sans-serif; font-weight:600; font-size:14px; padding:11px 22px; border-radius:8px; cursor:pointer; border:none; transition:transform .2s; }
  .btn:hover{ transform:translateY(-1px); }
  .btn:disabled{ opacity:0.55; cursor:not-allowed; transform:none; }
  .btn-primary{ background:var(--ink); color:var(--paper); }
  .btn-outline{ background:none; border:1.5px solid rgba(27,36,48,0.2); color:var(--ink); }
  .btn-row{ display:flex; gap:10px; align-items:center; margin-top:12px; flex-wrap:wrap; }

  .support-tab-row{ display:flex; gap:4px; margin-bottom:24px; border-bottom:2px solid rgba(27,36,48,0.08); }
  .support-tab-btn{ font-family:'Inter',sans-serif; font-size:14px; font-weight:500; color:var(--slate); background:none; border:none; padding:10px 18px 12px; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; }
  .support-tab-btn:hover{ color:var(--ink); }
  .support-tab-btn.active{ color:var(--ink); font-weight:600; border-bottom-color:var(--gold); }
  .support-tab-panel{ display:none; }
  .support-tab-panel.active{ display:block; }

  .new-thread-card{ background:var(--white); border:1px solid rgba(27,36,48,0.08); border-radius:14px; padding:24px 26px; margin-bottom:28px; }
  .new-thread-card h2{ font-family:'Fraunces',serif; font-size:18px; margin-bottom:16px; }

  .status-msg{ font-size:13px; margin-top:8px; display:none; }
  .empty-state{ text-align:center; color:var(--slate); font-size:14px; padding:24px 0; }

  footer{ background:var(--ink); color:rgba(247,244,237,0.7); padding:40px 32px 28px; margin-top:40px; }
  .foot-bottom{ max-width:1180px; margin:0 auto; font-size:12.5px; color:rgba(247,244,237,0.45); display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; }
</style>
<link rel="stylesheet" href="../veyn-buttons.css"></head>
<body>

<header>
  <div class="nav">
    <div class="nav-left">
      <a href="../index.html" class="logo"><span class="dot"></span>veyn</a>
      <nav class="nav-links" id="account-nav"></nav>
    </div>
    <button class="btn-login" id="logout-btn" style="display:none;">Log out</button>
  </div>
</header>

<div class="wrap">
  <div class="eyebrow">Help &amp; support</div>
  <h1>Contact support</h1>
  <p class="sub">Have a question or issue? Send a message to the Veyn team and we'll get back to you.</p>

  <p id="loading" style="color:var(--slate); font-size:14.5px;">Loading…</p>

  <div id="page-content" style="display:none;">

    <div class="support-tab-row">
      <button class="support-tab-btn active" data-tab="new-query">New query</button>
      <button class="support-tab-btn" data-tab="previous-tickets">Previous tickets <span id="tickets-count" style="display:none; background:rgba(27,36,48,0.1); color:var(--slate); border-radius:999px; font-size:10.5px; font-weight:700; padding:1px 7px; margin-left:4px;"></span></button>
    </div>

    <div class="support-tab-panel active" id="tab-new-query">
      <div class="new-thread-card">
        <h2>New support query</h2>
        <form id="new-thread-form">
          <div class="field">
            <label for="thread-subject">Subject</label>
            <input type="text" id="thread-subject" placeholder="Briefly describe your query" required maxlength="120">
          </div>
          <div class="field">
            <label for="thread-body">Message</label>
            <textarea id="thread-body" placeholder="Tell us more…" required></textarea>
          </div>
          <div class="btn-row">
            <button type="submit" class="btn btn-primary" id="new-thread-btn">Send message</button>
          </div>
          <p class="status-msg" id="new-thread-status"></p>
        </form>
      </div>
    </div>

    <div class="support-tab-panel" id="tab-previous-tickets">
      <p id="tickets-loading" style="color:var(--slate); font-size:14.5px; display:none;">Loading your tickets…</p>
      <div id="threads-list"></div>
    </div>

  </div>
</div>

<footer>
  <div class="foot-bottom">
    <span>© 2026 Veyn. All rights reserved.</span>
    <span>Founded by a medical secretary, not a market gap.</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0/dist/umd/supabase.js" integrity="sha384-3wY11tldQ5+yWqAvmTN4XtQvnjoTva0cV15O/O/O5NTtp0ivVopSzLOzsVXWZse9" crossorigin="anonymous"></script>
<script src="supabase-config.js"></script>
<script src="account-nav.js"></script>
<script>
  let currentUserId = null;

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  function formatDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  function switchSupportTab(tabName) {
    document.querySelectorAll('.support-tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabName));
    document.querySelectorAll('.support-tab-panel').forEach(p => p.classList.toggle('active', p.id === `tab-${tabName}`));
  }

  document.querySelectorAll('.support-tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchSupportTab(btn.dataset.tab));
  });

  async function loadThreads() {
    const list = document.getElementById('threads-list');

    const { data: threads, error } = await supabaseClient
      .from('support_threads')
      .select('*')
      .eq('profile_id', currentUserId)
      .order('updated_at', { ascending: false });

    if (error) { list.innerHTML = `<div class="empty-state">Could not load tickets: ${escapeHtml(error.message)}</div>`; return; }

    // Update count badge
    const countBadge = document.getElementById('tickets-count');
    if (threads && threads.length > 0) {
      countBadge.textContent = threads.length;
      countBadge.style.display = 'inline';
    } else {
      countBadge.style.display = 'none';
    }

    if (!threads || threads.length === 0) {
      list.innerHTML = '<div class="empty-state">No previous tickets — use the New query tab to get in touch.</div>';
      return;
    }

    list.innerHTML = threads.map(t => `
      <div class="card" id="thread-${t.id}">
        <div class="card-head">
          <div class="thread-subject">${escapeHtml(t.subject)}</div>
          <span class="status-badge ${t.status}">${t.status === 'open' ? 'Open' : 'Resolved'}</span>
        </div>
        <div class="thread-meta">Opened ${formatDate(t.created_at)}</div>
        <div class="messages-list" id="msgs-${t.id}"><div class="empty-state" style="padding:8px 0;">Loading messages…</div></div>
        ${t.status === 'open' ? `
          <div class="reply-form">
            <textarea id="reply-${t.id}" placeholder="Reply…"></textarea>
            <div class="btn-row">
              <button type="button" class="btn btn-primary btn-sm" data-reply="${t.id}" style="font-size:13px; padding:9px 18px;">Send reply</button>
            </div>
            <p class="status-msg" id="reply-status-${t.id}"></p>
          </div>
        ` : ''}
      </div>
    `).join('');

    for (const t of threads) {
      await loadMessages(t.id);
    }

    list.querySelectorAll('[data-reply]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const threadId = btn.dataset.reply;
        const textarea = document.getElementById(`reply-${threadId}`);
        const statusEl = document.getElementById(`reply-status-${threadId}`);
        const body = textarea.value.trim();
        if (!body) return;
        btn.disabled = true;
        const { error } = await supabaseClient.from('support_messages').insert({ thread_id: threadId, sender_id: currentUserId, body });
        if (error) {
          statusEl.textContent = error.message;
          statusEl.style.color = '#a33';
          statusEl.style.display = 'block';
          btn.disabled = false;
          return;
        }
        textarea.value = '';
        statusEl.style.display = 'none';
        btn.disabled = false;
        await loadMessages(threadId);
        await supabaseClient.from('support_threads').update({ updated_at: new Date().toISOString() }).eq('id', threadId);
      });
    });
  }

  async function loadMessages(threadId) {
    const el = document.getElementById(`msgs-${threadId}`);
    const { data: msgs, error } = await supabaseClient
      .from('support_messages')
      .select('*')
      .eq('thread_id', threadId)
      .order('created_at', { ascending: true });

    if (error || !msgs || msgs.length === 0) { el.innerHTML = ''; return; }

    el.innerHTML = msgs.map(m => {
      const fromAdmin = m.sender_id !== currentUserId;
      return `
        <div class="msg ${fromAdmin ? 'from-admin' : 'from-user'}">
          ${escapeHtml(m.body)}
          <div class="msg-meta">${fromAdmin ? 'Veyn support · ' : ''}${formatDate(m.created_at)}</div>
        </div>
      `;
    }).join('');
  }

  document.getElementById('new-thread-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const subject = document.getElementById('thread-subject').value.trim();
    const body = document.getElementById('thread-body').value.trim();
    const btn = document.getElementById('new-thread-btn');
    const statusEl = document.getElementById('new-thread-status');

    btn.disabled = true;
    btn.textContent = 'Sending…';
    statusEl.style.display = 'none';

    const { data: thread, error: threadError } = await supabaseClient
      .from('support_threads')
      .insert({ profile_id: currentUserId, subject })
      .select()
      .single();

    if (threadError) {
      statusEl.textContent = threadError.message;
      statusEl.style.color = '#a33';
      statusEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Send message';
      return;
    }

    const { error: msgError } = await supabaseClient
      .from('support_messages')
      .insert({ thread_id: thread.id, sender_id: currentUserId, body });

    btn.disabled = false;
    btn.textContent = 'Send message';

    if (msgError) {
      statusEl.textContent = msgError.message;
      statusEl.style.color = '#a33';
      statusEl.style.display = 'block';
      return;
    }

    document.getElementById('new-thread-form').reset();
    statusEl.textContent = 'Message sent — we\'ll get back to you soon.';
    statusEl.style.color = 'var(--green)';
    statusEl.style.display = 'block';
    await loadThreads();
    setTimeout(() => {
      statusEl.style.display = 'none';
      switchSupportTab('previous-tickets');
    }, 1800);
  });

  (async () => {
    const navResult = await renderAccountNav(document.getElementById('account-nav'), supabaseClient, 'support');
    document.getElementById('loading').style.display = 'none';

    if (!navResult) { window.location.href = 'login.html'; return; }

    currentUserId = navResult.session.user.id;
    document.getElementById('logout-btn').style.display = 'inline-block';
    document.getElementById('page-content').style.display = 'block';

    await loadThreads();
  })();

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    window.location.href = 'login.html';
  });
</script>
<script src="../mobile-nav.js"></script>
<script src="../cookie-consent.js"></script>
</body>
</html>
