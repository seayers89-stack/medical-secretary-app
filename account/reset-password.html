<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Set a new password — Veyn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

  :root{
    --ink:#1B2430;
    --paper:#F7F4ED;
    --gold:#B8924A;
    --slate:#5C6470;
    --green:#3F6B4F;
    --white:#FFFFFF;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{ color:inherit; text-decoration:none; }

  header{
    position:sticky; top:0; z-index:50;
    background:rgba(247,244,237,0.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(27,36,48,0.08);
  }
  .nav{ display:flex; align-items:center; justify-content:space-between; padding:20px 32px; max-width:1180px; margin:0 auto; }
  .logo{ font-family:'Fraunces', serif; font-weight:600; font-size:24px; display:flex; align-items:center; gap:8px; }
  .logo .dot{ width:7px; height:7px; border-radius:50%; background:var(--gold); display:inline-block; }

  .auth-wrap{ display:flex; align-items:center; justify-content:center; padding:80px 32px 100px; min-height:60vh; }
  .auth-card{
    width:100%; max-width:420px; background:var(--white); border:1px solid rgba(27,36,48,0.08);
    border-radius:20px; padding:44px 40px;
  }
  .auth-eyebrow{
    font-family:'IBM Plex Mono', monospace; font-size:11.5px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--gold); margin-bottom:14px;
  }
  .auth-card h1{ font-family:'Fraunces', serif; font-weight:600; font-size:26px; margin-bottom:10px; }
  .auth-sub{ color:var(--slate); font-size:14.5px; line-height:1.6; margin-bottom:30px; }

  .field{ margin-bottom:18px; }
  .field label{ display:block; font-size:13px; font-weight:600; margin-bottom:7px; color:var(--ink); }
  .field input{
    width:100%; padding:12px 14px; font-family:'Inter', sans-serif; font-size:14.5px;
    border:1.5px solid rgba(27,36,48,0.15); border-radius:8px; background:var(--paper); color:var(--ink);
  }
  .field input:focus{ outline:none; border-color:var(--gold); }

  .btn{
    font-family:'Inter', sans-serif; font-weight:600; font-size:15px; padding:14px 28px;
    border-radius:8px; cursor:pointer; border:none; width:100%; text-align:center; margin-top:6px;
    background:var(--ink); color:var(--paper);
  }
  .btn:disabled{ opacity:0.6; cursor:not-allowed; }

  .auth-switch{ text-align:center; font-size:14px; color:var(--slate); margin-top:20px; }
  .auth-switch a{ color:var(--gold); font-weight:600; }
  .auth-switch a:hover{ text-decoration:underline; }

  #form-status{ display:none; font-size:13.5px; padding:12px 14px; border-radius:8px; margin-bottom:18px; }
  #form-status.error{ display:block; background:rgba(193,68,68,0.08); border:1px solid rgba(193,68,68,0.3); color:#a33; }
  #form-status.success{ display:block; background:rgba(63,107,79,0.08); border:1px solid rgba(63,107,79,0.3); color:var(--green); }

  #loading{ color:var(--slate); font-size:14.5px; }

  footer{ background:var(--ink); color:rgba(247,244,237,0.7); padding:40px 32px 28px; }
  .foot-bottom{ max-width:1180px; margin:0 auto; font-size:12.5px; color:rgba(247,244,237,0.45); display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; }

</style>
</head>
<body>

<header>
  <div class="nav">
    <a href="../index.html" class="logo"><span class="dot"></span>veyn</a>
  </div>
</header>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-eyebrow">Reset password</div>
    <h1>Set a new password</h1>
    <p class="auth-sub" id="auth-sub">Checking your reset link…</p>

    <p id="form-status"></p>

    <form id="reset-form" style="display:none;">
      <div class="field">
        <label for="password">New password</label>
        <input type="password" id="password" placeholder="At least 8 characters" minlength="8" required>
      </div>
      <div class="field">
        <label for="password-confirm">Confirm new password</label>
        <input type="password" id="password-confirm" placeholder="At least 8 characters" minlength="8" required>
      </div>
      <button type="submit" class="btn" id="submit-btn">Set new password</button>
    </form>

    <div class="auth-switch" id="login-link" style="display:none;"><a href="login.html">Back to log in</a></div>
  </div>
</div>

<footer>
  <div class="foot-bottom">
    <span>© 2026 Veyn. All rights reserved.</span>
    <span>Founded by a medical secretary, not a market gap.</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
  const authSub = document.getElementById('auth-sub');
  const form = document.getElementById('reset-form');
  const statusEl = document.getElementById('form-status');
  const submitBtn = document.getElementById('submit-btn');
  const loginLink = document.getElementById('login-link');

  (async () => {
    // Clicking the emailed link logs the user into a temporary "recovery"
    // session — Supabase's client picks up the token from the URL
    // automatically. We just need to confirm a session exists before
    // letting them set a new password.
    const { data: { session } } = await supabaseClient.auth.getSession();

    if (!session) {
      authSub.textContent = 'This reset link is invalid or has expired.';
      statusEl.textContent = 'Request a new link from the forgot password page.';
      statusEl.className = 'error';
      loginLink.style.display = 'block';
      return;
    }

    authSub.textContent = 'Choose a new password for your account.';
    form.style.display = 'block';
  })();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    statusEl.style.display = 'none';
    statusEl.className = '';

    const password = document.getElementById('password').value;
    const confirm = document.getElementById('password-confirm').value;

    if (password !== confirm) {
      statusEl.textContent = "Passwords don't match.";
      statusEl.className = 'error';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Saving…';

    const { error } = await supabaseClient.auth.updateUser({ password });

    submitBtn.disabled = false;
    submitBtn.textContent = 'Set new password';

    if (error) {
      statusEl.textContent = error.message;
      statusEl.className = 'error';
      return;
    }

    form.style.display = 'none';
    statusEl.textContent = 'Password updated. Redirecting you to log in…';
    statusEl.className = 'success';

    await supabaseClient.auth.signOut();
    setTimeout(() => { window.location.href = 'login.html'; }, 1800);
  });
</script>

</body>
</html>
