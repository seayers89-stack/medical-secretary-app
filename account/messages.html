<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://api.resend.com https://api.stripe.com; frame-src https://js.stripe.com;">
<title>Messages — Veyn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

  :root{
    --ink:#1B2430;
    --paper:#F7F4ED;
    --gold:#B8924A;
    --slate:#5C6470;
    --green:#3F6B4F;
    --white:#FFFFFF;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{ color:inherit; text-decoration:none; }

  header{
    position:sticky; top:0; z-index:50;
    background:rgba(247,244,237,0.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(27,36,48,0.08);
  }
  .nav{ display:flex; align-items:center; justify-content:space-between; padding:20px 32px; max-width:1180px; margin:0 auto; }
  .nav-left{ display:flex; align-items:center; gap:48px; }
  .logo{ font-family:'Fraunces', serif; font-weight:600; font-size:24px; display:flex; align-items:center; gap:8px; }
  .logo .dot{ width:7px; height:7px; border-radius:50%; background:var(--gold); display:inline-block; }
  .nav-links{ display:flex; gap:36px; font-size:14px; font-weight:500; color:var(--slate); }
  .nav-links a:hover{ color:var(--ink); }
  .nav-links a.active{ color:var(--ink); border-bottom:2px solid var(--gold); padding-bottom:2px; }
  @media (max-width:760px){ .nav-links{ display:none; } }
  .btn-login{
    font-family:'Inter', sans-serif; font-size:14px; font-weight:600; color:var(--ink);
    border:1.5px solid rgba(27,36,48,0.2); padding:9px 20px; border-radius:7px;
  }

  .wrap{ max-width:680px; margin:0 auto; padding:48px 32px 100px; }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace; font-size:11.5px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--gold); margin-bottom:14px;
  }
  h1{ font-family:'Fraunces', serif; font-weight:600; font-size:28px; margin-bottom:10px; }
  .sub{ color:var(--slate); font-size:14.5px; line-height:1.6; margin-bottom:32px; }

  .thread-row{
    display:flex; justify-content:space-between; align-items:center; padding:18px 22px;
    background:var(--white); border:1px solid rgba(27,36,48,0.08); border-radius:14px; margin-bottom:10px;
  }
  .thread-name{ font-weight:600; font-size:14.5px; }
  .thread-cta{ font-size:13px; font-weight:600; color:var(--gold); }
  .unread-badge{
    display:inline-flex; align-items:center; justify-content:center; min-width:20px; height:20px;
    background:var(--green); color:var(--white); font-size:11.5px; font-weight:700; border-radius:999px;
    padding:0 6px; margin-left:6px;
  }

  .empty-state{ text-align:center; padding:60px 20px; color:var(--slate); font-size:14.5px; }
  #loading{ color:var(--slate); font-size:14.5px; }

</style>
</head>
<body>

<header>
  <div class="nav">
    <div class="nav-left">
      <a href="../index.html" class="logo"><span class="dot"></span>veyn</a>
      <nav class="nav-links" id="account-nav">
        <a href="../index.html">Home</a>
        <a href="../veyn-for-secretaries.html">For Secretaries</a>
        <a href="../veyn-for-consultants.html">For Consultants</a>
        <a href="../veyn-about.html">About</a>
      </nav>
    </div>
    <button class="btn-login" id="logout-btn">Log out</button>
  </div>
</header>

<div class="wrap">
  <div class="eyebrow">Inbox</div>
  <h1>Messages</h1>
  <p class="sub">Conversations open once a contact has been unlocked.</p>

  <p id="loading">Loading conversations…</p>
  <div id="threads"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0/dist/umd/supabase.js" integrity="sha384-3wY11tldQ5+yWqAvmTN4XtQvnjoTva0cV15O/O/O5NTtp0ivVopSzLOzsVXWZse9" crossorigin="anonymous"></script>
<script src="supabase-config.js"></script>
<script src="account-nav.js"></script>
<script>
  (async () => {
    const navResult = await renderAccountNav(document.getElementById('account-nav'), supabaseClient, 'messages');
    if (!navResult) {
      window.location.href = 'login.html';
      return;
    }
    const { session, profile } = navResult;
    const userId = session.user.id;

    const loading = document.getElementById('loading');
    const threadsEl = document.getElementById('threads');

    const isConsultant = profile.role === 'consultant';
    const filterColumn = isConsultant ? 'consultant_id' : 'secretary_id';
    const otherColumn = isConsultant ? 'secretary_id' : 'consultant_id';

    const { data: unlocks, error } = await supabaseClient
      .from('unlocks')
      .select(`consultant_id, secretary_id`)
      .eq(filterColumn, userId);

    if (error) {
      loading.textContent = `Could not load conversations: ${error.message}`;
      return;
    }

    loading.style.display = 'none';

    if (!unlocks || unlocks.length === 0) {
      threadsEl.innerHTML = `<div class="empty-state">No conversations yet. ${isConsultant ? 'Unlock a secretary from search to start one.' : 'Once a consultant unlocks your profile, the conversation will appear here.'}</div>`;
      return;
    }

    const otherIds = unlocks.map(u => u[otherColumn]);
    const { data: otherProfiles } = await supabaseClient
      .from('profiles')
      .select('id, first_name, last_name')
      .in('id', otherIds);

    const nameById = {};
    (otherProfiles || []).forEach(p => { nameById[p.id] = `${p.first_name} ${p.last_name}`; });

    const { data: unread } = await supabaseClient
      .from('messages')
      .select('consultant_id, secretary_id')
      .eq(filterColumn, userId)
      .neq('sender_id', userId)
      .is('read_at', null);

    const unreadCounts = {};
    (unread || []).forEach(m => {
      const key = `${m.consultant_id}_${m.secretary_id}`;
      unreadCounts[key] = (unreadCounts[key] || 0) + 1;
    });

    const escHtml = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
    threadsEl.innerHTML = unlocks.map(u => {
      const otherId = u[otherColumn];
      const name = escHtml(nameById[otherId] || 'Unknown');
      const key = `${u.consultant_id}_${u.secretary_id}`;
      const unreadCount = unreadCounts[key] || 0;
      const badge = unreadCount > 0 ? `<span class="unread-badge">${unreadCount}</span>` : '';
      return `
        <a href="thread.html?consultant_id=${u.consultant_id}&secretary_id=${u.secretary_id}" class="thread-row">
          <span class="thread-name">${name} ${badge}</span>
          <span class="thread-cta">Open conversation →</span>
        </a>
      `;
    }).join('');
  })();

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    window.location.href = 'login.html';
  });
</script>

<script src="../mobile-nav.js"></script>
<script src="../cookie-consent.js"></script>
</body>
</html>
