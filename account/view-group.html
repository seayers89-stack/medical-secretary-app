<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://api.resend.com https://api.stripe.com; frame-src https://js.stripe.com;">
<title>Group profile — Veyn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
<style>

  :root{
    --ink:#2E3F54;
    --paper:#F7F4ED;
    --gold:#B8924A;
    --slate:#5C6470;
    --green:#3F6B4F;
    --white:#FFFFFF;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Special Elite', cursive;
    -webkit-font-smoothing:antialiased;
  }
  a{ color:inherit; text-decoration:none; }

  header{
    position:sticky; top:0; z-index:50;
    background:rgba(247,244,237,0.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(46,63,84,0.08);
  }
  .nav{ display:flex; align-items:center; justify-content:space-between; padding:20px 32px; max-width:1180px; margin:0 auto; }
  .nav-left{ display:flex; align-items:center; gap:48px; }
  .nav-links{ display:flex; flex-wrap:wrap; row-gap:8px; column-gap:20px; font-size:14px; font-weight:500; color:var(--slate); }
  .nav-links a:hover{ color:var(--ink); }
  .nav-links a.active{ color:var(--ink); border-bottom:2px solid var(--gold); padding-bottom:2px; }
  @media (max-width:760px){ .nav-links{ display:none; } }
  .logo{ font-family:'Cormorant Garamond', serif; font-weight:600; font-size:24px; display:flex; align-items:center; gap:8px; }
  .logo .dot{ width:7px; height:7px; border-radius:50%; background:var(--gold); display:inline-block; }
  .btn-login{
    font-family:'Special Elite', cursive; font-size:14px; font-weight:600; color:var(--ink);
    border:1.5px solid rgba(46,63,84,0.2); padding:9px 20px; border-radius:7px;
  }

  .wrap{ max-width:680px; margin:0 auto; padding:48px 32px 100px; }
  .back-link{ font-size:13.5px; color:var(--slate); margin-bottom:24px; display:inline-block; }
  .back-link:hover{ color:var(--ink); }

  .profile-head{ display:flex; justify-content:space-between; align-items:flex-start; gap:20px; margin-bottom:24px; flex-wrap:wrap; }
  h1{ font-family:'Cormorant Garamond', serif; font-weight:600; font-size:30px; margin-bottom:6px; }
  .head-meta{ color:var(--slate); font-size:14px; }
  .result-badge{
    font-family:'Special Elite', cursive; font-size:10.5px; letter-spacing:0.04em; text-transform:uppercase;
    background:rgba(63,107,79,0.1); color:var(--green); padding:5px 12px; border-radius:999px; font-weight:600;
    white-space:nowrap;
  }
  .skills-tested-badge{ display:inline-flex; align-items:flex-start; gap:5px; white-space:normal; max-width:100%; text-align:left; }

  .action-row{ margin-bottom:32px; }
  .unlock-btn{
    font-family:'Special Elite', cursive; font-weight:600; font-size:14px; padding:11px 22px;
    border-radius:8px; cursor:pointer; border:1.5px solid var(--ink); background:none; color:var(--ink);
    display:inline-block;
  }
  .unlock-btn:hover{ background:rgba(46,63,84,0.05); }
  .login-note{ font-size:13.5px; color:var(--slate); }
  .login-note a{ text-decoration:underline; font-weight:600; }

  .card{
    background:var(--white); border:1px solid rgba(46,63,84,0.08); border-radius:16px;
    padding:26px 28px; margin-bottom:16px;
  }
  .card h3{ font-family:'Cormorant Garamond', serif; font-weight:600; font-size:16px; margin-bottom:14px; }
  .row{ display:flex; justify-content:space-between; gap:16px; padding:9px 0; border-bottom:1px solid rgba(46,63,84,0.06); font-size:14px; }
  .row:last-child{ border-bottom:none; }
  .row span:first-child{ color:var(--slate); flex:0 0 auto; }
  .row span:last-child{ font-weight:600; text-align:right; }

  .member-accordion{ border:1px solid rgba(46,63,84,0.08); border-radius:12px; margin-bottom:10px; overflow:hidden; }
  .member-summary{
    display:flex; justify-content:space-between; align-items:center; gap:12px; padding:14px 18px;
    cursor:pointer; background:var(--white); font-size:14px; font-weight:600;
  }
  .member-summary:hover{ background:rgba(46,63,84,0.02); }
  .member-role-tag{ font-weight:400; color:var(--slate); font-size:12.5px; }
  .member-chevron{ transition:transform .2s ease; flex-shrink:0; }
  .member-accordion.open .member-chevron{ transform:rotate(180deg); }
  .member-detail{ display:none; padding:4px 18px 16px; border-top:1px solid rgba(46,63,84,0.06); }
  .member-accordion.open .member-detail{ display:block; }

  .empty-state{ text-align:center; padding:60px 20px; color:var(--slate); font-size:14.5px; }
  #loading{ color:var(--slate); font-size:14.5px; }

</style>
<link rel="stylesheet" href="../veyn-buttons.css"></head>
<body>

<header>
  <div class="nav">
    <div class="nav-left">
      <a href="../index.html" class="logo"><span class="dot"></span>veyn</a>
      <nav class="nav-links" id="account-nav">
        <a href="../index.html">Home</a>
        <a href="../veyn-for-secretaries.html">For Secretaries</a>
        <a href="../veyn-for-consultants.html">For Consultants</a>
        <a href="../veyn-about.html">About</a>
      </nav>
    </div>
    <a href="search-secretaries.html" class="btn-login">Back to search</a>
  </div>
</header>

<div class="wrap">
  <a href="search-secretaries.html" class="back-link">← Back to search</a>

  <p id="loading">Loading group profile…</p>
  <div id="content" style="display:none;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0/dist/umd/supabase.js" integrity="sha384-3wY11tldQ5+yWqAvmTN4XtQvnjoTva0cV15O/O/O5NTtp0ivVopSzLOzsVXWZse9" crossorigin="anonymous"></script>
<script src="supabase-config.js"></script>
<script src="account-nav.js"></script>
<script src="badges.js"></script>
<script src="system-skills-data.js"></script>
<script>
  const groupId = new URLSearchParams(window.location.search).get('id');

  (async () => {
    if (!groupId) {
      document.getElementById('loading').textContent = 'No group specified.';
      return;
    }

    const navResult = await renderAccountNav(document.getElementById('account-nav'), supabaseClient, null);
    const currentUserId = navResult ? navResult.session.user.id : null;
    const isAdminUser = navResult ? navResult.isAdmin : false;

    const { data: group, error } = await supabaseClient
      .from('groups')
      .select('*')
      .eq('id', groupId)
      .single();

    const loading = document.getElementById('loading');
    const content = document.getElementById('content');

    if (error || !group || group.status !== 'active') {
      loading.textContent = 'Could not load this group — it may no longer be active.';
      return;
    }

    const { data: members } = await supabaseClient
      .from('group_members')
      .select('secretary_id, role_title, profiles(first_name, last_name)')
      .eq('group_id', groupId)
      .order('joined_at', { ascending: true });

    const memberIds = (members || []).map(m => m.secretary_id);

    // group_members and secretary_profiles both reference profiles but
    // aren't directly related to each other, so PostgREST can't embed one
    // under the other — fetch separately and merge by profile_id instead.
    const { data: memberSecProfiles } = memberIds.length
      ? await supabaseClient.from('secretary_profiles').select('*').in('profile_id', memberIds)
      : { data: [] };
    const secProfileById = {};
    (memberSecProfiles || []).forEach(sp => { secProfileById[sp.profile_id] = sp; });

    const { data: passedSystems } = memberIds.length
      ? await supabaseClient.from('system_skills_results').select('profile_id, system_slug').in('profile_id', memberIds).eq('quiz_passed', true)
      : { data: [] };
    const systemsByMember = {};
    (passedSystems || []).forEach(r => {
      (systemsByMember[r.profile_id] = systemsByMember[r.profile_id] || []).push(r.system_slug);
    });

    const rate = formatGroupRate(group) || '—';
    const isBoosted = !!(group.premium_active && group.premium_expires_at && new Date(group.premium_expires_at) > new Date());
    const featuredBadge = isBoosted ? '<span class="result-badge" style="background:var(--ink); color:var(--paper);">★ Featured</span>' : '';

    let alreadyUnlocked = false;
    let hasActivePass = false;
    if (currentUserId) {
      const { data: con } = await supabaseClient
        .from('consultant_profiles')
        .select('pass_expires_at')
        .eq('profile_id', currentUserId)
        .single();
      hasActivePass = !!(con && con.pass_expires_at && new Date(con.pass_expires_at) > new Date());

      const { data: unlock } = await supabaseClient
        .from('group_unlocks')
        .select('id')
        .eq('consultant_id', currentUserId)
        .eq('group_id', groupId)
        .is('refunded_at', null)
        .maybeSingle();
      alreadyUnlocked = !!unlock;
    }

    let action;
    if (!currentUserId) {
      action = `<span class="login-note"><a href="login.html">Log in</a> to contact ${escapeHtml(group.company_name)}</span>`;
    } else if (isAdminUser || hasActivePass || alreadyUnlocked) {
      action = `<a class="unlock-btn" href="group-thread.html?consultant_id=${currentUserId}&group_id=${groupId}">Message ${escapeHtml(group.company_name)}</a>`;
    } else {
      action = `<button class="unlock-btn" id="unlock-btn">Unlock for £12</button>`;
    }

    const memberRows = (members || []).map((m, idx) => {
      const sp = secProfileById[m.secretary_id] || {};
      const name = m.profiles ? `${m.profiles.first_name} ${m.profiles.last_name}` : 'Team member';
      const skillsParts = [];
      if (sp.typing_wpm_verified != null) skillsParts.push(`${sp.typing_wpm_verified} WPM`);
      if (sp.terminology_quiz_passed) skillsParts.push('Terminology passed');
      (systemsByMember[m.secretary_id] || []).forEach(slug => skillsParts.push(`${(SYSTEM_SKILLS[slug] && SYSTEM_SKILLS[slug].name) || slug} verified`));

      return `
        <div class="member-accordion" data-idx="${idx}">
          <div class="member-summary" data-toggle="${idx}">
            <span>${escapeHtml(name)}${m.role_title ? ` <span class="member-role-tag">— ${escapeHtml(m.role_title)}</span>` : ''}</span>
            <svg class="member-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="member-detail">
            ${skillsParts.length ? `<div class="row"><span>Skills-tested</span><span>${skillsParts.join(', ')}</span></div>` : ''}
            <div class="row"><span>Years as a medical secretary</span><span>${sp.years_experience || '—'}</span></div>
            <div class="row"><span>Systems</span><span>${(sp.systems || []).join(', ') || '—'}</span></div>
            <div class="row"><span>Specialties</span><span>${(sp.specialties || []).join(', ') || '—'}</span></div>
            <div class="row"><span>DBS certificate</span><span>${sp.has_dbs ? (sp.dbs_level || 'Yes') : 'No'}</span></div>
            <div class="row"><span>Right to work in UK</span><span>${sp.right_to_work ? 'Yes' : '—'}</span></div>
          </div>
        </div>
      `;
    }).join('');

    content.innerHTML = `
      <div class="profile-head">
        <div>
          <h1>${escapeHtml(group.company_name)}</h1>
          <div class="head-meta">${(members || []).length} member${(members || []).length === 1 ? '' : 's'}</div>
        </div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">${featuredBadge}</div>
      </div>
      <div class="action-row">${action}</div>

      ${group.description ? `<div class="card"><h3>About</h3><p style="font-size:14px; line-height:1.6;">${escapeHtml(group.description)}</p></div>` : ''}

      <div class="card">
        <h3>Rate</h3>
        <div class="row"><span>Rate</span><span>${rate}</span></div>
      </div>

      <div class="card">
        <h3>Team</h3>
        ${memberRows || '<p style="font-size:14px; color:var(--slate);">No members listed yet.</p>'}
      </div>
    `;

    loading.style.display = 'none';
    content.style.display = 'block';

    document.querySelectorAll('[data-toggle]').forEach(el => {
      el.addEventListener('click', () => {
        el.closest('.member-accordion').classList.toggle('open');
      });
    });

    const unlockBtn = document.getElementById('unlock-btn');
    if (unlockBtn) {
      unlockBtn.addEventListener('click', () => {
        window.location.href = `mock-checkout.html?type=group_contact&group_id=${groupId}&group_name=${encodeURIComponent(group.company_name)}`;
      });
    }
  })();
</script>

<script src="../mobile-nav.js"></script>
<script src="../cookie-consent.js"></script>
</body>
</html>
