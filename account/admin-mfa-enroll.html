<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://api.resend.com https://api.stripe.com; frame-src https://js.stripe.com;">
<title>Set up two-factor authentication — Veyn Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#1B2430; --paper:#F7F4ED; --gold:#B8924A; --slate:#5C6470; --green:#3F6B4F; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--paper); color:var(--ink); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:32px; }
  .card{ background:#fff; border-radius:16px; padding:48px; max-width:440px; width:100%; box-shadow:0 4px 24px rgba(27,36,48,0.08); }
  .logo{ font-family:'Fraunces',serif; font-weight:600; font-size:22px; display:flex; align-items:center; gap:8px; margin-bottom:32px; color:var(--ink); }
  .logo .dot{ width:6px; height:6px; border-radius:50%; background:var(--gold); display:inline-block; }
  .eyebrow{ font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); margin-bottom:10px; }
  h1{ font-family:'Fraunces',serif; font-weight:600; font-size:24px; margin-bottom:10px; }
  p{ font-size:14px; color:var(--slate); line-height:1.65; margin-bottom:20px; }
  #qr-wrap{ text-align:center; margin:24px 0; }
  #qr-wrap img{ width:180px; height:180px; border:1px solid rgba(27,36,48,0.1); border-radius:8px; padding:8px; background:#fff; }
  .secret-wrap{ background:rgba(27,36,48,0.04); border-radius:8px; padding:12px 16px; font-family:'IBM Plex Mono',monospace; font-size:13px; word-break:break-all; text-align:center; margin-bottom:24px; color:var(--ink); }
  label{ display:block; font-size:13px; font-weight:600; margin-bottom:6px; }
  input{ width:100%; padding:11px 14px; border:1.5px solid rgba(27,36,48,0.18); border-radius:8px; font-size:15px; font-family:'IBM Plex Mono',monospace; letter-spacing:0.1em; outline:none; transition:border-color 0.15s; text-align:center; }
  input:focus{ border-color:var(--gold); }
  .btn{ width:100%; padding:13px; background:var(--ink); color:#fff; font-size:15px; font-weight:600; border:none; border-radius:9px; cursor:pointer; margin-top:16px; font-family:'Inter',sans-serif; transition:opacity 0.15s; }
  .btn:hover{ opacity:0.85; }
  .btn:disabled{ opacity:0.5; cursor:not-allowed; }
  .error{ color:#c0392b; font-size:13px; margin-top:10px; display:none; }
  .loading-state{ text-align:center; color:var(--slate); font-size:14px; padding:40px 0; }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><span class="dot"></span>veyn</div>

  <div id="loading-state" class="loading-state">Setting up…</div>

  <div id="enroll-ui" style="display:none;">
    <div class="eyebrow">Admin security</div>
    <h1>Set up two-factor authentication</h1>
    <p>Admin accounts require 2FA. Scan the QR code below with an authenticator app (Google Authenticator, Authy, or 1Password), then enter the 6-digit code to confirm.</p>

    <div id="qr-wrap">
      <img id="qr-img" src="" alt="QR code for authenticator app">
    </div>

    <p style="font-size:12px; text-align:center; margin-bottom:8px;">Can't scan? Enter this key manually:</p>
    <div class="secret-wrap" id="secret-text"></div>

    <label for="totp-code">Verification code</label>
    <input type="text" id="totp-code" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
    <button class="btn" id="verify-btn">Confirm and activate 2FA</button>
    <div class="error" id="error-msg"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0/dist/umd/supabase.js" integrity="sha384-3wY11tldQ5+yWqAvmTN4XtQvnjoTva0cV15O/O/O5NTtp0ivVopSzLOzsVXWZse9" crossorigin="anonymous"></script>
<script>
  const SUPABASE_URL = 'https://kdknadmgbiebyuqwigfi.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtka25hZG1nYmllYnl1cXdpZ2ZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDU3NjA1MDUsImV4cCI6MjA2MTMzNjUwNX0.M4YVSKhTANiKPFGLmLjHFUH1U5VGMwm8KeMMzTi0bqU';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let factorId = null;

  (async () => {
    const { data: { user } } = await db.auth.getUser();
    if (!user) { window.location.href = 'login.html'; return; }

    // If already MFA-verified, go straight to admin
    const { data: aal } = await db.auth.mfa.getAuthenticatorAssuranceLevel();
    if (aal?.currentLevel === 'aal2') {
      window.location.href = 'admin.html';
      return;
    }

    // Enrol a new TOTP factor
    const { data, error } = await db.auth.mfa.enroll({ factorType: 'totp', issuer: 'Veyn Admin' });
    if (error) {
      document.getElementById('loading-state').textContent = 'Error: ' + error.message;
      return;
    }

    factorId = data.id;
    document.getElementById('qr-img').src = data.totp.qr_code;
    document.getElementById('secret-text').textContent = data.totp.secret;
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('enroll-ui').style.display = 'block';
    document.getElementById('totp-code').focus();
  })();

  document.getElementById('verify-btn').addEventListener('click', async () => {
    const code = document.getElementById('totp-code').value.replace(/\s/g, '');
    const btn = document.getElementById('verify-btn');
    const err = document.getElementById('error-msg');
    err.style.display = 'none';

    if (!/^\d{6}$/.test(code)) {
      err.textContent = 'Enter the 6-digit code from your authenticator app.';
      err.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Verifying…';

    const { data: challenge, error: challengeErr } = await db.auth.mfa.challenge({ factorId });
    if (challengeErr) {
      err.textContent = challengeErr.message;
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Confirm and activate 2FA';
      return;
    }

    const { error: verifyErr } = await db.auth.mfa.verify({
      factorId,
      challengeId: challenge.id,
      code,
    });

    if (verifyErr) {
      err.textContent = 'Incorrect code — please try again.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Confirm and activate 2FA';
      return;
    }

    window.location.href = 'admin.html';
  });

  document.getElementById('totp-code').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('verify-btn').click();
  });
</script>
</body>
</html>
