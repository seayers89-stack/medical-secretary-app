<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://api.resend.com https://api.stripe.com; frame-src https://js.stripe.com;">
<title>Set your password — Veyn Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

  :root{
    --ink:#1B2430;
    --paper:#F7F4ED;
    --gold:#B8924A;
    --slate:#5C6470;
    --green:#3F6B4F;
    --white:#FFFFFF;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{ color:inherit; text-decoration:none; }

  .auth-wrap{ display:flex; align-items:center; justify-content:center; padding:80px 32px 100px; min-height:100vh; }
  .auth-card{
    width:100%; max-width:420px; background:var(--white); border:1px solid rgba(27,36,48,0.08);
    border-radius:20px; padding:44px 40px;
  }
  .auth-eyebrow{
    font-family:'IBM Plex Mono', monospace; font-size:11.5px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--gold); margin-bottom:14px;
  }
  .logo{
    font-family:'Fraunces', serif; font-weight:600; font-size:22px;
    display:flex; align-items:center; gap:8px; margin-bottom:24px;
  }
  .logo .dot{ width:7px; height:7px; border-radius:50%; background:var(--gold); display:inline-block; }
  .auth-card h1{ font-family:'Fraunces', serif; font-weight:600; font-size:26px; margin-bottom:10px; }
  .auth-sub{ color:var(--slate); font-size:14.5px; line-height:1.6; margin-bottom:30px; }

  .field{ margin-bottom:18px; }
  .field label{ display:block; font-size:13px; font-weight:600; margin-bottom:7px; color:var(--ink); }
  .field input{
    width:100%; padding:12px 14px; font-family:'Inter', sans-serif; font-size:14.5px;
    border:1.5px solid rgba(27,36,48,0.15); border-radius:8px; background:var(--paper);
    color:var(--ink); transition:border-color .2s ease;
  }
  .field input:focus{ outline:none; border-color:var(--gold); }

  .btn{
    font-family:'Inter', sans-serif; font-weight:600; font-size:15px; padding:14px 28px;
    border-radius:8px; cursor:pointer; border:none; transition:transform .2s ease, box-shadow .2s ease;
    display:inline-block; width:100%; text-align:center;
  }
  .btn:hover{ transform:translateY(-1px); }
  .btn:disabled{ opacity:0.6; cursor:not-allowed; transform:none; }
  .btn-primary{ background:var(--ink); color:var(--paper); box-shadow:0 8px 20px -8px rgba(27,36,48,0.5); }

</style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="logo"><span class="dot"></span>veyn</div>
    <div class="auth-eyebrow">Admin invite</div>
    <h1 id="heading">Set your password</h1>
    <p class="auth-sub" id="sub-text">You've been invited as a Veyn admin. Choose a password to finish setting up your account.</p>

    <p id="form-error" style="display:none; background:rgba(193,68,68,0.08); border:1px solid rgba(193,68,68,0.3); color:#a33; padding:12px 14px; border-radius:8px; font-size:13.5px; margin-bottom:18px;"></p>

    <form id="set-password-form">
      <div class="field">
        <label for="password">New password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" minlength="8" required>
      </div>
      <div class="field">
        <label for="password-confirm">Confirm password</label>
        <input type="password" id="password-confirm" name="password-confirm" placeholder="••••••••" minlength="8" required>
      </div>
      <button type="submit" class="btn btn-primary" id="submit-btn">Set password &amp; continue</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
  const form = document.getElementById('set-password-form');
  const errorBox = document.getElementById('form-error');
  const submitBtn = document.getElementById('submit-btn');

  (async () => {
    // Supabase's invite link logs the browser in with a temporary session
    // via the URL hash before this script runs — just confirm we actually
    // have one, otherwise this page was opened directly without a valid
    // invite token.
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      document.getElementById('heading').textContent = 'Invite link not found';
      document.getElementById('sub-text').textContent = 'This page only works when opened from an admin invite email. Ask whoever invited you to resend it.';
      form.style.display = 'none';
    }
  })();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.style.display = 'none';

    const password = document.getElementById('password').value;
    const confirm = document.getElementById('password-confirm').value;

    if (password !== confirm) {
      errorBox.textContent = 'Passwords do not match.';
      errorBox.style.display = 'block';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Saving…';

    const { error } = await supabaseClient.auth.updateUser({ password });

    if (error) {
      errorBox.textContent = error.message;
      errorBox.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Set password & continue';
      return;
    }

    window.location.href = 'admin.html';
  });
</script>
<script src="../mobile-nav.js"></script>
<script src="../cookie-consent.js"></script>
</body>
</html>
