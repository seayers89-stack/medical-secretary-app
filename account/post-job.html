<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://api.resend.com https://api.stripe.com; frame-src https://js.stripe.com;">
<title>Post a job — Veyn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
<style>

  :root{
    --ink:#2E3F54;
    --paper:#F7F4ED;
    --gold:#B8924A;
    --slate:#5C6470;
    --green:#3F6B4F;
    --white:#FFFFFF;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Special Elite', cursive;
    -webkit-font-smoothing:antialiased;
  }
  a{ color:inherit; text-decoration:none; }

  header{
    position:sticky; top:0; z-index:50;
    background:rgba(247,244,237,0.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(46,63,84,0.08);
  }
  .nav{ display:flex; align-items:center; justify-content:space-between; padding:20px 32px; max-width:1180px; margin:0 auto; }
  .nav-left{ display:flex; align-items:center; gap:48px; }
  .nav-links{ display:flex; flex-wrap:wrap; row-gap:8px; column-gap:20px; font-size:14px; font-weight:500; color:var(--slate); }
  .nav-links a:hover{ color:var(--ink); }
  .nav-links a.active{ color:var(--ink); border-bottom:2px solid var(--gold); padding-bottom:2px; }
  @media (max-width:760px){ .nav-links{ display:none; } }
  .logo{ font-family:'Cormorant Garamond', serif; font-weight:600; font-size:24px; display:flex; align-items:center; gap:8px; }
  .logo .dot{ width:7px; height:7px; border-radius:50%; background:var(--gold); display:inline-block; }
  .btn-login{
    font-family:'Special Elite', cursive; font-size:14px; font-weight:600; color:var(--ink);
    border:1.5px solid rgba(46,63,84,0.2); padding:9px 20px; border-radius:7px;
  }

  .wrap{ max-width:560px; margin:0 auto; padding:48px 32px 100px; }
  .eyebrow{
    font-family:'Special Elite', cursive; font-size:11.5px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--gold); margin-bottom:14px;
  }
  h1{ font-family:'Cormorant Garamond', serif; font-weight:600; font-size:28px; margin-bottom:10px; }
  .sub{ color:var(--slate); font-size:14.5px; line-height:1.6; margin-bottom:30px; }

  .form-card{
    background:var(--white); border:1px solid rgba(46,63,84,0.08); border-radius:18px; padding:36px 40px;
  }
  .field{ margin-bottom:18px; }
  .field label{ display:block; font-size:13px; font-weight:600; margin-bottom:7px; color:var(--ink); }
  .field input, .field textarea{
    width:100%; padding:12px 14px; font-family:'Special Elite', cursive; font-size:14.5px;
    border:1.5px solid rgba(46,63,84,0.15); border-radius:8px; background:var(--paper); color:var(--ink);
  }
  .field textarea{ resize:vertical; min-height:90px; }
  .field input:focus, .field textarea:focus{ outline:none; border-color:var(--gold); }

  .chip-row{ display:flex; gap:8px; flex-wrap:wrap; }
  .chip-toggle{ position:relative; }
  .chip-toggle input{ position:absolute; opacity:0; width:0; height:0; }
  .chip-toggle span{
    display:inline-block; font-size:13.5px; padding:8px 16px; border-radius:999px;
    border:1px solid rgba(46,63,84,0.15); cursor:pointer; user-select:none;
  }
  .chip-toggle input:checked + span{ background:var(--ink); color:var(--paper); border-color:var(--ink); }

  .price-note{
    background:rgba(184,146,74,0.08); border:1px solid rgba(184,146,74,0.3); color:#8F6F36;
    padding:12px 16px; border-radius:10px; font-size:13.5px; margin-bottom:22px;
  }

  .btn{
    font-family:'Special Elite', cursive; font-weight:600; font-size:15px; padding:14px 28px;
    border-radius:8px; cursor:pointer; border:none; width:100%; text-align:center; margin-top:8px;
    background:var(--ink); color:var(--paper);
  }

  #loading{ color:var(--slate); font-size:14.5px; }

</style>
<link rel="stylesheet" href="../veyn-buttons.css"></head>
<body>

<header>
  <div class="nav">
    <div class="nav-left">
      <a href="../index.html" class="logo"><span class="dot"></span>veyn</a>
      <nav class="nav-links" id="account-nav">
        <a href="../index.html">Home</a>
        <a href="../veyn-for-secretaries.html">For Secretaries</a>
        <a href="../veyn-for-consultants.html">For Consultants</a>
        <a href="../veyn-about.html">About</a>
      </nav>
    </div>
    <button class="btn-login" id="logout-btn">Log out</button>
  </div>
</header>

<div class="wrap">
  <div class="eyebrow">Job board</div>
  <h1>Post a role</h1>
  <p class="sub">One posting, £29 — unlimited messaging with anyone who responds, no extra per-contact fees.</p>

  <p id="loading">Checking your account…</p>
  <div class="form-card" id="form-card" style="display:none;">
    <div class="price-note">£29 one-time — covers this posting plus unlimited contact with every respondent.</div>
    <form id="post-form">
      <div class="field">
        <label for="title">Job title</label>
        <input type="text" id="title" placeholder="e.g. Private Secretary — Orthopaedics" required>
      </div>
      <div class="field">
        <label for="specialty">Specialty</label>
        <input type="text" id="specialty" placeholder="e.g. Orthopaedics">
      </div>
      <div class="field">
        <label>Systems used</label>
        <div class="chip-row" id="systems-row">
          <label class="chip-toggle"><input type="checkbox" value="Semble"><span>Semble</span></label>
          <label class="chip-toggle"><input type="checkbox" value="Pabau"><span>Pabau</span></label>
          <label class="chip-toggle"><input type="checkbox" value="Cliniko"><span>Cliniko</span></label>
          <label class="chip-toggle"><input type="checkbox" value="WriteUpp"><span>WriteUpp</span></label>
          <label class="chip-toggle"><input type="checkbox" value="TM3"><span>TM3</span></label>
          <label class="chip-toggle"><input type="checkbox" value="Carebit"><span>Carebit</span></label>
          <label class="chip-toggle"><input type="checkbox" value="Zesty"><span>Zesty</span></label>
          <label class="chip-toggle"><input type="checkbox" value="DGL Practice Manager"><span>DGL Practice Manager</span></label>
          <label class="chip-toggle"><input type="checkbox" value="Meddbase"><span>Meddbase</span></label>
          <label class="chip-toggle"><input type="checkbox" value="Healthcode / ePractice"><span>Healthcode / ePractice</span></label>
          <label class="chip-toggle"><input type="checkbox" value="Medesk"><span>Medesk</span></label>
          <label class="chip-toggle"><input type="checkbox" value="MidexPRO"><span>MidexPRO</span></label>
          <label class="chip-toggle"><input type="checkbox" value="Compucare"><span>Compucare</span></label>
          <label class="chip-toggle"><input type="checkbox" value="Cerner"><span>Cerner</span></label>
          <label class="chip-toggle"><input type="checkbox" value="Epic"><span>Epic</span></label>
          <label class="chip-toggle"><input type="checkbox" value="Lorenzo"><span>Lorenzo</span></label>
          <label class="chip-toggle"><input type="checkbox" value="SystmOne"><span>SystmOne</span></label>
          <label class="chip-toggle"><input type="checkbox" value="EMIS"><span>EMIS</span></label>
          <label class="chip-toggle"><input type="checkbox" value="PACS/RIS systems"><span>PACS/RIS systems</span></label>
          <label class="chip-toggle"><input type="checkbox" value="eRS (NHS e-Referral Service)"><span>eRS (NHS e-Referral Service)</span></label>
          <label class="chip-toggle"><input type="checkbox" value="IMS MAXIMS"><span>IMS MAXIMS</span></label>
          <label class="chip-toggle"><input type="checkbox" value="Ultragenda"><span>Ultragenda</span></label>
        </div>
      </div>
      <div class="field">
        <label for="location">Location</label>
        <input type="text" id="location" placeholder="e.g. London">
      </div>
      <div class="field">
        <label for="day-rate">Day rate</label>
        <input type="text" id="day-rate" placeholder="e.g. £180–£220/day">
      </div>
      <div class="field">
        <label for="description">Description</label>
        <textarea id="description" placeholder="What the role involves, hours, start date…" required></textarea>
      </div>
      <button type="submit" class="btn" id="submit-btn">Continue to payment — £29</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0/dist/umd/supabase.js" integrity="sha384-3wY11tldQ5+yWqAvmTN4XtQvnjoTva0cV15O/O/O5NTtp0ivVopSzLOzsVXWZse9" crossorigin="anonymous"></script>
<script src="supabase-config.js"></script>
<script src="account-nav.js"></script>
<script>
  let userId = null;

  (async () => {
    const navResult = await renderAccountNav(document.getElementById('account-nav'), supabaseClient, 'post-job');
    if (!navResult) {
      window.location.href = 'login.html';
      return;
    }
    const { session, profile } = navResult;
    userId = session.user.id;

    if (!profile || profile.role !== 'consultant') {
      document.getElementById('loading').textContent = 'Only consultant accounts can post jobs.';
      return;
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('form-card').style.display = 'block';
  })();

  document.getElementById('post-form').addEventListener('submit', (e) => {
    e.preventDefault();

    const systems = Array.from(document.querySelectorAll('#systems-row input:checked')).map(el => el.value);

    const jobDraft = {
      title: document.getElementById('title').value.trim(),
      specialty: document.getElementById('specialty').value.trim(),
      systems: systems,
      location: document.getElementById('location').value.trim(),
      day_rate: document.getElementById('day-rate').value.trim(),
      description: document.getElementById('description').value.trim(),
    };

    sessionStorage.setItem('veyn_job_draft', JSON.stringify(jobDraft));
    window.location.href = 'mock-checkout.html?type=job_posting';
  });

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    window.location.href = 'login.html';
  });
</script>

<script src="../mobile-nav.js"></script>
<script src="../cookie-consent.js"></script>
</body>
</html>
