<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin — Veyn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

  :root{
    --ink:#1B2430;
    --paper:#F7F4ED;
    --gold:#B8924A;
    --slate:#5C6470;
    --green:#3F6B4F;
    --white:#FFFFFF;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{ color:inherit; text-decoration:none; }

  header{
    position:sticky; top:0; z-index:50;
    background:rgba(247,244,237,0.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(27,36,48,0.08);
  }
  .nav{ display:flex; align-items:center; justify-content:space-between; padding:20px 32px; max-width:1180px; margin:0 auto; }
  .nav-left{ display:flex; align-items:center; gap:48px; }
  .logo{ font-family:'Fraunces', serif; font-weight:600; font-size:24px; display:flex; align-items:center; gap:8px; }
  .logo .dot{ width:7px; height:7px; border-radius:50%; background:var(--gold); display:inline-block; }
  .nav-links{ display:flex; gap:36px; font-size:14px; font-weight:500; color:var(--slate); }
  .nav-links a:hover{ color:var(--ink); }
  @media (max-width:760px){ .nav-links{ display:none; } }
  .btn-login{
    font-family:'Inter', sans-serif; font-size:14px; font-weight:600; color:var(--ink);
    border:1.5px solid rgba(27,36,48,0.2); padding:9px 20px; border-radius:7px; cursor:pointer; background:none;
  }

  .wrap{ max-width:900px; margin:0 auto; padding:48px 32px 100px; }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace; font-size:11.5px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--gold); margin-bottom:14px;
  }
  h1{ font-family:'Fraunces', serif; font-weight:600; font-size:30px; margin-bottom:10px; }
  .sub{ color:var(--slate); font-size:14.5px; line-height:1.6; margin-bottom:32px; }

  .tab-row{ display:flex; gap:8px; margin-bottom:28px; border-bottom:1px solid rgba(27,36,48,0.08); }
  .tab-btn{
    font-family:'Inter', sans-serif; font-weight:600; font-size:14.5px; color:var(--slate);
    background:none; border:none; cursor:pointer; padding:10px 4px; margin-bottom:-1px;
    border-bottom:2px solid transparent;
  }
  .tab-btn.active{ color:var(--ink); border-bottom-color:var(--gold); }
  .tab-btn:hover{ color:var(--ink); }
  .tab-panel{ display:none; }
  .tab-panel.active{ display:block; }

  .card{
    background:var(--white); border:1px solid rgba(27,36,48,0.08); border-radius:14px;
    padding:22px 26px; margin-bottom:14px;
  }
  .card.resolved{ opacity:0.55; }

  .item-meta{ font-size:12px; color:var(--slate); display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
  .item-meta .tag{
    font-family:'IBM Plex Mono', monospace; font-size:10px; letter-spacing:0.04em; text-transform:uppercase;
    background:rgba(184,146,74,0.12); color:#8F6F36; padding:3px 9px; border-radius:999px;
  }
  .item-meta .tag.reply{ background:rgba(63,107,79,0.1); color:var(--green); }

  .quoted-content{
    background:var(--paper); border-radius:8px; padding:12px 16px; font-size:14px; line-height:1.6;
    margin-bottom:10px; white-space:pre-wrap;
  }
  .quoted-title{ font-weight:600; margin-bottom:4px; }
  .report-reason{ font-size:13.5px; color:#a33; margin-bottom:12px; }
  .report-reason strong{ font-weight:600; }

  .row-actions{ display:flex; gap:8px; flex-wrap:wrap; }
  .row-actions button{
    font-family:'Inter', sans-serif; font-weight:600; font-size:12.5px; padding:7px 14px;
    border-radius:7px; cursor:pointer; border:1.5px solid rgba(27,36,48,0.15); background:none; color:var(--ink);
  }
  .row-actions button.danger{ border-color:#a33; color:#a33; }
  .row-actions button.success{ border-color:var(--green); color:var(--green); }
  .row-actions button:disabled{ opacity:0.5; cursor:not-allowed; }

  .submission-fields{ display:grid; gap:10px; margin-top:10px; }
  .submission-field .field-label{
    font-family:'IBM Plex Mono', monospace; font-size:10px; letter-spacing:0.04em; text-transform:uppercase;
    color:var(--slate); margin-bottom:3px;
  }
  .submission-field .field-value{ font-size:14px; line-height:1.6; white-space:pre-wrap; }
  .submission-field .field-value.empty{ color:var(--slate); font-style:italic; }

  .question-editor{
    margin-top:14px; padding:18px 20px; background:var(--paper); border-radius:10px;
    border:1px solid rgba(27,36,48,0.08);
  }
  .question-editor .field{ margin-bottom:12px; }
  .question-editor label{
    display:block; font-size:12px; font-weight:600; margin-bottom:5px; color:var(--ink);
  }
  .question-editor input, .question-editor textarea{
    width:100%; padding:9px 12px; font-family:'Inter', sans-serif; font-size:13.5px;
    border:1.5px solid rgba(27,36,48,0.15); border-radius:7px; background:var(--white); color:var(--ink);
  }
  .question-editor textarea{ resize:vertical; min-height:60px; }
  .question-editor input:focus, .question-editor textarea:focus{ outline:none; border-color:var(--gold); }
  .question-editor .distractor-row{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }

  .empty-state{ text-align:center; color:var(--slate); font-size:14px; padding:30px 0; }
  .denied-state{ text-align:center; color:var(--slate); font-size:15px; padding:60px 0; }

  .staff-row{
    display:flex; justify-content:space-between; align-items:center; gap:16px;
    padding:14px 18px;
  }
  .staff-row .staff-name{ font-weight:600; font-size:14.5px; }
  .staff-row .staff-meta{ font-size:12px; color:var(--slate); margin-top:2px; }
  .staff-row .super-tag{
    font-family:'IBM Plex Mono', monospace; font-size:10px; letter-spacing:0.04em; text-transform:uppercase;
    color:#8F6F36; background:rgba(184,146,74,0.12); padding:3px 9px; border-radius:999px; margin-left:8px;
  }
  #staff-search{
    width:100%; padding:11px 14px; font-family:'Inter', sans-serif; font-size:14.5px;
    border:1.5px solid rgba(27,36,48,0.15); border-radius:8px; background:var(--white); color:var(--ink);
    margin-bottom:16px;
  }
  #staff-search:focus{ outline:none; border-color:var(--gold); }

  #loading{ color:var(--slate); font-size:14.5px; }

  footer{ background:var(--ink); color:rgba(247,244,237,0.7); padding:40px 32px 28px; margin-top:40px; }
  .foot-bottom{ max-width:1180px; margin:0 auto; font-size:12.5px; color:rgba(247,244,237,0.45); display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; }

</style>
</head>
<body>

<header>
  <div class="nav">
    <div class="nav-left">
      <a href="../index.html" class="logo"><span class="dot"></span>veyn</a>
      <nav class="nav-links" id="account-nav"></nav>
    </div>
    <button class="btn-login" id="logout-btn">Log out</button>
  </div>
</header>

<div class="wrap">
  <div class="eyebrow">Admin</div>
  <h1>Moderation &amp; submissions</h1>
  <p class="sub">Reported community content and "share your knowledge" responses. Staff only.</p>

  <p id="loading">Loading…</p>
  <div id="denied" class="denied-state" style="display:none;">You don't have access to this area.</div>

  <div id="page-content" style="display:none;">
    <div class="tab-row" id="tab-row">
      <button class="tab-btn active" data-tab="reports">Reported content</button>
      <button class="tab-btn" data-tab="knowledge">Share your knowledge</button>
      <button class="tab-btn" data-tab="staff" id="staff-tab-btn" style="display:none;">Manage admins</button>
    </div>

    <div class="tab-panel active" id="tab-reports">
      <div id="reports-list"></div>
    </div>

    <div class="tab-panel" id="tab-knowledge">
      <div id="knowledge-list"></div>
    </div>

    <div class="tab-panel" id="tab-staff">
      <p class="sub" style="margin-bottom:20px;">Only super admins can grant or remove admin access.</p>
      <input type="text" id="staff-search" placeholder="Search by name…">
      <div id="staff-list"></div>
    </div>
  </div>
</div>

<footer>
  <div class="foot-bottom">
    <span>© 2026 Veyn. All rights reserved.</span>
    <span>Internal — not linked from the public site.</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="account-nav.js"></script>
<script>
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  async function fetchProfilesByIds(ids) {
    const uniqueIds = [...new Set(ids.filter(Boolean))];
    if (uniqueIds.length === 0) return {};
    const { data } = await supabaseClient.from('profiles').select('id, first_name, last_name').in('id', uniqueIds);
    const byId = {};
    (data || []).forEach(p => { byId[p.id] = p; });
    return byId;
  }

  async function loadReports() {
    const list = document.getElementById('reports-list');
    const { data: reports, error } = await supabaseClient
      .from('community_reports')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      list.innerHTML = `<div class="empty-state">Could not load reports: ${escapeHtml(error.message)}</div>`;
      return;
    }
    if (!reports || reports.length === 0) {
      list.innerHTML = `<div class="empty-state">No reports yet.</div>`;
      return;
    }

    const postIds = reports.filter(r => r.post_id).map(r => r.post_id);
    const replyIds = reports.filter(r => r.reply_id).map(r => r.reply_id);

    const [postsRes, repliesRes] = await Promise.all([
      postIds.length ? supabaseClient.from('community_posts').select('id, title, body, profile_id').in('id', postIds) : { data: [] },
      replyIds.length ? supabaseClient.from('community_replies').select('id, body, profile_id, post_id').in('id', replyIds) : { data: [] },
    ]);

    const postsById = {};
    (postsRes.data || []).forEach(p => { postsById[p.id] = p; });
    const repliesById = {};
    (repliesRes.data || []).forEach(r => { repliesById[r.id] = r; });

    const authorIds = [
      ...Object.values(postsById).map(p => p.profile_id),
      ...Object.values(repliesById).map(r => r.profile_id),
      ...reports.map(r => r.reporter_id),
    ];
    const profilesById = await fetchProfilesByIds(authorIds);

    function nameFor(id) {
      const p = profilesById[id];
      return p ? `${p.first_name} ${p.last_name}` : 'Unknown';
    }

    list.innerHTML = reports.map(r => {
      const post = r.post_id ? postsById[r.post_id] : null;
      const reply = r.reply_id ? repliesById[r.reply_id] : null;
      const content = post
        ? `<div class="quoted-title">${escapeHtml(post.title)}</div><div>${escapeHtml(post.body)}</div>`
        : reply
          ? escapeHtml(reply.body)
          : '<em>Original content no longer exists.</em>';
      const authorId = post ? post.profile_id : (reply ? reply.profile_id : null);
      const type = post ? 'Post' : 'Reply';
      const postLink = r.post_id ? `community-post.html?id=${r.post_id}` : (reply ? `community-post.html?id=${reply.post_id}` : null);

      return `
        <div class="card ${r.resolved ? 'resolved' : ''}" data-report-id="${r.id}">
          <div class="item-meta">
            <span class="tag ${type === 'Reply' ? 'reply' : ''}">${type}</span>
            <span>Reported by ${escapeHtml(nameFor(r.reporter_id))}</span>
            <span>${formatDate(r.created_at)}</span>
            ${r.resolved ? '<span>· Resolved</span>' : ''}
          </div>
          <div class="quoted-content">
            <div style="font-size:12px; color:var(--slate); margin-bottom:4px;">By ${escapeHtml(nameFor(authorId))}</div>
            ${content}
          </div>
          ${r.reason ? `<div class="report-reason"><strong>Reason given:</strong> ${escapeHtml(r.reason)}</div>` : ''}
          <div class="row-actions">
            ${postLink ? `<a href="${postLink}" target="_blank"><button type="button">View thread</button></a>` : ''}
            ${!r.resolved ? `<button type="button" class="success" data-resolve="${r.id}">Mark resolved</button>` : ''}
            ${post ? `<button type="button" class="danger" data-delete-post="${post.id}">Delete post</button>` : ''}
            ${reply ? `<button type="button" class="danger" data-delete-reply="${reply.id}">Delete reply</button>` : ''}
            <button type="button" class="danger" data-remove-report="${r.id}">Remove report</button>
          </div>
        </div>
      `;
    }).join('');

    list.querySelectorAll('[data-resolve]').forEach(btn => {
      btn.addEventListener('click', async () => {
        btn.disabled = true;
        await supabaseClient.from('community_reports').update({ resolved: true }).eq('id', btn.dataset.resolve);
        await loadReports();
      });
    });
    list.querySelectorAll('[data-delete-post]').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('Delete this post and all its replies?')) return;
        await supabaseClient.from('community_posts').delete().eq('id', btn.dataset.deletePost);
        await loadReports();
      });
    });
    list.querySelectorAll('[data-delete-reply]').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('Delete this reply?')) return;
        await supabaseClient.from('community_replies').delete().eq('id', btn.dataset.deleteReply);
        await loadReports();
      });
    });
    list.querySelectorAll('[data-remove-report]').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('Remove this report? The underlying post/reply will not be affected.')) return;
        await supabaseClient.from('community_reports').delete().eq('id', btn.dataset.removeReport);
        await loadReports();
      });
    });
  }

  const SYSTEM_NAMES = { carebit: 'Carebit', semble: 'Semble', pabau: 'Pabau', dgl: 'DGL Practice Manager' };

  async function loadKnowledgeSubmissions() {
    const list = document.getElementById('knowledge-list');
    const { data: submissions, error } = await supabaseClient
      .from('system_knowledge_submissions')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      list.innerHTML = `<div class="empty-state">Could not load submissions: ${escapeHtml(error.message)}</div>`;
      return;
    }
    if (!submissions || submissions.length === 0) {
      list.innerHTML = `<div class="empty-state">No submissions yet.</div>`;
      return;
    }

    const profilesById = await fetchProfilesByIds(submissions.map(s => s.profile_id));

    function fieldHtml(label, value) {
      const v = (value || '').trim();
      return `
        <div class="submission-field">
          <div class="field-label">${label}</div>
          <div class="field-value ${v ? '' : 'empty'}">${v ? escapeHtml(v) : 'Not answered'}</div>
        </div>
      `;
    }

    list.innerHTML = submissions.map(s => {
      const p = profilesById[s.profile_id];
      const name = p ? `${p.first_name} ${p.last_name}` : 'Unknown';
      const systemName = s.system_slug === 'other' ? (s.system_name_other || 'Other system') : (SYSTEM_NAMES[s.system_slug] || s.system_slug);

      return `
        <div class="card ${s.status === 'discarded' ? 'resolved' : ''}" data-submission-id="${s.id}">
          <div class="item-meta">
            <span class="tag">${escapeHtml(systemName)}</span>
            <span>${escapeHtml(name)}</span>
            <span>${formatDate(s.created_at)}</span>
            ${s.years_experience ? `<span>${escapeHtml(s.years_experience)} experience</span>` : ''}
            ${s.specialty ? `<span>${escapeHtml(s.specialty)}</span>` : ''}
            ${s.status === 'incorporated' ? '<span>· Added to quiz</span>' : ''}
            ${s.status === 'discarded' ? '<span>· Discarded</span>' : ''}
          </div>
          <div class="submission-fields">
            ${fieldHtml('Failure points', s.failure_points)}
            ${fieldHtml('Common new-user mistakes', s.common_mistakes)}
            ${fieldHtml('Sequence (how to do it)', s.sequence_notes)}
            ${fieldHtml('Location (where things live)', s.location_notes)}
            ${fieldHtml('Terminology', s.terminology_notes)}
            ${fieldHtml('Version-specific notes', s.version_notes)}
          </div>
          <div class="row-actions" style="margin-top:14px;">
            ${s.status === 'pending' ? `<button type="button" class="success" data-convert="${s.id}">Convert to quiz question</button>` : ''}
            <button type="button" class="danger" data-discard="${s.id}">Remove</button>
          </div>
          ${s.status === 'pending' ? `<div class="question-editor" id="editor-${s.id}" style="display:none;"></div>` : ''}
        </div>
      `;
    }).join('');

    list.querySelectorAll('[data-convert]').forEach(btn => {
      btn.addEventListener('click', () => openQuestionEditor(btn.dataset.convert, submissions));
    });
    list.querySelectorAll('[data-discard]').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('Discard this submission? This deletes it permanently.')) return;
        await supabaseClient.from('system_knowledge_submissions').delete().eq('id', btn.dataset.discard);
        await loadKnowledgeSubmissions();
      });
    });
  }

  function openQuestionEditor(submissionId, submissions) {
    const s = submissions.find(x => x.id === submissionId);
    const editor = document.getElementById(`editor-${submissionId}`);
    if (editor.style.display === 'block') { editor.style.display = 'none'; return; }

    const draftAnswer = (s.failure_points || s.common_mistakes || '').trim();

    editor.innerHTML = `
      <div class="field">
        <label>Question</label>
        <textarea id="qe-question-${s.id}" placeholder="Write the question this submission suggests…"></textarea>
      </div>
      <div class="field">
        <label>Correct answer</label>
        <textarea id="qe-correct-${s.id}">${escapeHtml(draftAnswer)}</textarea>
      </div>
      <div class="field">
        <label>Wrong answers (3 distractors)</label>
        <div class="distractor-row">
          <input type="text" id="qe-d1-${s.id}" placeholder="Distractor 1">
          <input type="text" id="qe-d2-${s.id}" placeholder="Distractor 2">
          <input type="text" id="qe-d3-${s.id}" placeholder="Distractor 3">
        </div>
      </div>
      <div class="row-actions">
        <button type="button" class="success" id="qe-save-${s.id}">Save question</button>
        <button type="button" id="qe-cancel-${s.id}">Cancel</button>
      </div>
      <p id="qe-status-${s.id}" style="font-size:13px; margin-top:8px; display:none;"></p>
    `;
    editor.style.display = 'block';

    document.getElementById(`qe-cancel-${s.id}`).addEventListener('click', () => {
      editor.style.display = 'none';
    });

    document.getElementById(`qe-save-${s.id}`).addEventListener('click', async () => {
      const question = document.getElementById(`qe-question-${s.id}`).value.trim();
      const correctAnswer = document.getElementById(`qe-correct-${s.id}`).value.trim();
      const distractors = [
        document.getElementById(`qe-d1-${s.id}`).value.trim(),
        document.getElementById(`qe-d2-${s.id}`).value.trim(),
        document.getElementById(`qe-d3-${s.id}`).value.trim(),
      ].filter(Boolean);

      const statusEl = document.getElementById(`qe-status-${s.id}`);
      if (!question || !correctAnswer || distractors.length !== 3) {
        statusEl.textContent = 'Fill in the question, correct answer, and all three distractors.';
        statusEl.style.display = 'block';
        statusEl.style.color = '#a33';
        return;
      }

      const saveBtn = document.getElementById(`qe-save-${s.id}`);
      saveBtn.disabled = true;

      const { data: { user } } = await supabaseClient.auth.getUser();
      const { error } = await supabaseClient.from('system_quiz_questions').insert({
        system_slug: s.system_slug,
        question,
        correct_answer: correctAnswer,
        distractors,
        source_submission_id: s.id,
        created_by: user.id,
      });

      if (error) {
        statusEl.textContent = error.message;
        statusEl.style.display = 'block';
        statusEl.style.color = '#a33';
        saveBtn.disabled = false;
        return;
      }

      await supabaseClient.from('system_knowledge_submissions').update({ status: 'incorporated' }).eq('id', s.id);
      await loadKnowledgeSubmissions();
    });
  }

  let allStaff = [];

  async function loadStaffList() {
    const { data, error } = await supabaseClient.rpc('list_profiles_for_admin');
    const list = document.getElementById('staff-list');

    if (error) {
      list.innerHTML = `<div class="empty-state">Could not load staff list: ${escapeHtml(error.message)}</div>`;
      return;
    }

    allStaff = data || [];
    renderStaffList();
  }

  function renderStaffList() {
    const list = document.getElementById('staff-list');
    const query = document.getElementById('staff-search').value.trim().toLowerCase();

    const filtered = allStaff.filter(p => `${p.first_name} ${p.last_name}`.toLowerCase().includes(query));

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state">No matching accounts.</div>`;
      return;
    }

    list.innerHTML = filtered.map(p => `
      <div class="card staff-row">
        <div>
          <div class="staff-name">${escapeHtml(p.first_name)} ${escapeHtml(p.last_name)} ${p.is_super_admin ? '<span class="super-tag">Super admin</span>' : ''}</div>
          <div class="staff-meta">${escapeHtml(p.role)}</div>
        </div>
        ${p.is_super_admin
          ? ''
          : p.is_admin
            ? `<button type="button" class="danger" data-revoke="${p.id}">Remove admin</button>`
            : `<button type="button" class="success" data-grant="${p.id}">Make admin</button>`
        }
      </div>
    `).join('');

    list.querySelectorAll('[data-grant]').forEach(btn => {
      btn.addEventListener('click', async () => {
        btn.disabled = true;
        const { error } = await supabaseClient.rpc('set_admin_status', { target_user_id: btn.dataset.grant, new_is_admin: true });
        if (error) { alert(error.message); btn.disabled = false; return; }
        await loadStaffList();
      });
    });
    list.querySelectorAll('[data-revoke]').forEach(btn => {
      btn.addEventListener('click', async () => {
        btn.disabled = true;
        const { error } = await supabaseClient.rpc('set_admin_status', { target_user_id: btn.dataset.revoke, new_is_admin: false });
        if (error) { alert(error.message); btn.disabled = false; return; }
        await loadStaffList();
      });
    });
  }

  document.getElementById('staff-search').addEventListener('input', renderStaffList);

  (async () => {
    const navResult = await renderAccountNav(document.getElementById('account-nav'), supabaseClient, 'admin');
    const loading = document.getElementById('loading');

    if (!navResult) {
      window.location.href = 'login.html';
      return;
    }

    const { data: isAdmin } = await supabaseClient.rpc('is_admin');

    if (!isAdmin) {
      loading.style.display = 'none';
      document.getElementById('denied').style.display = 'block';
      return;
    }

    loading.style.display = 'none';
    document.getElementById('page-content').style.display = 'block';

    await loadReports();
    await loadKnowledgeSubmissions();

    const { data: isSuperAdmin } = await supabaseClient.rpc('is_super_admin');
    if (isSuperAdmin) {
      document.getElementById('staff-tab-btn').style.display = 'inline-block';
      await loadStaffList();
    }
  })();

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
    });
  });

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    window.location.href = 'login.html';
  });
</script>

<script src="../mobile-nav.js"></script>
</body>
</html>
