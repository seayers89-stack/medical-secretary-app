<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://api.resend.com https://api.stripe.com; frame-src https://js.stripe.com;">
<title>Task Tracker — Veyn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
<style>

  :root{
    --ink:#2E3F54;
    --paper:#F7F4ED;
    --gold:#B8924A;
    --slate:#5C6470;
    --green:#3F6B4F;
    --white:#FFFFFF;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Special Elite', cursive;
    -webkit-font-smoothing:antialiased;
  }
  a{ color:inherit; text-decoration:none; }

  header{
    position:sticky; top:0; z-index:50;
    background:rgba(247,244,237,0.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(46,63,84,0.08);
  }
  .nav{ display:flex; align-items:center; justify-content:space-between; padding:20px 32px; max-width:1180px; margin:0 auto; }
  .nav-left{ display:flex; align-items:center; gap:48px; }
  .logo{ font-family:'Cormorant Garamond', serif; font-weight:600; font-size:24px; display:flex; align-items:center; gap:8px; }
  .logo .dot{ width:7px; height:7px; border-radius:50%; background:var(--gold); display:inline-block; }
  .nav-links{ display:flex; flex-wrap:wrap; row-gap:8px; column-gap:20px; font-size:14px; font-weight:500; color:var(--slate); }
  .nav-links a:hover{ color:var(--ink); }
  .nav-links a.active{ color:var(--ink); border-bottom:2px solid var(--gold); padding-bottom:2px; }
  @media (max-width:760px){ .nav-links{ display:none; } }
  .btn-login{
    font-family:'Special Elite', cursive; font-size:14px; font-weight:600; color:var(--ink);
    border:1.5px solid rgba(46,63,84,0.2); padding:9px 20px; border-radius:7px; cursor:pointer; background:none;
  }

  .wrap{ max-width:680px; margin:0 auto; padding:48px 32px 100px; }
  .eyebrow{
    font-family:'Special Elite', cursive; font-size:11.5px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--gold); margin-bottom:14px;
  }
  h1{ font-family:'Cormorant Garamond', serif; font-weight:600; font-size:30px; margin-bottom:10px; }
  .sub{ color:var(--slate); font-size:14.5px; line-height:1.6; margin-bottom:32px; }

  #loading{ color:var(--slate); font-size:14.5px; }

  /* ---------- embedded Task Tracker (its own dark theme, scoped to .tt-shell) ---------- */

  .tt-shell {
    --ink: #1B2430;
    --surface: #232D3D;
    --surface-raised: #2B3648;
    --border: #384258;
    --text: #EDEFF2;
    --text-muted: #8B95A5;
    --amber: #D4A24C;
    --amber-soft: rgba(212, 162, 76, 0.14);
    --green: #6FAF8C;
    --green-soft: rgba(111, 175, 140, 0.14);
    --red: #C77B6B;
    --red-soft: rgba(199, 123, 107, 0.16);
    --orange: #E08E45;
    --orange-soft: rgba(224, 142, 69, 0.16);

    background: var(--ink);
    border-radius: 16px;
    padding: 24px 20px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--text);
  }

  .tt-shell #app-root {
    max-width: 600px;
    margin: 0 auto;
  }

  .mono {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 4px;
  }

  .title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--amber);
  }

  .date { font-size: 13px; color: var(--text-muted); }

  .total-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin: 18px 0 8px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }

  .total-label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .total-value { font-size: 34px; font-weight: 600; letter-spacing: 0.02em; }

  .estimate-line {
    font-size: 12.5px;
    color: var(--text-muted);
    margin: -4px 0 14px;
  }

  .estimate-line .mono { color: var(--text); font-weight: 600; }

  .late-banner {
    background: var(--red-soft);
    border: 1px solid var(--red);
    color: var(--red);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    margin-bottom: 10px;
  }

  .budget-banner {
    background: var(--orange-soft);
    border: 1px solid var(--orange);
    color: var(--orange);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    margin-bottom: 10px;
  }

  .suggestion-banner {
    background: var(--green-soft);
    border: 1px solid var(--green);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .suggestion-banner .repeat-badge {
    color: var(--green);
    border-color: var(--green);
  }

  .suggestion-banner.raise {
    background: var(--orange-soft);
    border-color: var(--orange);
  }

  .suggestion-banner.raise .repeat-badge {
    color: var(--orange);
    border-color: var(--orange);
  }

  .tt-shell .error {
    color: var(--red);
    font-size: 13px;
    margin-bottom: 10px;
  }

  .add-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .add-row-main { display: flex; gap: 8px; }

  .add-row-main input[type="text"] {
    flex: 1;
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 12px;
    font-size: 14px;
    outline: none;
    min-width: 0;
  }

  .add-row-sub { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .add-row-sub input[type="time"], .add-row-sub input[type="number"], .add-row-sub select {
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 8px 10px;
    font-size: 13px;
    outline: none;
  }

  .add-row-sub label {
    font-size: 11.5px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .tt-shell .field-group { display: flex; flex-direction: column; gap: 4px; }

  .add-row-main input:focus, .add-row-sub select:focus, .add-row-sub input:focus {
    border-color: var(--amber);
  }

  .checkbox-field { display: flex; align-items: center; gap: 6px; }
  .checkbox-field label {
    display: flex; align-items: center; gap: 5px;
    text-transform: none; font-size: 12.5px; cursor: pointer;
  }

  .add-row-schedule {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .add-row-schedule label {
    font-size: 11.5px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .day-chip {
    font-size: 11.5px;
    color: var(--text-muted);
    border: 1px solid var(--border);
    background: var(--surface-raised);
    border-radius: 12px;
    padding: 3px 9px;
    cursor: pointer;
    user-select: none;
  }

  .day-chip:hover { border-color: var(--green); }

  .day-chip.selected {
    color: var(--green);
    border-color: var(--green);
    background: var(--green-soft);
  }

  .add-row-schedule input[type="text"] {
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 6px 10px;
    font-size: 13px;
    outline: none;
  }

  .edit-panel {
    background: var(--surface-raised);
    border: 1px solid var(--amber);
    border-radius: 10px;
    padding: 10px 12px;
    margin: -4px 0 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .edit-panel input[type="time"], .edit-panel select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 6px 10px;
    font-size: 13px;
    outline: none;
  }

  .edit-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .edit-actions .add-btn {
    padding: 5px 14px;
    font-size: 13px;
  }

  .add-btn {
    background: var(--amber);
    color: var(--ink);
    border: none;
    border-radius: 8px;
    padding: 0 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .add-btn:hover { opacity: 0.9; }

  .task-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 26px; }

  .task {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .task.running { border-color: var(--amber); background: var(--amber-soft); }
  .task.done { opacity: 0.55; }
  .task.late { border-color: var(--red); background: var(--red-soft); }
  .task.over-budget { border-color: var(--orange); background: var(--orange-soft); }
  .task.over-budget.late { border-color: var(--red); background: var(--red-soft); }
  .task.urgent { box-shadow: inset 3px 0 0 var(--red); }

  .task-slot {
    font-size: 12px;
    color: var(--text-muted);
    min-width: 58px;
    font-weight: 600;
  }

  .task.late .task-slot { color: var(--red); }

  .task-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }

  .task-name { font-size: 14px; word-break: break-word; }
  .task.done .task-name { text-decoration: line-through; }

  .task-tags { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

  .repeat-badge {
    font-size: 10.5px;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 7px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  .repeat-badge:hover { border-color: var(--red); color: var(--red); }

  .late-tag {
    font-size: 10.5px;
    color: var(--red);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .urgent-tag {
    font-size: 10.5px;
    color: var(--red);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .budget-tag {
    font-size: 10.5px;
    color: var(--orange);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .budget-hint { font-size: 10.5px; color: var(--text-muted); }

  .carried-tag {
    font-size: 10.5px;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 7px;
    white-space: nowrap;
  }

  .tag-chip {
    font-size: 10.5px;
    color: var(--green);
    border: 1px solid var(--green);
    background: var(--green-soft);
    border-radius: 10px;
    padding: 1px 7px;
    white-space: nowrap;
  }

  .add-tag-chip {
    font-size: 10.5px;
    color: var(--text-muted);
    border: 1px dashed var(--border);
    background: transparent;
    border-radius: 10px;
    padding: 1px 7px;
    white-space: nowrap;
    cursor: pointer;
  }

  .add-tag-chip:hover { border-color: var(--green); color: var(--green); }

  .filter-bar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 14px;
  }

  .filter-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-right: 2px;
  }

  .filter-chip {
    font-size: 11.5px;
    color: var(--text-muted);
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 12px;
    padding: 3px 10px;
    cursor: pointer;
    user-select: none;
  }

  .filter-chip:hover { border-color: var(--green); color: var(--text); }

  .filter-chip.active {
    color: var(--green);
    border-color: var(--green);
    background: var(--green-soft);
  }

  .filter-clear {
    font-size: 11.5px;
    color: var(--text-muted);
    cursor: pointer;
    text-decoration: underline;
  }

  .range-tabs {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }

  .range-tab {
    font-size: 11.5px;
    color: var(--text-muted);
    border: 1px solid var(--border);
    background: var(--surface-raised);
    border-radius: 12px;
    padding: 3px 10px;
    cursor: pointer;
    user-select: none;
  }

  .range-tab:hover { border-color: var(--green); }

  .range-tab.active {
    color: var(--green);
    border-color: var(--green);
    background: var(--green-soft);
  }

  .task-time { font-size: 15px; font-weight: 600; min-width: 60px; text-align: right; }

  .task-actions { display: flex; gap: 6px; }

  .icon-btn {
    background: var(--surface-raised);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 13px;
    padding: 0;
  }

  .icon-btn:hover { border-color: var(--amber); }
  .icon-btn.danger:hover { border-color: var(--red); color: var(--red); }
  .icon-btn.urgent-active { border-color: var(--red); color: var(--red); background: var(--red-soft); }

  .tt-shell .empty-state {
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    padding: 30px 10px;
    border: 1px dashed var(--border);
    border-radius: 10px;
    margin-bottom: 26px;
  }

  .history { border-top: 1px solid var(--border); padding-top: 16px; }

  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }

  .history-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
  .history-toggle { font-size: 12px; color: var(--text-muted); }
  .history-body { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }

  .history-day {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }

  .history-day-head { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; cursor: pointer; }
  .history-day-tasks { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
  .history-task-row { display: flex; justify-content: space-between; font-size: 12.5px; color: var(--text-muted); }
  .history-task-row span:last-child { color: var(--text); }

  .tt-shell .loading { text-align: center; color: var(--text-muted); font-size: 13px; padding: 20px; }

  .tt-shell .hint { font-size: 11.5px; color: var(--text-muted); margin: -12px 0 18px; }

  footer{ background:var(--ink); color:rgba(247,244,237,0.7); padding:40px 32px 28px; margin-top:40px; }
  .foot-bottom{ max-width:1180px; margin:0 auto; font-size:12.5px; color:rgba(247,244,237,0.45); display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; }

</style>

<header>
  <div class="nav">
    <div class="nav-left">
      <a href="../index.html" class="logo"><span class="dot"></span>veyn</a>
      <nav class="nav-links" id="account-nav">
        <a href="../index.html">Home</a>
        <a href="../veyn-for-secretaries.html">For Secretaries</a>
        <a href="../veyn-for-consultants.html">For Consultants</a>
        <a href="../veyn-about.html">About</a>
      </nav>
    </div>
    <button class="btn-login" id="logout-btn">Log out</button>
  </div>
</header>

<div class="wrap">
  <div class="eyebrow">Daily Tools</div>
  <h1>Task Tracker</h1>
  <p class="sub">Time what you're working on, get a nudge when something overruns its budget, and see where your day goes by tag.</p>

  <p id="loading">Loading…</p>

  <div id="page-content" style="display:none;">
    <div class="tt-shell">
      <div id="app-root"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0/dist/umd/supabase.js" integrity="sha384-3wY11tldQ5+yWqAvmTN4XtQvnjoTva0cV15O/O/O5NTtp0ivVopSzLOzsVXWZse9" crossorigin="anonymous"></script>
<script src="supabase-config.js"></script>
<script src="account-nav.js"></script>
<script>
  document.getElementById('logout-btn').addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    window.location.href = 'login.html';
  });

  (async () => {
    const navResult = await renderAccountNav(document.getElementById('account-nav'), supabaseClient, 'task-tracker');
    const loading = document.getElementById('loading');

    if (!navResult) {
      window.location.href = 'login.html';
      return;
    }
    if (navResult.profile.role !== 'secretary' && !navResult.isAdmin) {
      loading.textContent = 'The Task Tracker is available to secretary accounts.';
      return;
    }

    loading.style.display = 'none';
    document.getElementById('page-content').style.display = 'block';
  })();
</script>

<script>
(function () {
  const root = document.getElementById('app-root');
  const STORAGE_PREFIX = 'taskTracker:';

  // ---------- storage (browser localStorage — data stays on this device/browser) ----------
  function getJSON(key, fallback) {
    try {
      const raw = localStorage.getItem(STORAGE_PREFIX + key);
      if (raw === null) return fallback;
      return JSON.parse(raw);
    } catch (e) { return fallback; }
  }

  function setJSON(key, value) {
    try {
      localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(value));
      return true;
    } catch (e) { return false; }
  }

  // ---------- helpers ----------
  function todayKey(d) {
    d = d || new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + day;
  }

  function formatDateLabel(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
  }

  function formatDuration(ms) {
    const totalSec = Math.floor(ms / 1000);
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    if (h > 0) return h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }

  function timeToMinutes(hhmm) {
    if (!hhmm) return null;
    const parts = hhmm.split(':');
    return parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
  }

  function formatTime12h(hhmm) {
    if (!hhmm) return '';
    const parts = hhmm.split(':');
    let h = parseInt(parts[0], 10);
    const m = parts[1];
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12;
    if (h === 0) h = 12;
    return h + ':' + m + ampm;
  }

  function formatMinutesShort(totalMin) {
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    if (h > 0) return h + 'h' + (m > 0 ? ' ' + m + 'm' : '');
    return m + 'm';
  }

  function uid(prefix) { return (prefix || 't') + Date.now() + Math.random().toString(36).slice(2, 8); }

  const WEEKDAY_SHORT = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ---------- state ----------
  const state = {
    date: todayKey(),
    tasks: [],
    templates: [],
    loaded: false,
    error: null,
    historyOpen: false,
    historyDays: [],
    historyLoaded: false,
    openHistoryDay: null,
    knownDates: new Set(),
    activeTagFilters: new Set(),
    templateSuggestions: {},
    editingTaskId: null,
    tagTimeOpen: false,
    tagTimeRange: 'today',
  };

  const dayCache = {};

  function templateMatchesWeekday(t, weekday) {
    if (Array.isArray(t.weekdays)) return t.weekdays.includes(weekday);
    return t.weekday === weekday;
  }

  function templateMatchesDateOfMonth(t, dom) {
    if (Array.isArray(t.datesOfMonth)) return t.datesOfMonth.includes(dom);
    return t.dayOfMonth === dom;
  }

  function getTemplateStats(templateId) {
    return getJSON('template-stats:' + templateId, []);
  }

  function saveTemplateStats(templateId, records) {
    setJSON('template-stats:' + templateId, records);
  }

  function recordCompletion(task) {
    if (!task.templateId || !task.budgetMin) return;
    const records = getTemplateStats(task.templateId);
    records.push({ date: state.date, elapsedMs: task.elapsedMs, budgetMin: task.budgetMin });
    saveTemplateStats(task.templateId, records.slice(-10));
    recomputeSuggestionFor(task.templateId);
  }

  function recomputeSuggestionFor(templateId) {
    const tpl = state.templates.find(t => t.id === templateId);
    if (!tpl || !tpl.budgetMin) { delete state.templateSuggestions[templateId]; return; }
    const records = getTemplateStats(templateId);
    const lastThree = records.slice(-3);
    if (lastThree.length === 3) {
      const allUnder = lastThree.every(r => r.elapsedMs < r.budgetMin * 60000);
      const allOver = lastThree.every(r => r.elapsedMs > r.budgetMin * 60000);
      if (allUnder || allOver) {
        const avgMs = lastThree.reduce((s, r) => s + r.elapsedMs, 0) / 3;
        let suggested = Math.ceil((avgMs / 60000) / 5) * 5;
        if (suggested < 5) suggested = 5;
        const direction = allUnder ? 'lower' : 'raise';
        if ((direction === 'lower' && suggested < tpl.budgetMin) || (direction === 'raise' && suggested > tpl.budgetMin)) {
          state.templateSuggestions[templateId] = { suggestedMin: suggested, name: tpl.name, direction: direction };
          return;
        }
      }
    }
    delete state.templateSuggestions[templateId];
  }

  function recomputeAllSuggestions() {
    state.templateSuggestions = {};
    state.templates.forEach(t => { if (t.budgetMin) recomputeSuggestionFor(t.id); });
  }

  function applyBudgetSuggestion(templateId) {
    const suggestion = state.templateSuggestions[templateId];
    const tpl = state.templates.find(t => t.id === templateId);
    if (!tpl || !suggestion) return;
    tpl.budgetMin = suggestion.suggestedMin;
    saveTemplates();
    state.tasks.forEach(t => { if (t.templateId === templateId) t.budgetMin = tpl.budgetMin; });
    saveToday();
    saveTemplateStats(templateId, []);
    delete state.templateSuggestions[templateId];
    updateDynamic();
  }

  function dismissSuggestion(templateId) {
    delete state.templateSuggestions[templateId];
    saveTemplateStats(templateId, []);
    updateDynamic();
  }

  function loadToday() {
    state.templates = getJSON('templates', []);
    const idx = getJSON('days-index', []);
    state.knownDates = new Set(idx);

    let dayTasks = getJSON('day:' + state.date, null);

    if (dayTasks === null) {
      const todayWeekday = new Date().getDay();
      const todayDayOfMonth = new Date().getDate();
      const templateTasks = state.templates
        .filter(t => t.repeat === 'daily'
          || (t.repeat === 'weekly' && templateMatchesWeekday(t, todayWeekday))
          || (t.repeat === 'monthly' && templateMatchesDateOfMonth(t, todayDayOfMonth)))
        .map(t => ({
          id: uid(), templateId: t.id, name: t.name, scheduledTime: t.scheduledTime,
          budgetMin: t.budgetMin || null, urgent: !!t.urgent, tags: t.tags || [],
          status: 'idle', elapsedMs: 0, startedAt: null,
        }));

      const carriedTasks = getCarriedOverTasks();
      dayTasks = templateTasks.concat(carriedTasks);

      setJSON('day:' + state.date, dayTasks);
      addToIndex(state.date);
    }

    state.tasks = dayTasks;
    sortTasks();
    state.loaded = true;
    recomputeAllSuggestions();
    buildShell();
    updateDynamic();
    ensureTicking();
  }

  function getCarriedOverTasks() {
    const idx = getJSON('days-index', []);
    const prevDays = idx.filter(d => d !== state.date).sort().reverse();
    if (prevDays.length === 0) return [];
    const prevDate = prevDays[0];
    const prevTasks = getJSON('day:' + prevDate, []);
    return prevTasks
      .filter(t => t.status !== 'done' && !t.templateId)
      .map(t => ({
        id: uid(), templateId: null, name: t.name, scheduledTime: t.scheduledTime,
        budgetMin: t.budgetMin || null, urgent: !!t.urgent, tags: t.tags || [],
        status: 'idle', elapsedMs: 0, startedAt: null,
        carriedOver: true,
      }));
  }

  function sortTasks() {
    state.tasks.sort((a, b) => {
      const aDone = a.status === 'done';
      const bDone = b.status === 'done';
      if (aDone !== bDone) return aDone ? 1 : -1;
      if (!!a.urgent !== !!b.urgent) return a.urgent ? -1 : 1;
      const am = a.scheduledTime ? timeToMinutes(a.scheduledTime) : 9999;
      const bm = b.scheduledTime ? timeToMinutes(b.scheduledTime) : 9999;
      return am - bm;
    });
  }

  function saveToday() {
    const ok = setJSON('day:' + state.date, state.tasks);
    state.error = ok ? null : 'Could not save. Your changes may not persist.';
    addToIndex(state.date);
    updateDynamic();
  }

  function saveTemplates() {
    setJSON('templates', state.templates);
  }

  function addToIndex(dateStr) {
    if (state.knownDates.has(dateStr)) return;
    let idx = getJSON('days-index', []);
    if (!idx.includes(dateStr)) {
      idx.push(dateStr);
      idx.sort().reverse();
      setJSON('days-index', idx);
    }
    state.knownDates.add(dateStr);
  }

  function loadHistoryIndex() {
    const idx = getJSON('days-index', []);
    state.historyDays = idx.filter(d => d !== state.date).sort().reverse();
    state.historyLoaded = true;
    updateDynamic();
  }

  function loadDayDetail(dateStr) {
    if (dayCache[dateStr]) return dayCache[dateStr];
    const tasks = getJSON('day:' + dateStr, []);
    dayCache[dateStr] = tasks;
    return tasks;
  }

  function elapsedFor(task) {
    let ms = task.elapsedMs || 0;
    if (task.status === 'running' && task.startedAt) ms += Date.now() - task.startedAt;
    return ms;
  }

  function totalToday() {
    return state.tasks.reduce((sum, t) => sum + elapsedFor(t), 0);
  }

  function estimatedMinutesToday() {
    return state.tasks.reduce((sum, t) => sum + (t.budgetMin || 0), 0);
  }

  function budgetedTaskCount() {
    return state.tasks.filter(t => t.budgetMin).length;
  }

  function isLate(task) {
    if (!task.scheduledTime || task.status === 'done') return false;
    if (state.date !== todayKey()) return false;
    const now = new Date();
    const nowMin = now.getHours() * 60 + now.getMinutes();
    return nowMin > timeToMinutes(task.scheduledTime);
  }

  function lateCount() { return state.tasks.filter(isLate).length; }

  function isOverBudget(task) {
    if (!task.budgetMin || task.status === 'done') return false;
    return elapsedFor(task) > task.budgetMin * 60000;
  }

  function overBudgetCount() { return state.tasks.filter(isOverBudget).length; }

  let tickInterval15, tickInterval1;
  function ensureTicking() {
    if (tickInterval15) return;
    tickInterval15 = setInterval(updateDynamic, 1000 * 15);
    tickInterval1 = setInterval(() => {
      if (state.tasks.some(t => t.status === 'running')) updateRunningTimeText();
    }, 1000);
  }

  function updateRunningTimeText() {
    state.tasks.forEach(t => {
      if (t.status === 'running') {
        const el = document.querySelector('[data-time="' + t.id + '"]');
        if (el) el.textContent = formatDuration(elapsedFor(t));
      }
    });
    const totalEl = document.getElementById('total-region');
    if (totalEl) totalEl.textContent = formatDuration(totalToday());
  }

  // ---------- mutations ----------
  function addTask(opts) {
    const name = (opts.name || '').trim();
    if (!name) return;
    const scheduledTime = opts.time || null;
    const repeat = opts.repeat || 'none';
    const budgetMin = opts.budgetMin ? parseInt(opts.budgetMin, 10) : null;
    const urgent = !!opts.urgent;
    const tags = (opts.tags || '').split(',').map(t => t.trim().toLowerCase()).filter(Boolean);

    let templateId = null;
    if (repeat === 'daily' || repeat === 'weekly' || repeat === 'monthly') {
      templateId = uid('tpl');
      const now = new Date();

      let weekdays = null;
      if (repeat === 'weekly') {
        weekdays = (opts.weekdays && opts.weekdays.length) ? opts.weekdays.slice() : [now.getDay()];
      }

      let datesOfMonth = null;
      if (repeat === 'monthly') {
        const parsed = (opts.monthDates || '')
          .split(',')
          .map(s => parseInt(s.trim(), 10))
          .filter(n => !isNaN(n) && n >= 1 && n <= 31);
        datesOfMonth = parsed.length ? Array.from(new Set(parsed)).sort((a, b) => a - b) : [now.getDate()];
      }

      state.templates.push({
        id: templateId, name: name, scheduledTime: scheduledTime,
        repeat: repeat,
        weekdays: weekdays,
        datesOfMonth: datesOfMonth,
        budgetMin: budgetMin, urgent: urgent, tags: tags,
      });
      saveTemplates();
    }

    state.tasks.push({
      id: uid(), templateId: templateId, name: name, scheduledTime: scheduledTime,
      budgetMin: budgetMin, urgent: urgent, tags: tags,
      status: 'idle', elapsedMs: 0, startedAt: null,
    });
    sortTasks();
    saveToday();
  }

  function startTask(id) {
    state.tasks.forEach(t => {
      if (t.status === 'running' && t.id !== id) {
        t.elapsedMs = elapsedFor(t);
        t.status = 'idle';
        t.startedAt = null;
      }
    });
    const task = state.tasks.find(t => t.id === id);
    if (task) { task.status = 'running'; task.startedAt = Date.now(); }
    saveToday();
  }

  function pauseTask(id) {
    const task = state.tasks.find(t => t.id === id);
    if (task && task.status === 'running') {
      task.elapsedMs = elapsedFor(task);
      task.status = 'idle';
      task.startedAt = null;
    }
    saveToday();
  }

  function finishTask(id) {
    const task = state.tasks.find(t => t.id === id);
    if (task) {
      task.elapsedMs = elapsedFor(task);
      task.status = 'done';
      task.startedAt = null;
      recordCompletion(task);
    }
    sortTasks();
    saveToday();
  }

  function reopenTask(id) {
    const task = state.tasks.find(t => t.id === id);
    if (task) task.status = 'idle';
    sortTasks();
    saveToday();
  }

  function deleteTask(id) {
    state.tasks = state.tasks.filter(t => t.id !== id);
    saveToday();
  }

  function stopRepeating(templateId, taskId) {
    state.templates = state.templates.filter(t => t.id !== templateId);
    saveTemplates();
    const task = state.tasks.find(t => t.id === taskId);
    if (task) task.templateId = null;
    saveToday();
  }

  function toggleUrgent(id) {
    const task = state.tasks.find(t => t.id === id);
    if (!task) return;
    task.urgent = !task.urgent;
    if (task.templateId) {
      const tpl = state.templates.find(t => t.id === task.templateId);
      if (tpl) { tpl.urgent = task.urgent; saveTemplates(); }
    }
    sortTasks();
    saveToday();
  }

  function editTaskToggle(id) {
    state.editingTaskId = (state.editingTaskId === id) ? null : id;
    updateDynamic({ forceList: true });
  }

  function cancelEdit() {
    state.editingTaskId = null;
    updateDynamic({ forceList: true });
  }

  function saveTaskEdit(id) {
    const task = state.tasks.find(t => t.id === id);
    if (!task) return;

    const timeInput = document.getElementById('edit-time-input');
    const repeatSelect = document.getElementById('edit-repeat-select');
    const newTime = timeInput.value || null;
    const newRepeat = repeatSelect.value;

    let newWeekdays = null;
    let newDatesOfMonth = null;

    if (newRepeat === 'weekly') {
      newWeekdays = Array.from(document.querySelectorAll('#edit-weekly-row .day-chip.selected'))
        .map(el => parseInt(el.getAttribute('data-day'), 10));
      if (newWeekdays.length === 0) newWeekdays = [new Date().getDay()];
    }
    if (newRepeat === 'monthly') {
      const raw = document.getElementById('edit-monthdates-input').value;
      const parsed = raw.split(',').map(s => parseInt(s.trim(), 10)).filter(n => !isNaN(n) && n >= 1 && n <= 31);
      newDatesOfMonth = parsed.length ? Array.from(new Set(parsed)).sort((a, b) => a - b) : [new Date().getDate()];
    }

    task.scheduledTime = newTime;

    if (newRepeat === 'none') {
      if (task.templateId) {
        state.templates = state.templates.filter(t => t.id !== task.templateId);
        saveTemplates();
        task.templateId = null;
      }
    } else if (task.templateId) {
      const tpl = state.templates.find(t => t.id === task.templateId);
      if (tpl) {
        tpl.repeat = newRepeat;
        tpl.scheduledTime = newTime;
        tpl.weekdays = newWeekdays;
        tpl.datesOfMonth = newDatesOfMonth;
        saveTemplates();
      }
    } else {
      const newTemplateId = uid('tpl');
      state.templates.push({
        id: newTemplateId, name: task.name, scheduledTime: newTime,
        repeat: newRepeat, weekdays: newWeekdays, datesOfMonth: newDatesOfMonth,
        budgetMin: task.budgetMin || null, urgent: !!task.urgent, tags: task.tags || [],
      });
      task.templateId = newTemplateId;
      saveTemplates();
    }

    state.editingTaskId = null;
    sortTasks();
    saveToday();
  }

  function addTagToTask(id) {
    const task = state.tasks.find(t => t.id === id);
    if (!task) return;
    const raw = window.prompt('Add tag(s), comma-separated:');
    if (raw === null) return;
    const newTags = raw.split(',').map(t => t.trim().toLowerCase()).filter(Boolean);
    if (newTags.length === 0) return;
    const existing = new Set(task.tags || []);
    newTags.forEach(t => existing.add(t));
    task.tags = Array.from(existing);
    if (task.templateId) {
      const tpl = state.templates.find(t => t.id === task.templateId);
      if (tpl) { tpl.tags = task.tags; saveTemplates(); }
    }
    saveToday();
  }

  function editTagOnTask(id, oldTag) {
    const task = state.tasks.find(t => t.id === id);
    if (!task) return;
    const raw = window.prompt('Edit tag:', oldTag);
    if (raw === null) return;
    const newTag = raw.trim().toLowerCase();
    if (!newTag) { removeTagFromTask(id, oldTag); return; }
    const set = new Set((task.tags || []).map(t => t === oldTag ? newTag : t));
    task.tags = Array.from(set);
    if (task.templateId) {
      const tpl = state.templates.find(t => t.id === task.templateId);
      if (tpl) { tpl.tags = task.tags; saveTemplates(); }
    }
    if (state.activeTagFilters.has(oldTag)) {
      state.activeTagFilters.delete(oldTag);
      state.activeTagFilters.add(newTag);
    }
    saveToday();
  }

  function removeTagFromTask(id, tag) {
    const task = state.tasks.find(t => t.id === id);
    if (!task || !task.tags) return;
    task.tags = task.tags.filter(t => t !== tag);
    if (task.templateId) {
      const tpl = state.templates.find(t => t.id === task.templateId);
      if (tpl) { tpl.tags = task.tags; saveTemplates(); }
    }
    if (state.activeTagFilters.has(tag) && !state.tasks.some(t => (t.tags || []).includes(tag))) {
      state.activeTagFilters.delete(tag);
    }
    saveToday();
  }

  function repeatLabel(task) {
    if (!task.templateId) return '';
    const tpl = state.templates.find(t => t.id === task.templateId);
    if (!tpl) return '';
    if (tpl.repeat === 'daily') return '↻ daily';
    if (tpl.repeat === 'weekly') {
      const days = Array.isArray(tpl.weekdays) ? tpl.weekdays : (tpl.weekday != null ? [tpl.weekday] : []);
      const names = days.slice().sort((a, b) => a - b).map(d => WEEKDAY_SHORT[d]).join(',');
      return '↻ weekly' + (names ? ' (' + names + ')' : '');
    }
    if (tpl.repeat === 'monthly') {
      const dates = Array.isArray(tpl.datesOfMonth) ? tpl.datesOfMonth : (tpl.dayOfMonth != null ? [tpl.dayOfMonth] : []);
      return '↻ monthly' + (dates.length ? ' (' + dates.join(',') + ')' : '');
    }
    return '';
  }

  function allTagsUsed() {
    const set = new Set();
    state.tasks.forEach(t => (t.tags || []).forEach(tag => set.add(tag)));
    return Array.from(set).sort();
  }

  function toggleTagFilter(tag) {
    if (state.activeTagFilters.has(tag)) state.activeTagFilters.delete(tag);
    else state.activeTagFilters.add(tag);
    updateDynamic();
  }

  function clearTagFilters() {
    state.activeTagFilters.clear();
    updateDynamic();
  }

  function visibleTasks() {
    if (state.activeTagFilters.size === 0) return state.tasks;
    return state.tasks.filter(t => (t.tags || []).some(tag => state.activeTagFilters.has(tag)));
  }

  // ---------- rendering: shell is built ONCE, the add-panel is never rebuilt after ----------
  function buildShell() {
    root.innerHTML =
      '<div class="header"><span class="title">Task Tracker</span><span class="date">' + formatDateLabel(state.date) + '</span></div>' +
      '<div id="error-region"></div>' +
      '<div class="total-row"><span class="total-label">Today</span><span class="total-value mono" id="total-region">0:00</span></div>' +
      '<div class="estimate-line" id="estimate-region"></div>' +
      '<div id="tagtime-region"></div>' +
      '<div id="suggestions-region"></div>' +
      '<div id="banners-region"></div>' +
      '<div class="add-panel">' +
        '<div class="add-row-main"><input type="text" id="new-task-input" placeholder="Add a task…" maxlength="120" /></div>' +
        '<div class="add-row-sub">' +
          '<div class="field-group"><label>Time</label><input type="time" id="new-task-time" /></div>' +
          '<div class="field-group"><label>Budget (mins)</label><input type="number" id="new-task-budget" min="1" step="1" placeholder="e.g. 15" style="width:80px;" /></div>' +
          '<div class="checkbox-field"><label><input type="checkbox" id="new-task-urgent" /> Urgent</label></div>' +
          '<div class="field-group"><label>Tags</label><input type="text" id="new-task-tags" placeholder="billing, urgent" style="width:130px;" /></div>' +
          '<div class="field-group"><label>Repeat</label><select id="new-task-repeat">' +
            '<option value="none">Just today</option>' +
            '<option value="daily">Daily</option>' +
            '<option value="weekly">Weekly</option>' +
            '<option value="monthly">Monthly</option>' +
          '</select></div>' +
          '<button class="add-btn" id="add-task-btn" style="align-self:flex-end;">Add</button>' +
        '</div>' +
        '<div class="add-row-schedule" id="weekly-days-row" style="display:none;">' +
          '<label>On</label>' +
          WEEKDAY_SHORT.map((name, i) => '<span class="day-chip" data-day="' + i + '">' + name + '</span>').join('') +
        '</div>' +
        '<div class="add-row-schedule" id="monthly-dates-row" style="display:none;">' +
          '<label>On date(s)</label>' +
          '<input type="text" id="new-task-monthdates" placeholder="e.g. 1, 15, 28" style="width:150px;" />' +
        '</div>' +
      '</div>' +
      '<div class="hint">&#9654; start the clock · &#10073;&#10073; pause · &#10003; mark done. Set a budget to get an alert when a task overruns. Tap a ↻ badge to stop it repeating.</div>' +
      '<div id="filter-region"></div>' +
      '<div id="tasklist-region"></div>' +
      '<div id="history-region"></div>';

    const input = document.getElementById('new-task-input');
    const timeInput = document.getElementById('new-task-time');
    const budgetInput = document.getElementById('new-task-budget');
    const urgentInput = document.getElementById('new-task-urgent');
    const tagsInput = document.getElementById('new-task-tags');
    const repeatSelect = document.getElementById('new-task-repeat');
    const addBtn = document.getElementById('add-task-btn');
    const weeklyRow = document.getElementById('weekly-days-row');
    const monthlyRow = document.getElementById('monthly-dates-row');
    const monthDatesInput = document.getElementById('new-task-monthdates');

    function updateScheduleVisibility() {
      weeklyRow.style.display = repeatSelect.value === 'weekly' ? 'flex' : 'none';
      monthlyRow.style.display = repeatSelect.value === 'monthly' ? 'flex' : 'none';
    }
    repeatSelect.addEventListener('change', updateScheduleVisibility);

    weeklyRow.querySelectorAll('.day-chip').forEach(chip => {
      chip.addEventListener('click', () => chip.classList.toggle('selected'));
    });

    function submit() {
      const selectedWeekdays = Array.from(weeklyRow.querySelectorAll('.day-chip.selected'))
        .map(el => parseInt(el.getAttribute('data-day'), 10));
      addTask({
        name: input.value, time: timeInput.value, budgetMin: budgetInput.value,
        urgent: urgentInput.checked, tags: tagsInput.value, repeat: repeatSelect.value,
        weekdays: selectedWeekdays, monthDates: monthDatesInput.value,
      });
      input.value = '';
      timeInput.value = '';
      budgetInput.value = '';
      urgentInput.checked = false;
      tagsInput.value = '';
      monthDatesInput.value = '';
      weeklyRow.querySelectorAll('.day-chip.selected').forEach(c => c.classList.remove('selected'));
      repeatSelect.value = 'none';
      updateScheduleVisibility();
      input.focus();
    }

    addBtn.addEventListener('click', submit);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });

    root.addEventListener('click', handleAppClick);
  }

  // updateDynamic only ever touches error/total/banners/tasklist/history regions —
  // it never rebuilds the add-panel, so the task-name input is never re-created
  // and never loses focus or in-progress typing, no matter how often this runs.
  function updateDynamic(opts) {
    opts = opts || {};
    const errorEl = document.getElementById('error-region');
    if (errorEl) {
      errorEl.innerHTML = state.error
        ? '<div class="error">' + state.error + ' <span class="repeat-badge" data-action="retry-save" style="cursor:pointer;">Retry</span></div>'
        : '';
    }

    const totalEl = document.getElementById('total-region');
    if (totalEl) totalEl.textContent = formatDuration(totalToday());

    const estimateEl = document.getElementById('estimate-region');
    if (estimateEl) {
      const budgetedCount = budgetedTaskCount();
      if (budgetedCount === 0) {
        estimateEl.innerHTML = '';
      } else {
        const estMin = estimatedMinutesToday();
        estimateEl.innerHTML = 'Estimated <span class="mono">' + formatMinutesShort(estMin) + '</span> today, based on budgets set on ' + budgetedCount + ' task' + (budgetedCount > 1 ? 's' : '') + '.';
      }
    }

    const suggestionsEl = document.getElementById('suggestions-region');
    if (suggestionsEl) {
      const tplIds = Object.keys(state.templateSuggestions);
      suggestionsEl.innerHTML = tplIds.map(tid => {
        const s = state.templateSuggestions[tid];
        const isRaise = s.direction === 'raise';
        const message = isRaise
          ? 'The last 3 times you did "' + escapeHtml(s.name) + '" it went over budget — raise it to ' + s.suggestedMin + 'm?'
          : 'The last 3 times you did "' + escapeHtml(s.name) + '" it came in under budget — lower it to ' + s.suggestedMin + 'm?';
        return '<div class="suggestion-banner' + (isRaise ? ' raise' : '') + '">' +
          message + ' ' +
          '<span class="repeat-badge" data-action="apply-suggestion" data-tplid="' + tid + '" style="cursor:pointer;">Update to ' + s.suggestedMin + 'm</span>' +
          '<span class="filter-clear" data-action="dismiss-suggestion" data-tplid="' + tid + '">Dismiss</span>' +
          '</div>';
      }).join('');
    }

    const late = lateCount();
    const overBudget = overBudgetCount();
    const bannersEl = document.getElementById('banners-region');
    if (bannersEl) {
      bannersEl.innerHTML =
        (late > 0 ? '<div class="late-banner">' + late + ' task' + (late > 1 ? 's are' : ' is') + ' past its scheduled time.</div>' : '') +
        (overBudget > 0 ? '<div class="budget-banner">' + overBudget + ' task' + (overBudget > 1 ? 's have' : ' has') + ' gone over its time budget.</div>' : '');
    }

    const filterEl = document.getElementById('filter-region');
    if (filterEl) {
      const tags = allTagsUsed();
      if (tags.length === 0) {
        filterEl.innerHTML = '';
      } else {
        filterEl.innerHTML = '<div class="filter-bar"><span class="filter-label">Filter</span>' +
          tags.map(tag => {
            const active = state.activeTagFilters.has(tag);
            return '<span class="filter-chip' + (active ? ' active' : '') + '" data-action="toggle-tag-filter" data-tag="' + escapeHtml(tag) + '">' + escapeHtml(tag) + '</span>';
          }).join('') +
          (state.activeTagFilters.size > 0 ? '<span class="filter-clear" data-action="clear-tag-filters">Clear</span>' : '') +
          '</div>';
      }
    }

    const listEl = document.getElementById('tasklist-region');
    if (listEl && (!state.editingTaskId || opts.forceList)) {
      const tasksToShow = visibleTasks();
      listEl.innerHTML = tasksToShow.length
        ? '<div class="task-list">' + tasksToShow.map(taskRow).join('') + '</div>'
        : (state.tasks.length
            ? '<div class="empty-state">No tasks match the selected tag' + (state.activeTagFilters.size > 1 ? 's' : '') + '.</div>'
            : '<div class="empty-state">No tasks yet — add one above to start timing.</div>');

      if (state.editingTaskId) {
        const editRepeatSelect = document.getElementById('edit-repeat-select');
        if (editRepeatSelect) {
          editRepeatSelect.addEventListener('change', () => {
            const weeklyRow = document.getElementById('edit-weekly-row');
            const monthlyRow = document.getElementById('edit-monthly-row');
            if (weeklyRow) weeklyRow.style.display = editRepeatSelect.value === 'weekly' ? 'flex' : 'none';
            if (monthlyRow) monthlyRow.style.display = editRepeatSelect.value === 'monthly' ? 'flex' : 'none';
          });
        }
      }
    }

    const historyEl = document.getElementById('history-region');
    if (historyEl) historyEl.innerHTML = historySection();

    const tagTimeEl = document.getElementById('tagtime-region');
    if (tagTimeEl) tagTimeEl.innerHTML = tagTimeSection();
  }

  function taskRow(task) {
    const running = task.status === 'running';
    const done = task.status === 'done';
    const late = isLate(task);
    const overBudget = isOverBudget(task);
    const urgent = !!task.urgent;
    const cls = 'task' + (running ? ' running' : '') + (done ? ' done' : '') + (late ? ' late' : '') + (overBudget ? ' over-budget' : '') + (urgent ? ' urgent' : '');
    const urgentBtnCls = 'icon-btn' + (urgent ? ' urgent-active' : '');
    const urgentBtn = '<button class="' + urgentBtnCls + '" data-action="toggle-urgent" data-id="' + task.id + '" title="' + (urgent ? 'Unmark urgent' : 'Mark urgent') + '">&#33;</button>';

    let actions = '';
    if (done) {
      actions = urgentBtn +
                '<button class="icon-btn" data-action="edit-task" data-id="' + task.id + '" title="Edit time/repeat">&#9998;</button>' +
                '<button class="icon-btn" data-action="reopen" data-id="' + task.id + '" title="Reopen">&#8635;</button>' +
                '<button class="icon-btn danger" data-action="delete" data-id="' + task.id + '" title="Delete">&#10005;</button>';
    } else if (running) {
      actions = urgentBtn +
                '<button class="icon-btn" data-action="edit-task" data-id="' + task.id + '" title="Edit time/repeat">&#9998;</button>' +
                '<button class="icon-btn" data-action="pause" data-id="' + task.id + '" title="Pause">&#10073;&#10073;</button>' +
                '<button class="icon-btn" data-action="finish" data-id="' + task.id + '" title="Mark done">&#10003;</button>' +
                '<button class="icon-btn danger" data-action="delete" data-id="' + task.id + '" title="Delete">&#10005;</button>';
    } else {
      actions = urgentBtn +
                '<button class="icon-btn" data-action="edit-task" data-id="' + task.id + '" title="Edit time/repeat">&#9998;</button>' +
                '<button class="icon-btn" data-action="start" data-id="' + task.id + '" title="Start">&#9654;</button>' +
                '<button class="icon-btn" data-action="finish" data-id="' + task.id + '" title="Mark done">&#10003;</button>' +
                '<button class="icon-btn danger" data-action="delete" data-id="' + task.id + '" title="Delete">&#10005;</button>';
    }

    const rLabel = repeatLabel(task);
    let budgetSnippet = '';
    if (task.budgetMin) {
      if (overBudget) {
        const overMs = elapsedFor(task) - task.budgetMin * 60000;
        budgetSnippet = '<span class="budget-tag">Over by ' + formatDuration(overMs) + '</span>';
      } else {
        budgetSnippet = '<span class="budget-hint">Budget ' + task.budgetMin + 'm</span>';
      }
    }
    const tags = '<div class="task-tags">' +
      (urgent ? '<span class="urgent-tag">Urgent</span>' : '') +
      (rLabel ? '<span class="repeat-badge" data-action="stop-repeat" data-tplid="' + (task.templateId || '') + '" data-taskid="' + task.id + '" title="Click to stop repeating">' + rLabel + '</span>' : '') +
      (task.carriedOver ? '<span class="carried-tag">Carried over</span>' : '') +
      (late ? '<span class="late-tag">Running late</span>' : '') +
      budgetSnippet +
      (task.tags && task.tags.length
        ? task.tags.map(t => '<span class="tag-chip"><span data-action="edit-tag" data-id="' + task.id + '" data-tag="' + escapeHtml(t) + '" style="cursor:pointer;" title="Click to edit">' + escapeHtml(t) + '</span> <span data-action="remove-tag" data-id="' + task.id + '" data-tag="' + escapeHtml(t) + '" style="cursor:pointer;" title="Remove tag">&#10005;</span></span>').join('')
        : '') +
      '<span class="add-tag-chip" data-action="add-tag" data-id="' + task.id + '">+ tag</span>' +
      '</div>';

    const rowHtml = '<div class="' + cls + '">' +
      '<div class="task-slot mono">' + (task.scheduledTime ? formatTime12h(task.scheduledTime) : '') + '</div>' +
      '<div class="task-main"><div class="task-name">' + escapeHtml(task.name) + '</div>' + tags + '</div>' +
      '<div class="task-time mono" data-time="' + task.id + '">' + formatDuration(elapsedFor(task)) + '</div>' +
      '<div class="task-actions">' + actions + '</div>' +
      '</div>';

    return rowHtml + (state.editingTaskId === task.id ? buildEditForm(task) : '');
  }

  function buildEditForm(task) {
    const tpl = task.templateId ? state.templates.find(t => t.id === task.templateId) : null;
    const repeatVal = tpl ? tpl.repeat : 'none';
    const selectedWeekdays = tpl && Array.isArray(tpl.weekdays) ? tpl.weekdays : (tpl && tpl.weekday != null ? [tpl.weekday] : []);
    const selectedDates = tpl && Array.isArray(tpl.datesOfMonth) ? tpl.datesOfMonth : (tpl && tpl.dayOfMonth != null ? [tpl.dayOfMonth] : []);

    const weekdayChips = WEEKDAY_SHORT.map((name, i) =>
      '<span class="day-chip' + (selectedWeekdays.includes(i) ? ' selected' : '') + '" data-action="toggle-edit-day" data-day="' + i + '">' + name + '</span>'
    ).join('');

    return '<div class="edit-panel">' +
      '<div class="add-row-schedule">' +
        '<div class="field-group"><label>Time</label><input type="time" id="edit-time-input" value="' + (task.scheduledTime || '') + '" /></div>' +
        '<div class="field-group"><label>Repeat</label><select id="edit-repeat-select" data-action="edit-repeat-change">' +
          '<option value="none"' + (repeatVal === 'none' ? ' selected' : '') + '>Just today</option>' +
          '<option value="daily"' + (repeatVal === 'daily' ? ' selected' : '') + '>Daily</option>' +
          '<option value="weekly"' + (repeatVal === 'weekly' ? ' selected' : '') + '>Weekly</option>' +
          '<option value="monthly"' + (repeatVal === 'monthly' ? ' selected' : '') + '>Monthly</option>' +
        '</select></div>' +
      '</div>' +
      '<div class="add-row-schedule" id="edit-weekly-row" style="display:' + (repeatVal === 'weekly' ? 'flex' : 'none') + ';">' +
        '<label>On</label>' + weekdayChips +
      '</div>' +
      '<div class="add-row-schedule" id="edit-monthly-row" style="display:' + (repeatVal === 'monthly' ? 'flex' : 'none') + ';">' +
        '<label>On date(s)</label><input type="text" id="edit-monthdates-input" value="' + selectedDates.join(', ') + '" style="width:150px;" />' +
      '</div>' +
      '<div class="edit-actions">' +
        '<button class="add-btn" data-action="save-edit" data-id="' + task.id + '">Save</button>' +
        '<span class="filter-clear" data-action="cancel-edit">Cancel</span>' +
      '</div>' +
    '</div>';
  }

  function dateRangeDates(range) {
    const dates = [];
    const base = new Date(state.date + 'T00:00:00');
    if (range === 'week') {
      const day = base.getDay(); // 0=Sun..6=Sat
      const diffToMonday = (day === 0) ? 6 : day - 1;
      const monday = new Date(base);
      monday.setDate(monday.getDate() - diffToMonday);
      for (let d = new Date(monday); d <= base; d.setDate(d.getDate() + 1)) {
        dates.push(todayKey(d));
      }
    } else if (range === 'month') {
      const first = new Date(base.getFullYear(), base.getMonth(), 1);
      for (let d = new Date(first); d <= base; d.setDate(d.getDate() + 1)) {
        dates.push(todayKey(d));
      }
    } else {
      dates.push(state.date);
    }
    return dates;
  }

  function tagTimeBreakdownForRange(range) {
    const dates = dateRangeDates(range);
    const map = {};
    dates.forEach(dateStr => {
      const tasks = (dateStr === state.date) ? state.tasks : getJSON('day:' + dateStr, []);
      tasks.forEach(t => {
        const ms = (dateStr === state.date) ? elapsedFor(t) : (t.elapsedMs || 0);
        (t.tags || []).forEach(tag => {
          map[tag] = (map[tag] || 0) + ms;
        });
      });
    });
    return Object.keys(map)
      .sort((a, b) => map[b] - map[a])
      .map(tag => ({ tag: tag, ms: map[tag] }));
  }

  function tagTimeSection() {
    const monthBreakdown = tagTimeBreakdownForRange('month');
    if (monthBreakdown.length === 0) return '';

    if (!state.tagTimeOpen) {
      return '<div class="history"><div class="history-header" data-action="toggle-tagtime">' +
        '<span class="history-title">Time by tag</span><span class="history-toggle">Show &#9662;</span></div></div>';
    }

    const range = state.tagTimeRange;
    const breakdown = range === 'month' ? monthBreakdown : tagTimeBreakdownForRange(range);
    const tabs = [['today', 'Today'], ['week', 'This week'], ['month', 'This month']].map(pair =>
      '<span class="range-tab' + (range === pair[0] ? ' active' : '') + '" data-action="set-tagtime-range" data-range="' + pair[0] + '">' + pair[1] + '</span>'
    ).join('');
    const rows = breakdown.length
      ? breakdown.map(item => '<div class="history-task-row"><span>' + escapeHtml(item.tag) + '</span><span class="mono">' + formatDuration(item.ms) + '</span></div>').join('')
      : '<div class="history-task-row"><span>No tagged time in this range.</span><span></span></div>';

    return '<div class="history"><div class="history-header" data-action="toggle-tagtime">' +
      '<span class="history-title">Time by tag</span><span class="history-toggle">Hide &#9652;</span></div>' +
      '<div class="range-tabs">' + tabs + '</div>' +
      '<div class="history-day-tasks" style="margin-top:10px;">' + rows + '</div>' +
      '</div>';
  }

  function historySection() {
    if (!state.historyOpen) {
      return '<div class="history"><div class="history-header" data-action="toggle-history">' +
        '<span class="history-title">Past days</span><span class="history-toggle">Show &#9662;</span></div></div>';
    }
    let body = '';
    if (!state.historyLoaded) {
      body = '<div class="loading">Loading history…</div>';
    } else if (state.historyDays.length === 0) {
      body = '<div class="empty-state">No earlier days logged yet.</div>';
    } else {
      body = '<div class="history-body">' + state.historyDays.map(historyDayRow).join('') + '</div>';
    }
    return '<div class="history"><div class="history-header" data-action="toggle-history">' +
      '<span class="history-title">Past days</span><span class="history-toggle">Hide &#9652;</span></div>' + body + '</div>';
  }

  function historyDayRow(dateStr) {
    const isOpen = state.openHistoryDay === dateStr;
    const cached = dayCache[dateStr];
    let total = 0;
    let inner = '';
    if (cached) {
      total = cached.reduce((s, t) => s + (t.elapsedMs || 0), 0);
      if (isOpen) {
        inner = '<div class="history-day-tasks">' + cached.map(t =>
          '<div class="history-task-row"><span>' + (t.scheduledTime ? formatTime12h(t.scheduledTime) + ' — ' : '') + escapeHtml(t.name) + '</span><span class="mono">' + formatDuration(t.elapsedMs || 0) + '</span></div>'
        ).join('') + '</div>';
      }
    }
    return '<div class="history-day">' +
      '<div class="history-day-head" data-action="toggle-day" data-date="' + dateStr + '">' +
      '<span>' + formatDateLabel(dateStr) + '</span><span class="mono">' + (cached ? formatDuration(total) : '…') + '</span>' +
      '</div>' + inner + '</div>';
  }

  function handleAppClick(e) {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    const action = el.getAttribute('data-action');
    const id = el.getAttribute('data-id');
    if (action === 'start') startTask(id);
    else if (action === 'pause') pauseTask(id);
    else if (action === 'finish') finishTask(id);
    else if (action === 'reopen') reopenTask(id);
    else if (action === 'delete') deleteTask(id);
    else if (action === 'toggle-urgent') toggleUrgent(id);
    else if (action === 'stop-repeat') stopRepeating(el.getAttribute('data-tplid'), el.getAttribute('data-taskid'));
    else if (action === 'retry-save') saveToday();
    else if (action === 'toggle-tag-filter') toggleTagFilter(el.getAttribute('data-tag'));
    else if (action === 'clear-tag-filters') clearTagFilters();
    else if (action === 'add-tag') addTagToTask(id);
    else if (action === 'edit-tag') editTagOnTask(id, el.getAttribute('data-tag'));
    else if (action === 'remove-tag') removeTagFromTask(id, el.getAttribute('data-tag'));
    else if (action === 'apply-suggestion') applyBudgetSuggestion(el.getAttribute('data-tplid'));
    else if (action === 'dismiss-suggestion') dismissSuggestion(el.getAttribute('data-tplid'));
    else if (action === 'edit-task') editTaskToggle(id);
    else if (action === 'save-edit') saveTaskEdit(id);
    else if (action === 'cancel-edit') cancelEdit();
    else if (action === 'toggle-edit-day') el.classList.toggle('selected');
    else if (action === 'toggle-tagtime') { state.tagTimeOpen = !state.tagTimeOpen; updateDynamic(); }
    else if (action === 'set-tagtime-range') { state.tagTimeRange = el.getAttribute('data-range'); updateDynamic(); }
    else if (action === 'toggle-history') {
      state.historyOpen = !state.historyOpen;
      if (state.historyOpen && !state.historyLoaded) { updateDynamic(); loadHistoryIndex(); }
      else updateDynamic();
    } else if (action === 'toggle-day') {
      const date = el.getAttribute('data-date');
      if (state.openHistoryDay === date) { state.openHistoryDay = null; updateDynamic(); }
      else {
        state.openHistoryDay = date;
        updateDynamic();
        loadDayDetail(date);
        updateDynamic();
      }
    }
  }

  loadToday();
})();
</script>

</body>
</html>
