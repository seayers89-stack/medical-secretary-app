<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://api.resend.com https://api.stripe.com; frame-src https://js.stripe.com;">
<title>Payment confirmed — Veyn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#2E3F54; --paper:#F7F4ED; --gold:#B8924A; --slate:#5C6470; --green:#3F6B4F; --white:#FFFFFF; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--paper); color:var(--ink); font-family:'Special Elite', cursive; -webkit-font-smoothing:antialiased; }
  a{ color:inherit; text-decoration:none; }

  header{
    position:sticky; top:0; z-index:50;
    background:rgba(247,244,237,0.92); backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(46,63,84,0.08);
  }
  .nav{ display:flex; align-items:center; justify-content:space-between; padding:20px 32px; max-width:1180px; margin:0 auto; }
  .logo{ font-family:'Fraunces', serif; font-weight:600; font-size:24px; display:flex; align-items:center; gap:8px; }
  .logo .dot{ width:7px; height:7px; border-radius:50%; background:var(--gold); display:inline-block; }

  .wrap{ display:flex; align-items:center; justify-content:center; padding:80px 32px 100px; min-height:60vh; }
  .card{
    width:100%; max-width:440px; background:var(--white); border:1px solid rgba(46,63,84,0.08);
    border-radius:20px; padding:44px 40px; text-align:center;
  }
  .icon{
    width:64px; height:64px; border-radius:50%; background:rgba(63,107,79,0.1);
    display:flex; align-items:center; justify-content:center; margin:0 auto 24px; font-size:28px;
  }
  .eyebrow{
    font-family:'Special Elite', cursive; font-size:11.5px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--green); margin-bottom:12px;
  }
  h1{ font-family:'Fraunces', serif; font-weight:600; font-size:26px; margin-bottom:10px; }
  .sub{ color:var(--slate); font-size:14.5px; line-height:1.6; margin-bottom:28px; }

  .btn{
    font-family:'Special Elite', cursive; font-weight:600; font-size:15px; padding:14px 28px;
    border-radius:8px; cursor:pointer; border:none; width:100%; text-align:center;
    background:var(--ink); color:var(--paper); box-shadow:0 8px 20px -8px rgba(46,63,84,0.5);
    display:block; margin-bottom:10px;
  }
  .btn-ghost{
    background:none; border:1.5px solid rgba(46,63,84,0.2); color:var(--ink);
    box-shadow:none;
  }

  .note{ font-size:12.5px; color:var(--slate); margin-top:20px; line-height:1.6; }

  footer{ background:var(--ink); color:rgba(247,244,237,0.7); padding:40px 32px 28px; }
  .foot-bottom{ max-width:1180px; margin:0 auto; font-size:12.5px; color:rgba(247,244,237,0.45); display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; }
</style>
<link rel="stylesheet" href="../veyn-buttons.css"></head>
<body>

<header>
  <div class="nav">
    <a href="../index.html" class="logo"><span class="dot"></span>veyn</a>
  </div>
</header>

<div class="wrap">
  <div class="card">
    <div class="icon">✓</div>
    <div class="eyebrow">Payment confirmed</div>
    <h1 id="success-title">You're all set</h1>
    <p class="sub" id="success-sub">Your payment has been received and your access is being activated.</p>

    <a class="btn" id="primary-btn" href="profile.html">Go to my profile</a>
    <a class="btn btn-ghost" id="secondary-btn" href="search-secretaries.html" style="display:none;">Browse secretaries</a>

    <p class="note" id="success-note"></p>
  </div>
</div>

<footer>
  <div class="foot-bottom">
    <span>© 2026 Veyn. All rights reserved.</span>
    <span>Founded by a medical secretary, not a market gap.</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0/dist/umd/supabase.js" integrity="sha384-3wY11tldQ5+yWqAvmTN4XtQvnjoTva0cV15O/O/O5NTtp0ivVopSzLOzsVXWZse9" crossorigin="anonymous"></script>
<script src="supabase-config.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const type = params.get('type');

  const primaryBtn = document.getElementById('primary-btn');
  const secondaryBtn = document.getElementById('secondary-btn');

  if (type === 'contact') {
    const secretaryId = params.get('secretary_id');
    document.getElementById('success-title').textContent = 'Conversation unlocked';
    document.getElementById('success-sub').textContent = 'You can now message this secretary directly — no commission if hired.';
    if (secretaryId) {
      // Webhook may take a second — poll for the unlock then redirect to thread
      (async () => {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) return;
        const userId = session.user.id;
        let attempts = 0;
        const check = async () => {
          attempts++;
          const { data } = await supabaseClient
            .from('unlocks')
            .select('id')
            .eq('consultant_id', userId)
            .eq('secretary_id', secretaryId)
            .maybeSingle();
          if (data) {
            primaryBtn.href = `thread.html?consultant_id=${userId}&secretary_id=${secretaryId}`;
            primaryBtn.textContent = 'Open conversation';
          } else if (attempts < 8) {
            setTimeout(check, 1500);
          }
        };
        check();
      })();
    }
    primaryBtn.textContent = 'Open conversation';
    secondaryBtn.style.display = 'block';
    document.getElementById('success-note').textContent = 'If the conversation doesn\'t appear immediately, wait a few seconds and refresh.';

  } else if (type === 'pass') {
    document.getElementById('success-title').textContent = 'Pass activated';
    document.getElementById('success-sub').textContent = 'Your unlimited messaging pass is now active. Browse and contact any secretary during your pass period.';
    primaryBtn.href = 'search-secretaries.html';
    primaryBtn.textContent = 'Browse secretaries';
    secondaryBtn.href = 'profile.html';
    secondaryBtn.textContent = 'View my profile';
    secondaryBtn.style.display = 'block';

  } else if (type === 'job_posting') {
    document.getElementById('success-title').textContent = 'Job posted';
    document.getElementById('success-sub').textContent = 'Your job posting is now live. Secretaries can apply and you can message anyone who responds — no further charge.';
    primaryBtn.href = 'my-postings.html';
    primaryBtn.textContent = 'View my postings';
    document.getElementById('success-note').textContent = 'Your posting may take a few seconds to appear.';

  } else if (type === 'premium_boost') {
    document.getElementById('success-title').textContent = 'Boost activated';
    document.getElementById('success-sub').textContent = 'Your profile is now featured at the top of consultant search results for 30 days.';
    primaryBtn.href = 'profile.html';
    primaryBtn.textContent = 'View my profile';

  } else if (type === 'specialist_course') {
    const slug = params.get('slug');
    document.getElementById('success-title').textContent = 'Course unlocked';
    document.getElementById('success-sub').textContent = 'Your specialist course is ready — complete it at your own pace. Pass the quiz to earn your verified badge.';
    if (slug) {
      primaryBtn.href = `specialist-course.html?slug=${slug}`;
      primaryBtn.textContent = 'Start course';
    } else {
      primaryBtn.href = 'academy.html';
      primaryBtn.textContent = 'Go to academy';
    }

  } else if (type === 'specialist_bundle') {
    document.getElementById('success-title').textContent = 'Bundle unlocked';
    document.getElementById('success-sub').textContent = 'Your 3 specialist courses are ready. Complete each one to earn your verified badges.';
    primaryBtn.href = 'academy.html';
    primaryBtn.textContent = 'Go to academy';
  }
</script>

<script src="../mobile-nav.js"></script>
<script src="../cookie-consent.js"></script>
</body>
</html>
