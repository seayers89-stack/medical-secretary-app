<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://api.resend.com https://api.stripe.com; frame-src https://js.stripe.com;">
<title>Job board — Veyn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

  :root{
    --ink:#1B2430;
    --paper:#F7F4ED;
    --gold:#B8924A;
    --slate:#5C6470;
    --green:#3F6B4F;
    --white:#FFFFFF;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{ color:inherit; text-decoration:none; }

  header{
    position:sticky; top:0; z-index:50;
    background:rgba(247,244,237,0.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(27,36,48,0.08);
  }
  .nav{ display:flex; align-items:center; justify-content:space-between; padding:20px 32px; max-width:1180px; margin:0 auto; }
  .nav-left{ display:flex; align-items:center; gap:48px; }
  .nav-links{ display:flex; gap:36px; font-size:14px; font-weight:500; color:var(--slate); }
  .nav-links a:hover{ color:var(--ink); }
  .nav-links a.active{ color:var(--ink); border-bottom:2px solid var(--gold); padding-bottom:2px; }
  @media (max-width:760px){ .nav-links{ display:none; } }
  .logo{ font-family:'Fraunces', serif; font-weight:600; font-size:24px; display:flex; align-items:center; gap:8px; }
  .logo .dot{ width:7px; height:7px; border-radius:50%; background:var(--gold); display:inline-block; }
  .btn-login{
    font-family:'Inter', sans-serif; font-size:14px; font-weight:600; color:var(--ink);
    border:1.5px solid rgba(27,36,48,0.2); padding:9px 20px; border-radius:7px;
  }

  .wrap{ max-width:760px; margin:0 auto; padding:48px 32px 100px; }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace; font-size:11.5px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--gold); margin-bottom:14px;
  }
  h1{ font-family:'Fraunces', serif; font-weight:600; font-size:30px; margin-bottom:10px; }
  .sub{ color:var(--slate); font-size:14.5px; line-height:1.6; margin-bottom:32px; }

  .job-card{
    background:var(--white); border:1px solid rgba(27,36,48,0.08); border-radius:16px;
    padding:24px 26px; margin-bottom:14px;
  }
  .job-title{ font-family:'Fraunces', serif; font-weight:600; font-size:18px; margin-bottom:6px; }
  .job-meta{ font-size:13px; color:var(--slate); margin-bottom:12px; }
  .job-desc{ font-size:14px; line-height:1.6; color:var(--ink); margin-bottom:16px; }
  .job-chips{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
  .job-chip{
    font-size:12px; padding:5px 12px; border-radius:999px; border:1px solid rgba(27,36,48,0.15); color:var(--slate);
  }
  .respond-btn{
    font-family:'Inter', sans-serif; font-weight:600; font-size:13.5px; padding:9px 18px;
    border-radius:7px; cursor:pointer; border:1.5px solid var(--ink); background:none; color:var(--ink);
  }
  .respond-btn:disabled{ opacity:0.6; cursor:default; }
  .responded-note{ font-size:13px; color:var(--green); font-weight:600; }

  .empty-state{ text-align:center; padding:60px 20px; color:var(--slate); font-size:14.5px; }
  #loading{ color:var(--slate); font-size:14.5px; }

  /* Filters */
  .filter-bar{
    background:var(--white); border:1px solid rgba(27,36,48,0.08); border-radius:14px;
    padding:20px 22px; margin-bottom:22px;
  }
  .filter-row{ display:flex; gap:12px; flex-wrap:wrap; margin-bottom:14px; }
  .filter-row:last-child{ margin-bottom:0; }
  .filter-select, .filter-input{
    font-family:'Inter',sans-serif; font-size:13.5px; padding:9px 13px;
    border:1.5px solid rgba(27,36,48,0.15); border-radius:8px; background:var(--paper); color:var(--ink);
    flex:1; min-width:160px;
  }
  .filter-select:focus, .filter-input:focus{ outline:none; border-color:var(--gold); }
  .filter-tier-label{
    font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--slate); display:block; margin-bottom:8px;
  }
  .chip-row{ display:flex; gap:7px; flex-wrap:wrap; }
  .chip{
    font-size:12.5px; padding:6px 13px; border-radius:999px;
    border:1.5px solid rgba(27,36,48,0.15); color:var(--slate); cursor:pointer;
    transition:background .15s ease, border-color .15s ease, color .15s ease; user-select:none;
  }
  .chip.active{ background:var(--ink); border-color:var(--ink); color:var(--paper); }

  .results-header{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:14px; font-size:13.5px; color:var(--slate);
  }
  .clear-filters{
    font-size:13px; color:var(--gold); font-weight:600; cursor:pointer; background:none; border:none; padding:0;
  }
  .clear-filters:hover{ text-decoration:underline; }

</style>
</head>
<body>

<header>
  <div class="nav">
    <div class="nav-left">
      <a href="../index.html" class="logo"><span class="dot"></span>veyn</a>
      <nav class="nav-links" id="account-nav">
        <a href="../index.html">Home</a>
        <a href="../veyn-for-secretaries.html">For Secretaries</a>
        <a href="../veyn-for-consultants.html">For Consultants</a>
        <a href="../veyn-about.html">About</a>
      </nav>
    </div>
    <a href="login.html" class="btn-login" id="header-login-link">Log in</a>
    <button class="btn-login" id="logout-btn" style="display:none;">Log out</button>
  </div>
</header>

<div class="wrap">
  <div class="eyebrow">Job board</div>
  <h1>Open roles</h1>
  <p class="sub">Free to browse and respond to. Responding to a posting opens messaging with that consultant directly.</p>

  <p id="loading">Loading postings…</p>

  <div id="filter-section" style="display:none;">
    <div class="filter-bar">
      <div class="filter-row">
        <select class="filter-select" id="filter-specialty">
          <option value="">All specialties</option>
        </select>
        <input class="filter-input" id="filter-location" type="text" placeholder="Location…">
      </div>
      <div>
        <span class="filter-tier-label">Systems required</span>
        <div class="chip-row" id="filter-systems"></div>
      </div>
    </div>
    <div class="results-header">
      <span id="results-count"></span>
      <button class="clear-filters" id="clear-filters" style="display:none;">Clear filters</button>
    </div>
  </div>

  <div id="jobs"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0/dist/umd/supabase.js" integrity="sha384-3wY11tldQ5+yWqAvmTN4XtQvnjoTva0cV15O/O/O5NTtp0ivVopSzLOzsVXWZse9" crossorigin="anonymous"></script>
<script src="supabase-config.js"></script>
<script src="account-nav.js"></script>
<script>
  const ALL_SYSTEMS = [
    'Allocate','Careflow','Cerner','Cliniko','Docman','Emis','Helix','iGPR',
    'Meditech','Meditop','Microtest','Mirth','Notepad','Optio','Patchwork',
    'Rio','S1','Systmone','TPP','Vision','Webv','Zedmed'
  ];

  let currentUserId = null;
  let isSecretary = false;
  let respondedJobIds = new Set();
  let allJobs = [];

  let activeSpecialty = '';
  let activeLocation = '';
  let activeSystems = new Set();

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function buildFilters() {
    // Specialty dropdown — only specialties present in current data
    const specialties = [...new Set(allJobs.map(j => j.specialty).filter(Boolean))].sort();
    const specialtyEl = document.getElementById('filter-specialty');
    specialties.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s;
      opt.textContent = s;
      specialtyEl.appendChild(opt);
    });

    // Systems chips — only systems that appear in at least one job
    const usedSystems = new Set(allJobs.flatMap(j => j.systems || []));
    const systemsEl = document.getElementById('filter-systems');
    ALL_SYSTEMS.filter(s => usedSystems.has(s)).forEach(s => {
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.textContent = s;
      chip.dataset.value = s;
      chip.addEventListener('click', () => {
        if (activeSystems.has(s)) { activeSystems.delete(s); chip.classList.remove('active'); }
        else { activeSystems.add(s); chip.classList.add('active'); }
        render();
      });
      systemsEl.appendChild(chip);
    });

    specialtyEl.addEventListener('change', () => { activeSpecialty = specialtyEl.value; render(); });
    document.getElementById('filter-location').addEventListener('input', (e) => {
      activeLocation = e.target.value.trim().toLowerCase();
      render();
    });
    document.getElementById('clear-filters').addEventListener('click', clearFilters);

    document.getElementById('filter-section').style.display = 'block';
  }

  function clearFilters() {
    activeSpecialty = '';
    activeLocation = '';
    activeSystems.clear();
    document.getElementById('filter-specialty').value = '';
    document.getElementById('filter-location').value = '';
    document.querySelectorAll('#filter-systems .chip').forEach(c => c.classList.remove('active'));
    render();
  }

  function filtersActive() {
    return activeSpecialty || activeLocation || activeSystems.size > 0;
  }

  function render() {
    const jobsEl = document.getElementById('jobs');
    const clearBtn = document.getElementById('clear-filters');
    clearBtn.style.display = filtersActive() ? 'inline' : 'none';

    const filtered = allJobs.filter(job => {
      if (activeSpecialty && job.specialty !== activeSpecialty) return false;
      if (activeLocation && !(job.location || '').toLowerCase().includes(activeLocation)) return false;
      if (activeSystems.size > 0) {
        const jobSystems = new Set(job.systems || []);
        for (const s of activeSystems) { if (!jobSystems.has(s)) return false; }
      }
      return true;
    });

    const count = filtered.length;
    document.getElementById('results-count').textContent =
      count === allJobs.length ? `${count} open role${count !== 1 ? 's' : ''}` :
      `${count} of ${allJobs.length} role${allJobs.length !== 1 ? 's' : ''} match`;

    if (filtered.length === 0) {
      jobsEl.innerHTML = `<div class="empty-state">No roles match your filters — try broadening your search.</div>`;
      return;
    }

    jobsEl.innerHTML = filtered.map(job => {
      const consultantName = job.profiles ? `${escapeHtml(job.profiles.first_name)} ${escapeHtml(job.profiles.last_name)}` : 'A consultant';
      const chips = (job.systems || []).map(s => `<span class="job-chip">${escapeHtml(s)}</span>`).join('');
      const metaParts = [job.specialty, job.location, job.day_rate].filter(Boolean).map(escapeHtml);

      let action;
      if (!currentUserId) {
        action = `<a href="login.html" class="respond-btn" style="text-decoration:none;display:inline-block;">Log in to respond</a>`;
      } else if (!isSecretary) {
        action = '';
      } else if (respondedJobIds.has(job.id)) {
        action = `<span class="responded-note">You've responded — check your messages</span>`;
      } else {
        action = `<button class="respond-btn" data-job-id="${job.id}" data-consultant-id="${job.consultant_id}">Respond</button>`;
      }

      return `
        <div class="job-card">
          <div class="job-title">${escapeHtml(job.title)}</div>
          <div class="job-meta">${consultantName}${metaParts.length ? ' · ' + metaParts.join(' · ') : ''}</div>
          ${chips ? `<div class="job-chips">${chips}</div>` : ''}
          <div class="job-desc">${escapeHtml(job.description || '')}</div>
          ${action}
        </div>
      `;
    }).join('');

    jobsEl.querySelectorAll('.respond-btn[data-job-id]').forEach(btn => {
      btn.addEventListener('click', async () => {
        btn.disabled = true;
        btn.textContent = 'Responding…';
        const jobId = btn.dataset.jobId;
        const consultantId = btn.dataset.consultantId;

        const { error: respondError } = await supabaseClient.from('job_responses').insert({
          job_id: jobId,
          secretary_id: currentUserId,
        });

        if (respondError) {
          alert('Could not respond: ' + respondError.message);
          btn.disabled = false;
          btn.textContent = 'Respond';
          return;
        }

        const { error: unlockError } = await supabaseClient.from('unlocks').insert({
          consultant_id: consultantId,
          secretary_id: currentUserId,
          price_paid: 0,
        });

        if (unlockError && unlockError.code !== '23505') {
          alert('Could not open thread: ' + unlockError.message);
          btn.disabled = false;
          btn.textContent = 'Respond';
          return;
        }

        window.location.href = `thread.html?consultant_id=${consultantId}&secretary_id=${currentUserId}`;
      });
    });
  }

  (async () => {
    const navResult = await renderAccountNav(document.getElementById('account-nav'), supabaseClient, 'job-board');

    if (navResult) {
      currentUserId = navResult.session.user.id;
      document.getElementById('header-login-link').style.display = 'none';
      document.getElementById('logout-btn').style.display = 'inline-block';
      isSecretary = navResult.profile.role === 'secretary';

      if (isSecretary) {
        const { data: responses } = await supabaseClient
          .from('job_responses')
          .select('job_id')
          .eq('secretary_id', currentUserId);
        respondedJobIds = new Set((responses || []).map(r => r.job_id));
      }
    }

    const { data: jobs, error } = await supabaseClient
      .from('job_postings')
      .select('*, profiles(first_name, last_name)')
      .eq('status', 'open')
      .order('created_at', { ascending: false });

    document.getElementById('loading').style.display = 'none';

    if (error) {
      document.getElementById('jobs').innerHTML = `<div class="empty-state">Could not load jobs: ${error.message}</div>`;
      return;
    }

    if (!jobs || jobs.length === 0) {
      document.getElementById('jobs').innerHTML = `<div class="empty-state">No open roles right now — check back soon.</div>`;
      return;
    }

    allJobs = jobs;
    buildFilters();
    render();
  })();

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    window.location.reload();
  });
</script>

<script src="../mobile-nav.js"></script>
<script src="../cookie-consent.js"></script>
</body>
</html>
