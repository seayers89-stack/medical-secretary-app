<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secretary profile — Veyn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

  :root{
    --ink:#1B2430;
    --paper:#F7F4ED;
    --gold:#B8924A;
    --slate:#5C6470;
    --green:#3F6B4F;
    --white:#FFFFFF;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{ color:inherit; text-decoration:none; }

  header{
    position:sticky; top:0; z-index:50;
    background:rgba(247,244,237,0.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(27,36,48,0.08);
  }
  .nav{ display:flex; align-items:center; justify-content:space-between; padding:20px 32px; max-width:1180px; margin:0 auto; }
  .nav-left{ display:flex; align-items:center; gap:48px; }
  .nav-links{ display:flex; gap:36px; font-size:14px; font-weight:500; color:var(--slate); }
  .nav-links a:hover{ color:var(--ink); }
  .nav-links a.active{ color:var(--ink); border-bottom:2px solid var(--gold); padding-bottom:2px; }
  @media (max-width:760px){ .nav-links{ display:none; } }
  .logo{ font-family:'Fraunces', serif; font-weight:600; font-size:24px; display:flex; align-items:center; gap:8px; }
  .logo .dot{ width:7px; height:7px; border-radius:50%; background:var(--gold); display:inline-block; }
  .btn-login{
    font-family:'Inter', sans-serif; font-size:14px; font-weight:600; color:var(--ink);
    border:1.5px solid rgba(27,36,48,0.2); padding:9px 20px; border-radius:7px;
  }

  .wrap{ max-width:680px; margin:0 auto; padding:48px 32px 100px; }
  .back-link{ font-size:13.5px; color:var(--slate); margin-bottom:24px; display:inline-block; }
  .back-link:hover{ color:var(--ink); }

  .profile-head{ display:flex; justify-content:space-between; align-items:flex-start; gap:20px; margin-bottom:24px; flex-wrap:wrap; }
  h1{ font-family:'Fraunces', serif; font-weight:600; font-size:30px; margin-bottom:6px; }
  .head-meta{ color:var(--slate); font-size:14px; }
  .result-badge{
    font-family:'IBM Plex Mono', monospace; font-size:10.5px; letter-spacing:0.04em; text-transform:uppercase;
    background:rgba(63,107,79,0.1); color:var(--green); padding:5px 12px; border-radius:999px; font-weight:600;
    white-space:nowrap;
  }
  .result-badge.unavailable{ background:rgba(27,36,48,0.06); color:var(--slate); }
  .skills-tested-badge{ display:inline-flex; align-items:center; gap:5px; }

  .action-row{ margin-bottom:32px; }
  .unlock-btn{
    font-family:'Inter', sans-serif; font-weight:600; font-size:14px; padding:11px 22px;
    border-radius:8px; cursor:pointer; border:1.5px solid var(--ink); background:none; color:var(--ink);
    display:inline-block;
  }
  .unlock-btn:hover{ background:rgba(27,36,48,0.05); }
  .login-note{ font-size:13.5px; color:var(--slate); }
  .login-note a{ text-decoration:underline; font-weight:600; }

  .card{
    background:var(--white); border:1px solid rgba(27,36,48,0.08); border-radius:16px;
    padding:26px 28px; margin-bottom:16px;
  }
  .card h3{ font-family:'Fraunces', serif; font-weight:600; font-size:16px; margin-bottom:14px; }
  .row{ display:flex; justify-content:space-between; gap:16px; padding:9px 0; border-bottom:1px solid rgba(27,36,48,0.06); font-size:14px; }
  .row:last-child{ border-bottom:none; }
  .row span:first-child{ color:var(--slate); flex:0 0 auto; }
  .row span:last-child{ font-weight:600; text-align:right; }

  .empty-state{ text-align:center; padding:60px 20px; color:var(--slate); font-size:14.5px; }
  #loading{ color:var(--slate); font-size:14.5px; }

</style>
</head>
<body>

<header>
  <div class="nav">
    <div class="nav-left">
      <a href="../index.html" class="logo"><span class="dot"></span>veyn</a>
      <nav class="nav-links" id="account-nav">
        <a href="../index.html">Home</a>
        <a href="../veyn-for-secretaries.html">For Secretaries</a>
        <a href="../veyn-for-consultants.html">For Consultants</a>
        <a href="../veyn-about.html">About</a>
      </nav>
    </div>
    <a href="search-secretaries.html" class="btn-login">Back to search</a>
  </div>
</header>

<div class="wrap">
  <a href="search-secretaries.html" class="back-link">← Back to search</a>

  <p id="loading">Loading profile…</p>
  <div id="content" style="display:none;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="account-nav.js"></script>
<script src="badges.js"></script>
<script src="system-skills-data.js"></script>
<script>
  const secretaryId = new URLSearchParams(window.location.search).get('id');

  (async () => {
    if (!secretaryId) {
      document.getElementById('loading').textContent = 'No profile specified.';
      return;
    }

    const navResult = await renderAccountNav(document.getElementById('account-nav'), supabaseClient, null);
    const currentUserId = navResult ? navResult.session.user.id : null;

    const { data: sec, error } = await supabaseClient
      .from('secretary_profiles')
      .select('*, profiles(first_name, last_name)')
      .eq('profile_id', secretaryId)
      .single();

    const loading = document.getElementById('loading');
    const content = document.getElementById('content');

    if (error || !sec) {
      loading.textContent = 'Could not load this profile.';
      return;
    }

    const name = sec.profiles ? `${sec.profiles.first_name} ${sec.profiles.last_name}` : 'Secretary';
    const outcode = (sec.postcode || '').trim().split(' ')[0];
    const rate = (sec.hourly_rate_min != null && sec.hourly_rate_max != null)
      ? `£${sec.hourly_rate_min}–£${sec.hourly_rate_max}/hour` : '—';
    const badge = sec.available
      ? '<span class="result-badge">Available now</span>'
      : '<span class="result-badge unavailable">Not available</span>';
    const isBoosted = !!(sec.premium_active && sec.premium_expires_at && new Date(sec.premium_expires_at) > new Date());
    const featuredBadge = isBoosted ? '<span class="result-badge" style="background:var(--ink); color:var(--paper);">★ Featured</span>' : '';

    const { data: passedSystems } = await supabaseClient
      .from('system_skills_results')
      .select('system_slug, quiz_score')
      .eq('profile_id', secretaryId)
      .eq('quiz_passed', true);

    const skillsParts = [];
    if (sec.typing_wpm_verified != null) skillsParts.push(`${sec.typing_wpm_verified} WPM`);
    if (sec.terminology_quiz_passed) skillsParts.push('Terminology passed');
    (passedSystems || []).forEach(r => skillsParts.push(`${(SYSTEM_SKILLS[r.system_slug] && SYSTEM_SKILLS[r.system_slug].name) || r.system_slug} verified`));
    const skillsTestedBadge = skillsParts.length > 0
      ? `<span class="result-badge skills-tested-badge">${skillsTestedIconSVG(14)} Skills-Tested · ${skillsParts.join(' · ')}</span>`
      : '';

    const { data: staffIds } = await supabaseClient.rpc('staff_profile_ids');
    const staffBadge = (staffIds && staffIds.includes(secretaryId))
      ? `<span class="result-badge skills-tested-badge" style="background:rgba(27,36,48,0.06); color:var(--ink);">${staffBadgeIconSVG(14)} Veyn Staff</span>`
      : '';

    let hasActivePass = false;
    let alreadyUnlocked = false;

    if (currentUserId) {
      const { data: con } = await supabaseClient
        .from('consultant_profiles')
        .select('pass_expires_at')
        .eq('profile_id', currentUserId)
        .single();
      hasActivePass = !!(con && con.pass_expires_at && new Date(con.pass_expires_at) > new Date());

      const { data: unlock } = await supabaseClient
        .from('unlocks')
        .select('id')
        .eq('consultant_id', currentUserId)
        .eq('secretary_id', secretaryId)
        .maybeSingle();
      alreadyUnlocked = !!unlock;
    }

    let action;
    if (!currentUserId) {
      action = `<span class="login-note"><a href="login.html">Log in</a> to contact ${name.split(' ')[0]}</span>`;
    } else if (hasActivePass || alreadyUnlocked) {
      action = `<a class="unlock-btn" href="thread.html?consultant_id=${currentUserId}&secretary_id=${secretaryId}">Message ${name.split(' ')[0]}</a>`;
    } else {
      action = `<button class="unlock-btn" id="unlock-btn">Unlock for £12</button>`;
    }

    content.innerHTML = `
      <div class="profile-head">
        <div>
          <h1>${name}</h1>
          <div class="head-meta">${sec.region || ''}${outcode ? ' · ' + outcode : ''}</div>
        </div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">${featuredBadge}${badge}${skillsTestedBadge}${staffBadge}</div>
      </div>
      <div class="action-row">${action}</div>

      <div class="card">
        <h3>Experience</h3>
        <div class="row"><span>Years as a medical secretary</span><span>${sec.years_experience || '—'}</span></div>
        <div class="row"><span>Years in private practice</span><span>${sec.years_private_practice || '—'}</span></div>
        <div class="row"><span>Employment status</span><span>${(sec.employment_status || []).join(', ') || '—'}</span></div>
      </div>

      <div class="card">
        <h3>Systems &amp; specialties</h3>
        <div class="row"><span>Systems</span><span>${(sec.systems || []).join(', ') || '—'}</span></div>
        <div class="row"><span>Specialties</span><span>${(sec.specialties || []).join(', ') || '—'}</span></div>
      </div>

      <div class="card">
        <h3>Skills</h3>
        <div class="row"><span>Core skills</span><span>${(sec.core_skills || []).join(', ') || '—'}</span></div>
        <div class="row"><span>Typing speed</span><span>${sec.typing_wpm_verified != null ? `${sec.typing_wpm_verified} WPM ✓ Verified` : (sec.typing_speed || '—')}</span></div>
        <div class="row"><span>Terminology quiz</span><span>${sec.terminology_quiz_passed ? `Passed (${sec.terminology_quiz_score}%) ✓ Verified` : '—'}</span></div>
        <div class="row"><span>Training modules completed</span><span id="training-modules-row">—</span></div>
        <div class="row"><span>English fluency</span><span>${sec.english_fluency || '—'}</span></div>
      </div>

      <div class="card">
        <h3>Verification</h3>
        <div class="row"><span>Right to work in UK</span><span>${sec.right_to_work ? 'Yes' : '—'}</span></div>
        <div class="row"><span>CV available</span><span>${sec.has_cv ? 'Yes' : 'No'}</span></div>
        <div class="row"><span>DBS certificate</span><span>${sec.has_dbs ? (sec.dbs_level || 'Yes') : 'No'}</span></div>
      </div>

      <div class="card">
        <h3>Availability</h3>
        <div class="row"><span>Work mode</span><span>${(sec.work_mode || []).join(', ') || '—'}</span></div>
        <div class="row"><span>Availability type</span><span>${(sec.availability_type || []).join(', ') || '—'}</span></div>
        <div class="row"><span>Start date</span><span>${sec.availability_start || '—'}</span></div>
        <div class="row"><span>Days available</span><span>${(sec.daily_availability || []).join(', ') || '—'}</span></div>
        <div class="row"><span>Evenings</span><span>${sec.available_evenings ? 'Yes' : 'No'}</span></div>
        <div class="row"><span>Weekends</span><span>${sec.available_weekends ? 'Yes' : 'No'}</span></div>
        <div class="row"><span>Willingness to travel</span><span>${sec.travel_willingness || '—'}</span></div>
      </div>

      <div class="card">
        <h3>Rate</h3>
        <div class="row"><span>Hourly rate</span><span>${rate}</span></div>
      </div>
    `;

    loading.style.display = 'none';
    content.style.display = 'block';

    const { data: trainingResults } = await supabaseClient
      .from('training_module_results')
      .select('id')
      .eq('profile_id', secretaryId)
      .eq('quiz_passed', true);
    const trainingRow = document.getElementById('training-modules-row');
    if (trainingRow) trainingRow.textContent = `${(trainingResults || []).length} / 11`;

    const unlockBtn = document.getElementById('unlock-btn');
    if (unlockBtn) {
      unlockBtn.addEventListener('click', () => {
        window.location.href = `mock-checkout.html?type=contact&secretary_id=${secretaryId}&secretary_name=${encodeURIComponent(name)}`;
      });
    }
  })();
</script>

<script src="../mobile-nav.js"></script>
</body>
</html>
