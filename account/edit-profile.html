<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit your profile — Veyn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

  :root{
    --ink:#1B2430;
    --paper:#F7F4ED;
    --gold:#B8924A;
    --gold-soft:#E7D9BC;
    --slate:#5C6470;
    --green:#3F6B4F;
    --white:#FFFFFF;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{ color:inherit; text-decoration:none; }

  header{
    position:sticky; top:0; z-index:50;
    background:rgba(247,244,237,0.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(27,36,48,0.08);
  }
  .nav{
    display:flex; align-items:center; justify-content:space-between;
    padding:20px 32px; max-width:1180px; margin:0 auto;
  }
  .logo{
    font-family:'Fraunces', serif; font-weight:600; font-size:24px;
    display:flex; align-items:center; gap:8px;
  }
  .logo .dot{ width:7px; height:7px; border-radius:50%; background:var(--gold); display:inline-block; }
  .btn-login{
    font-family:'Inter', sans-serif; font-size:14px; font-weight:600; color:var(--ink);
    border:1.5px solid rgba(27,36,48,0.2); padding:9px 20px; border-radius:7px; cursor:pointer;
    background:none; transition:border-color .2s ease, background .2s ease;
  }
  .btn-login:hover{ border-color:var(--ink); background:rgba(27,36,48,0.04); }

  .wrap{ max-width:560px; margin:0 auto; padding:64px 32px 100px; }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace; font-size:11.5px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--gold); margin-bottom:14px;
  }
  h1{ font-family:'Fraunces', serif; font-weight:600; font-size:32px; margin-bottom:10px; }
  .sub{ color:var(--slate); font-size:15px; line-height:1.6; margin-bottom:36px; }

  .form-card{
    background:var(--white); border:1px solid rgba(27,36,48,0.08); border-radius:18px; padding:36px 40px;
  }
  .field{ margin-bottom:18px; }
  .field-row2{ display:flex; gap:16px; }
  .field-row2 .field{ flex:1; }
  .field label{ display:block; font-size:13px; font-weight:600; margin-bottom:7px; color:var(--ink); }
  .field input, .field select{
    width:100%; padding:12px 14px; font-family:'Inter', sans-serif; font-size:14.5px;
    border:1.5px solid rgba(27,36,48,0.15); border-radius:8px; background:var(--paper);
    color:var(--ink); transition:border-color .2s ease;
  }
  .field input:focus, .field select:focus{ outline:none; border-color:var(--gold); }

  .chip-row{ display:flex; gap:8px; flex-wrap:wrap; }
  .chip-toggle{ position:relative; }
  .chip-toggle input{ position:absolute; opacity:0; width:0; height:0; }
  .chip-toggle span{
    display:inline-block; font-size:13.5px; padding:8px 16px; border-radius:999px;
    border:1px solid rgba(27,36,48,0.15); cursor:pointer; user-select:none; transition:all .15s ease;
  }
  .chip-toggle input:checked + span{ background:var(--ink); color:var(--paper); border-color:var(--ink); }

  .toggle-row{ display:flex; align-items:center; gap:10px; }
  .toggle-row input{ width:auto; }

  .btn{
    font-family:'Inter', sans-serif; font-weight:600; font-size:15px; padding:14px 28px;
    border-radius:8px; cursor:pointer; border:none; transition:transform .2s ease, box-shadow .2s ease;
    display:inline-block; width:100%; text-align:center; margin-top:8px;
  }
  .btn:hover{ transform:translateY(-1px); }
  .btn-gold{ background:var(--gold); color:var(--ink); box-shadow:0 8px 20px -8px rgba(184,146,74,0.5); }
  .btn-gold:hover{ box-shadow:0 12px 24px -8px rgba(184,146,74,0.6); }
  .btn-primary{ background:var(--ink); color:var(--paper); box-shadow:0 8px 20px -8px rgba(27,36,48,0.5); }
  .btn-primary:hover{ box-shadow:0 12px 24px -8px rgba(27,36,48,0.6); }

  .auth-switch{ text-align:center; font-size:14px; color:var(--slate); margin-top:20px; }
  .auth-switch a{ color:var(--gold); font-weight:600; }
  .auth-switch a:hover{ text-decoration:underline; }

  #save-status{ display:none; font-size:13.5px; padding:12px 14px; border-radius:8px; margin-bottom:18px; }
  #save-status.error{ display:block; background:rgba(193,68,68,0.08); border:1px solid rgba(193,68,68,0.3); color:#a33; }
  #save-status.success{ display:block; background:rgba(63,107,79,0.08); border:1px solid rgba(63,107,79,0.3); color:var(--green); }

  #loading{ color:var(--slate); font-size:14.5px; }

  footer{ background:var(--ink); color:rgba(247,244,237,0.7); padding:40px 32px 28px; margin-top:40px; }
  .foot-bottom{ max-width:1180px; margin:0 auto; font-size:12.5px; color:rgba(247,244,237,0.45); display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; }

</style>
</head>
<body>

<header>
  <div class="nav">
    <a href="../index.html" class="logo"><span class="dot"></span>veyn</a>
    <button class="btn-login" id="logout-btn">Log out</button>
  </div>
</header>

<div class="wrap">
  <div class="eyebrow">Your account</div>
  <h1>Edit your profile</h1>
  <p class="sub">Update your details — consultants search against this information, so keep it current.</p>

  <p id="loading">Loading your profile…</p>

  <div class="form-card" id="form-card" style="display:none;">
    <p id="save-status"></p>
    <form id="edit-form">
      <div class="field-row2">
        <div class="field">
          <label for="first-name">First name</label>
          <input type="text" id="first-name" required>
        </div>
        <div class="field">
          <label for="last-name">Last name</label>
          <input type="text" id="last-name" required>
        </div>
      </div>

      <div id="secretary-fields" style="display:none;">
        <div class="field">
          <label for="experience">Years as a private medical secretary</label>
          <select id="experience">
            <option>Less than 1 year</option>
            <option>1–3 years</option>
            <option>3–5 years</option>
            <option>5–10 years</option>
            <option>10+ years</option>
          </select>
        </div>
        <div class="field">
          <label>Systems you've used</label>
          <div class="chip-row" id="systems-row">
            <label class="chip-toggle"><input type="checkbox" value="Carebit"><span>Carebit</span></label>
            <label class="chip-toggle"><input type="checkbox" value="Semble"><span>Semble</span></label>
            <label class="chip-toggle"><input type="checkbox" value="Healthcode"><span>Healthcode</span></label>
            <label class="chip-toggle"><input type="checkbox" value="DGL"><span>DGL</span></label>
            <label class="chip-toggle"><input type="checkbox" value="Pabau"><span>Pabau</span></label>
            <label class="chip-toggle"><input type="checkbox" value="Cliniko"><span>Cliniko</span></label>
          </div>
        </div>
        <div class="field">
          <label>Specialty experience</label>
          <div class="chip-row" id="specialties-row">
            <label class="chip-toggle"><input type="checkbox" value="General surgery"><span>General surgery</span></label>
            <label class="chip-toggle"><input type="checkbox" value="Orthopaedics"><span>Orthopaedics</span></label>
            <label class="chip-toggle"><input type="checkbox" value="Urology"><span>Urology</span></label>
            <label class="chip-toggle"><input type="checkbox" value="Cardiology"><span>Cardiology</span></label>
            <label class="chip-toggle"><input type="checkbox" value="Dermatology"><span>Dermatology</span></label>
            <label class="chip-toggle"><input type="checkbox" value="Gynaecology"><span>Gynaecology</span></label>
          </div>
        </div>
        <div class="field toggle-row">
          <input type="checkbox" id="available">
          <label for="available" style="margin:0;">Available for new placements right now</label>
        </div>
      </div>

      <div id="consultant-fields" style="display:none;">
        <div class="field">
          <label for="practice">Practice / clinic name</label>
          <input type="text" id="practice">
        </div>
        <div class="field">
          <label for="specialty">Specialty</label>
          <input type="text" id="specialty" placeholder="e.g. Cardiology, Orthopaedics">
        </div>
      </div>

      <button type="submit" class="btn" id="submit-btn">Save changes</button>
    </form>

    <div class="auth-switch"><a href="profile.html">Back to profile</a></div>
  </div>
</div>

<footer>
  <div class="foot-bottom">
    <span>© 2026 Veyn. All rights reserved.</span>
    <span>Founded by a medical secretary, not a market gap.</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
  let userId = null;
  let role = null;

  (async () => {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      window.location.href = 'login.html';
      return;
    }
    userId = session.user.id;

    const { data: profile, error } = await supabaseClient
      .from('profiles')
      .select('id, role, first_name, last_name, created_at')
      .eq('id', userId)
      .single();

    const loading = document.getElementById('loading');
    const formCard = document.getElementById('form-card');

    if (error || !profile) {
      loading.textContent = 'Could not load your profile.';
      return;
    }

    role = profile.role;
    document.getElementById('first-name').value = profile.first_name || '';
    document.getElementById('last-name').value = profile.last_name || '';

    const submitBtn = document.getElementById('submit-btn');

    if (role === 'secretary') {
      document.getElementById('secretary-fields').style.display = 'block';
      submitBtn.className = 'btn btn-gold';

      const { data: sec } = await supabaseClient
        .from('secretary_profiles')
        .select('*')
        .eq('profile_id', userId)
        .single();

      if (sec) {
        document.getElementById('experience').value = sec.years_experience || 'Less than 1 year';
        (sec.systems || []).forEach(v => {
          const el = document.querySelector(`#systems-row input[value="${v}"]`);
          if (el) el.checked = true;
        });
        (sec.specialties || []).forEach(v => {
          const el = document.querySelector(`#specialties-row input[value="${v}"]`);
          if (el) el.checked = true;
        });
        document.getElementById('available').checked = !!sec.available;
      }
    } else if (role === 'consultant') {
      document.getElementById('consultant-fields').style.display = 'block';
      submitBtn.className = 'btn btn-primary';

      const { data: con } = await supabaseClient
        .from('consultant_profiles')
        .select('*')
        .eq('profile_id', userId)
        .single();

      if (con) {
        document.getElementById('practice').value = con.practice_name || '';
        document.getElementById('specialty').value = con.specialty || '';
      }
    }

    loading.style.display = 'none';
    formCard.style.display = 'block';
  })();

  document.getElementById('edit-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const statusEl = document.getElementById('save-status');
    const submitBtn = document.getElementById('submit-btn');
    statusEl.className = '';
    statusEl.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Saving…';

    const firstName = document.getElementById('first-name').value.trim();
    const lastName = document.getElementById('last-name').value.trim();

    const { error: profileError } = await supabaseClient
      .from('profiles')
      .update({ first_name: firstName, last_name: lastName })
      .eq('id', userId);

    let roleError = null;

    if (role === 'secretary') {
      const systems = Array.from(document.querySelectorAll('#systems-row input:checked')).map(el => el.value);
      const specialties = Array.from(document.querySelectorAll('#specialties-row input:checked')).map(el => el.value);
      const available = document.getElementById('available').checked;
      const experience = document.getElementById('experience').value;

      const { error } = await supabaseClient
        .from('secretary_profiles')
        .update({ years_experience: experience, systems, specialties, available })
        .eq('profile_id', userId);
      roleError = error;
    } else if (role === 'consultant') {
      const practice = document.getElementById('practice').value.trim();
      const specialty = document.getElementById('specialty').value.trim();

      const { error } = await supabaseClient
        .from('consultant_profiles')
        .update({ practice_name: practice, specialty })
        .eq('profile_id', userId);
      roleError = error;
    }

    submitBtn.disabled = false;
    submitBtn.textContent = 'Save changes';

    if (profileError || roleError) {
      statusEl.textContent = (profileError || roleError).message;
      statusEl.className = 'error';
      return;
    }

    statusEl.textContent = 'Saved.';
    statusEl.className = 'success';
  });

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    window.location.href = 'login.html';
  });
</script>

</body>
</html>
