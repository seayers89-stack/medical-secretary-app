<svg viewBox="0 0 640 620" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>Task Tracker — example day</title>

  <!-- card -->
  <rect x="0" y="0" width="640" height="620" rx="18" fill="#1B2430"/>

  <!-- header -->
  <text x="28" y="46" fill="#D4A24C" font-size="15" font-weight="700" letter-spacing="1.2">TASK TRACKER</text>
  <text x="612" y="46" fill="#8B95A5" font-size="13" text-anchor="end">Wednesday 22 Jul</text>

  <!-- total -->
  <text x="28" y="86" fill="#8B95A5" font-size="12" letter-spacing="0.6">TODAY</text>
  <text x="100" y="94" fill="#EDEFF2" font-size="32" font-weight="600" font-family="Consolas, Menlo, monospace">33:27</text>
  <line x1="28" y1="112" x2="612" y2="112" stroke="#384258" stroke-width="1"/>

  <!-- estimate -->
  <text x="28" y="134" fill="#8B95A5" font-size="12.5">Estimated <tspan fill="#EDEFF2" font-weight="600">45m</tspan> today, based on budgets set on 3 tasks.</text>

  <!-- over-budget banner -->
  <rect x="28" y="146" width="584" height="32" rx="8" fill="#E08E45" fill-opacity="0.16" stroke="#E08E45"/>
  <text x="40" y="167" fill="#E08E45" font-size="13">1 task has gone over its time budget.</text>

  <!-- filter row -->
  <text x="28" y="204" fill="#8B95A5" font-size="11" letter-spacing="0.6">FILTER</text>
  <rect x="70" y="192" width="52" height="20" rx="10" fill="#232D3D" stroke="#6FAF8C"/>
  <text x="96" y="206" fill="#6FAF8C" font-size="11" text-anchor="middle">admin</text>
  <rect x="128" y="192" width="58" height="20" rx="10" fill="#232D3D" stroke="#384258"/>
  <text x="157" y="206" fill="#8B95A5" font-size="11" text-anchor="middle">billing</text>
  <rect x="192" y="192" width="58" height="20" rx="10" fill="#232D3D" stroke="#384258"/>
  <text x="221" y="206" fill="#8B95A5" font-size="11" text-anchor="middle">letters</text>

  <!-- ── Row A: Daily inbox triage (running) ── -->
  <g>
    <rect x="28" y="232" width="584" height="74" rx="10" fill="#232D3D" stroke="#D4A24C"/>
    <rect x="28" y="232" width="584" height="74" rx="10" fill="#D4A24C" fill-opacity="0.10"/>
    <text x="44" y="262" fill="#EDEFF2" font-size="14">Daily inbox triage</text>
    <rect x="44" y="272" width="58" height="16" rx="8" fill="none" stroke="#384258"/>
    <text x="73" y="284" fill="#8B95A5" font-size="9.5" text-anchor="middle">↻ daily</text>
    <text x="108" y="284" fill="#8B95A5" font-size="10.5">Budget 15m</text>
    <rect x="182" y="272" width="46" height="16" rx="8" fill="#6FAF8C" fill-opacity="0.14" stroke="#6FAF8C"/>
    <text x="205" y="284" fill="#6FAF8C" font-size="9.5" text-anchor="middle">admin</text>
    <text x="500" y="262" fill="#EDEFF2" font-size="16" font-weight="600" font-family="Consolas, Menlo, monospace" text-anchor="end">09:27</text>
    <g stroke="#384258" fill="#2B3648">
      <rect x="514" y="250" width="24" height="24" rx="6"/>
      <rect x="544" y="250" width="24" height="24" rx="6"/>
      <rect x="574" y="250" width="24" height="24" rx="6"/>
    </g>
    <text x="526" y="266" fill="#8B95A5" font-size="11" text-anchor="middle">✎</text>
    <text x="556" y="266" fill="#D4A24C" font-size="11" text-anchor="middle">❙❙</text>
    <text x="586" y="266" fill="#8B95A5" font-size="11" text-anchor="middle">✓</text>
  </g>

  <!-- ── Row B: Call BUPA re authorisation (urgent + over budget) ── -->
  <g>
    <rect x="28" y="316" width="584" height="74" rx="10" fill="#232D3D" stroke="#E08E45"/>
    <rect x="28" y="316" width="584" height="74" rx="10" fill="#E08E45" fill-opacity="0.08"/>
    <rect x="28" y="316" width="4" height="74" rx="2" fill="#C77B6B"/>
    <text x="44" y="336" fill="#8B95A5" font-size="12" font-family="Consolas, Menlo, monospace">4:00PM</text>
    <text x="44" y="356" fill="#EDEFF2" font-size="14">Call BUPA re authorisation</text>
    <text x="44" y="374" fill="#C77B6B" font-size="10" font-weight="700" letter-spacing="0.4">URGENT</text>
    <text x="104" y="374" fill="#E08E45" font-size="10" font-weight="700" letter-spacing="0.4">OVER BY 06:00</text>
    <rect x="218" y="365" width="46" height="16" rx="8" fill="#6FAF8C" fill-opacity="0.14" stroke="#6FAF8C"/>
    <text x="241" y="377" fill="#6FAF8C" font-size="9.5" text-anchor="middle">billing</text>
    <text x="500" y="356" fill="#EDEFF2" font-size="16" font-weight="600" font-family="Consolas, Menlo, monospace" text-anchor="end">16:00</text>
    <g stroke="#384258" fill="#2B3648">
      <rect x="514" y="336" width="24" height="24" rx="6"/>
      <rect x="544" y="336" width="24" height="24" rx="6"/>
      <rect x="574" y="336" width="24" height="24" rx="6"/>
    </g>
    <text x="526" y="352" fill="#8B95A5" font-size="11" text-anchor="middle">✎</text>
    <text x="556" y="352" fill="#8B95A5" font-size="11" text-anchor="middle">▶</text>
    <text x="586" y="352" fill="#8B95A5" font-size="11" text-anchor="middle">✓</text>
  </g>

  <!-- ── Row C: Type up Mr Patel's clinic letter ── -->
  <g>
    <rect x="28" y="400" width="584" height="74" rx="10" fill="#232D3D" stroke="#384258"/>
    <text x="44" y="420" fill="#8B95A5" font-size="12" font-family="Consolas, Menlo, monospace">4:30PM</text>
    <text x="44" y="440" fill="#EDEFF2" font-size="14">Type up Mr Patel's clinic letter</text>
    <text x="44" y="458" fill="#8B95A5" font-size="10.5">Budget 20m</text>
    <rect x="118" y="449" width="52" height="16" rx="8" fill="#6FAF8C" fill-opacity="0.14" stroke="#6FAF8C"/>
    <text x="144" y="461" fill="#6FAF8C" font-size="9.5" text-anchor="middle">letters</text>
    <text x="500" y="440" fill="#EDEFF2" font-size="16" font-weight="600" font-family="Consolas, Menlo, monospace" text-anchor="end">00:00</text>
    <g stroke="#384258" fill="#2B3648">
      <rect x="514" y="420" width="24" height="24" rx="6"/>
      <rect x="544" y="420" width="24" height="24" rx="6"/>
      <rect x="574" y="420" width="24" height="24" rx="6"/>
    </g>
    <text x="526" y="436" fill="#8B95A5" font-size="11" text-anchor="middle">✎</text>
    <text x="556" y="436" fill="#8B95A5" font-size="11" text-anchor="middle">▶</text>
    <text x="586" y="436" fill="#8B95A5" font-size="11" text-anchor="middle">✓</text>
  </g>

  <!-- ── Row D: File last week's CCSD codes (done) ── -->
  <g opacity="0.55">
    <rect x="28" y="484" width="584" height="56" rx="10" fill="#232D3D" stroke="#384258"/>
    <text x="44" y="507" fill="#EDEFF2" font-size="14" text-decoration="line-through">File last week's CCSD codes</text>
    <rect x="44" y="516" width="52" height="16" rx="8" fill="#6FAF8C" fill-opacity="0.14" stroke="#6FAF8C"/>
    <text x="70" y="528" fill="#6FAF8C" font-size="9.5" text-anchor="middle">billing</text>
    <text x="500" y="507" fill="#EDEFF2" font-size="16" font-weight="600" font-family="Consolas, Menlo, monospace" text-anchor="end">08:00</text>
    <g stroke="#384258" fill="#2B3648">
      <rect x="544" y="493" width="24" height="24" rx="6"/>
      <rect x="574" y="493" width="24" height="24" rx="6"/>
    </g>
    <text x="556" y="509" fill="#8B95A5" font-size="11" text-anchor="middle">↻</text>
    <text x="586" y="509" fill="#8B95A5" font-size="11" text-anchor="middle">✕</text>
  </g>

  <!-- footer hint -->
  <text x="28" y="580" fill="#8B95A5" font-size="11.5">▶ start the clock  ·  ❙❙ pause  ·  ✓ mark done  ·  set a budget to get an alert when a task overruns</text>
</svg>
