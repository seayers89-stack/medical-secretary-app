<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your profile — Veyn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

  :root{
    --ink:#1B2430;
    --paper:#F7F4ED;
    --gold:#B8924A;
    --gold-soft:#E7D9BC;
    --slate:#5C6470;
    --green:#3F6B4F;
    --white:#FFFFFF;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{ color:inherit; text-decoration:none; }

  header{
    position:sticky; top:0; z-index:50;
    background:rgba(247,244,237,0.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(27,36,48,0.08);
  }
  .nav{
    display:flex; align-items:center; justify-content:space-between;
    padding:20px 32px; max-width:1180px; margin:0 auto;
  }
  .logo{
    font-family:'Fraunces', serif; font-weight:600; font-size:24px;
    display:flex; align-items:center; gap:8px;
  }
  .logo .dot{ width:7px; height:7px; border-radius:50%; background:var(--gold); display:inline-block; }
  .nav-left{ display:flex; align-items:center; gap:48px; }
  .nav-links{ display:flex; gap:36px; font-size:14px; font-weight:500; color:var(--slate); }
  .nav-links a:hover{ color:var(--ink); }
  .nav-links a.active{ color:var(--ink); border-bottom:2px solid var(--gold); padding-bottom:2px; }
  @media (max-width:760px){ .nav-links{ display:none; } }
  .btn-login{
    font-family:'Inter', sans-serif; font-size:14px; font-weight:600; color:var(--ink);
    border:1.5px solid rgba(27,36,48,0.2); padding:9px 20px; border-radius:7px; cursor:pointer;
    background:none; transition:border-color .2s ease, background .2s ease;
  }
  .btn-login:hover{ border-color:var(--ink); background:rgba(27,36,48,0.04); }

  .wrap{ max-width:680px; margin:0 auto; padding:64px 32px 100px; }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace; font-size:11.5px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--gold); margin-bottom:14px;
  }
  h1{ font-family:'Fraunces', serif; font-weight:600; font-size:32px; margin-bottom:10px; }
  .sub{ color:var(--slate); font-size:15px; line-height:1.6; margin-bottom:36px; }

  .card{
    background:var(--white); border:1px solid rgba(27,36,48,0.08); border-radius:18px;
    padding:32px 36px; margin-bottom:20px;
  }
  .card h3{ font-family:'Fraunces', serif; font-weight:600; font-size:17px; margin-bottom:14px; }
  .row{ display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(27,36,48,0.06); font-size:14.5px; }
  .row:last-child{ border-bottom:none; }
  .row span:first-child{ color:var(--slate); }
  .row span:last-child{ font-weight:600; }

  .boost-badge{
    display:inline-flex; align-items:center; gap:6px; font-family:'IBM Plex Mono', monospace; font-size:10.5px;
    letter-spacing:0.06em; text-transform:uppercase; color:#8F6F36; background:rgba(184,146,74,0.12);
    border:1px solid rgba(184,146,74,0.35); padding:5px 12px; border-radius:999px; margin-bottom:12px;
  }

  .result-badge{
    font-family:'IBM Plex Mono', monospace; font-size:10.5px; letter-spacing:0.04em; text-transform:uppercase;
    background:rgba(63,107,79,0.1); color:var(--green); padding:5px 12px; border-radius:999px; font-weight:600;
    white-space:nowrap;
  }
  .skills-tested-badge{ display:inline-flex; align-items:flex-start; gap:5px; white-space:normal; max-width:100%; text-align:left; }
  .boost-cta{
    display:inline-block; margin-top:14px; font-size:13.5px; font-weight:600; color:var(--ink);
    border:1.5px solid var(--gold); padding:9px 18px; border-radius:7px;
  }

  #loading{ color:var(--slate); font-size:14.5px; }

</style>
</head>
<body>

<header>
  <div class="nav">
    <div class="nav-left">
      <a href="../index.html" class="logo"><span class="dot"></span>veyn</a>
      <nav class="nav-links" id="account-nav">
        <a href="../index.html">Home</a>
        <a href="../veyn-for-secretaries.html">For Secretaries</a>
        <a href="../veyn-for-consultants.html">For Consultants</a>
        <a href="../veyn-about.html">About</a>
      </nav>
    </div>
    <button class="btn-login" id="logout-btn">Log out</button>
  </div>
</header>

<div class="wrap">
  <div class="eyebrow">Your account</div>
  <h1 id="greeting">Welcome</h1>
  <p class="sub">This is your profile snapshot. Consultants search against this information — keep it current.</p>
  <div id="staff-badge-row" style="margin-bottom:8px;"></div>
  <div id="skills-tested-badge-row" style="margin-bottom:20px;"></div>

  <p id="loading">Loading your profile…</p>
  <div class="card" id="premium-boost-card" style="display:none;"></div>
  <div class="card" id="profile-card" style="display:none;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="account-nav.js"></script>
<script src="badges.js"></script>
<script src="system-skills-data.js"></script>
<script>
  (async () => {
    const navResult = await renderAccountNav(document.getElementById('account-nav'), supabaseClient, 'profile');

    if (!navResult) {
      window.location.href = 'login.html';
      return;
    }

    const { session } = navResult;
    const userId = session.user.id;

    const { data: profile, error } = await supabaseClient
      .from('profiles')
      .select('id, role, first_name, last_name, created_at')
      .eq('id', userId)
      .single();

    const loading = document.getElementById('loading');
    const card = document.getElementById('profile-card');

    if (error || !profile) {
      loading.textContent = 'Could not load your profile.';
      return;
    }

    document.getElementById('greeting').textContent = `Welcome, ${profile.first_name}`;

    const { data: staffIds } = await supabaseClient.rpc('staff_profile_ids');
    if (staffIds && staffIds.includes(userId)) {
      document.getElementById('staff-badge-row').innerHTML =
        `<span class="result-badge" style="display:inline-flex; align-items:center; gap:5px;">${staffBadgeIconSVG(14)} Veyn Staff</span>`;
    }

    let extraRows = '';
    if (profile.role === 'secretary') {
      const { data: sec } = await supabaseClient
        .from('secretary_profiles')
        .select('*')
        .eq('profile_id', userId)
        .single();
      if (sec) {
        const { data: passedSystems } = await supabaseClient
          .from('system_skills_results')
          .select('system_slug, quiz_score')
          .eq('profile_id', userId)
          .eq('quiz_passed', true);

        const skillsParts = [];
        if (sec.typing_wpm_verified != null) skillsParts.push(`${sec.typing_wpm_verified} WPM`);
        if (sec.terminology_quiz_passed) skillsParts.push('Terminology passed');
        (passedSystems || []).forEach(r => skillsParts.push(`${(SYSTEM_SKILLS[r.system_slug] && SYSTEM_SKILLS[r.system_slug].name) || r.system_slug} verified`));
        if (skillsParts.length > 0) {
          document.getElementById('skills-tested-badge-row').innerHTML =
            `<span class="result-badge skills-tested-badge">${skillsTestedIconSVG(14)} Skills-Tested · ${skillsParts.join(' · ')}</span>`;
        }

        const boostCard = document.getElementById('premium-boost-card');
        const boostActive = sec.premium_active && sec.premium_expires_at && new Date(sec.premium_expires_at) > new Date();
        if (boostActive) {
          const expiresLabel = new Date(sec.premium_expires_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
          boostCard.innerHTML = `
            <span class="boost-badge">✓ Premium boost active</span>
            <h3>Featured until ${expiresLabel}</h3>
            <p style="color:var(--slate); font-size:14px; line-height:1.6;">Your profile is featured and ranked first in consultant search results.</p>
          `;
        } else {
          boostCard.innerHTML = `
            <h3>Premium boost</h3>
            <p style="color:var(--slate); font-size:14px; line-height:1.6;">£8/month for featured placement and priority ranking in consultant search results. Never gates access or your data — visibility only.</p>
            <a class="boost-cta" href="mock-checkout.html?type=premium_boost">Activate for £8/month →</a>
          `;
        }
        boostCard.style.display = 'block';

        const outcode = (sec.postcode || '').trim().split(' ')[0];
        extraRows = `
          <div class="row"><span>Region</span><span>${sec.region || '—'}</span></div>
          <div class="row"><span>Postcode area</span><span>${outcode || '—'}</span></div>
          <div class="row"><span>Willingness to travel</span><span>${sec.travel_willingness || '—'}</span></div>
          <div class="row"><span>Experience</span><span>${sec.years_experience || '—'}</span></div>
          <div class="row"><span>Private practice experience</span><span>${sec.years_private_practice || '—'}</span></div>
          <div class="row"><span>Employment status</span><span>${(sec.employment_status || []).join(', ') || '—'}</span></div>
          <div class="row"><span>Systems</span><span>${(sec.systems || []).join(', ') || '—'}</span></div>
          <div class="row"><span>Specialties</span><span>${(sec.specialties || []).join(', ') || '—'}</span></div>
          <div class="row"><span>Core skills</span><span>${(sec.core_skills || []).join(', ') || '—'}</span></div>
          <div class="row"><span>Typing speed</span><span>${sec.typing_wpm_verified != null ? `${sec.typing_wpm_verified} WPM ✓ Verified` : (sec.typing_speed || '—')}</span></div>
          <div class="row"><span>Terminology quiz</span><span>${sec.terminology_quiz_passed ? `Passed (${sec.terminology_quiz_score}%) ✓ Verified` : '—'}</span></div>
          <div class="row"><span>Training modules completed</span><span id="training-modules-row">—</span></div>
          <div class="row"><span>English fluency</span><span>${sec.english_fluency || '—'}</span></div>
          <div class="row"><span>Other languages</span><span>${[...(sec.languages_spoken || []), sec.languages_other].filter(Boolean).join(', ') || '—'}</span></div>
          <div class="row"><span>Right to work in UK</span><span>${sec.right_to_work ? 'Yes' : '—'}</span></div>
          <div class="row"><span>CV available</span><span>${sec.has_cv ? 'Yes' : 'No'}</span></div>
          <div class="row"><span>DBS certificate</span><span>${sec.has_dbs ? (sec.dbs_level || 'Yes') : 'No'}</span></div>
          <div class="row"><span>Can provide references</span><span>${sec.can_provide_references ? 'Yes' : 'No'}</span></div>
          <div class="row"><span>Work mode</span><span>${(sec.work_mode || []).join(', ') || '—'}</span></div>
          <div class="row"><span>Availability type</span><span>${(sec.availability_type || []).join(', ') || '—'}</span></div>
          <div class="row"><span>Available now</span><span>${sec.available ? 'Yes' : 'No'}</span></div>
          <div class="row"><span>Availability start date</span><span>${sec.availability_start || '—'}</span></div>
          <div class="row"><span>Days available</span><span>${(sec.daily_availability || []).join(', ') || '—'}</span></div>
          <div class="row"><span>Available evenings</span><span>${sec.available_evenings ? 'Yes' : 'No'}</span></div>
          <div class="row"><span>Available weekends</span><span>${sec.available_weekends ? 'Yes' : 'No'}</span></div>
          <div class="row"><span>Rate</span><span>${sec.rate_type === 'percentage' ? (sec.percentage_rate ? `${sec.percentage_rate}% of consultant's income` : '—') : (sec.hourly_rate_min && sec.hourly_rate_max ? `£${sec.hourly_rate_min}–£${sec.hourly_rate_max}/hour` : '—')}</span></div>
        `;
      }
    } else if (profile.role === 'consultant') {
      const { data: con } = await supabaseClient
        .from('consultant_profiles')
        .select('*')
        .eq('profile_id', userId)
        .single();
      if (con) {
        extraRows = `
          <div class="row"><span>Practice</span><span>${con.practice_name || '—'}</span></div>
          <div class="row"><span>Specialty</span><span>${con.specialty || '—'}</span></div>
          <div class="row"><span>Hospitals</span><span>${(con.hospitals || []).join(', ') || '—'}</span></div>
        `;
      }
    }

    card.innerHTML = `
      <h3>Profile details</h3>
      <div class="row"><span>Name</span><span>${profile.first_name} ${profile.last_name}</span></div>
      <div class="row"><span>Role</span><span>${profile.role}</span></div>
      <div class="row"><span>Email</span><span>${session.user.email}</span></div>
      ${extraRows}
    `;

    loading.style.display = 'none';
    card.style.display = 'block';

    if (profile.role === 'secretary') {
      const { data: results } = await supabaseClient
        .from('training_module_results')
        .select('id')
        .eq('profile_id', userId)
        .eq('quiz_passed', true);
      const row = document.getElementById('training-modules-row');
      if (row) row.textContent = `${(results || []).length} / 11`;
    }
  })();

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    window.location.href = 'login.html';
  });
</script>

<script src="../mobile-nav.js"></script>
</body>
</html>
