<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://api.resend.com https://api.stripe.com; frame-src https://js.stripe.com;">
<title>Checkout — Veyn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#1B2430; --paper:#F7F4ED; --gold:#B8924A; --slate:#5C6470; --green:#3F6B4F; --white:#FFFFFF; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--paper); color:var(--ink); font-family:'Inter', sans-serif; -webkit-font-smoothing:antialiased; }
  a{ color:inherit; text-decoration:none; }

  header{
    position:sticky; top:0; z-index:50;
    background:rgba(247,244,237,0.92); backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(27,36,48,0.08);
  }
  .nav{ display:flex; align-items:center; justify-content:space-between; padding:20px 32px; max-width:1180px; margin:0 auto; }
  .logo{ font-family:'Fraunces', serif; font-weight:600; font-size:24px; display:flex; align-items:center; gap:8px; }
  .logo .dot{ width:7px; height:7px; border-radius:50%; background:var(--gold); display:inline-block; }

  .wrap{ display:flex; align-items:center; justify-content:center; padding:64px 32px 100px; }
  .checkout-card{
    width:100%; max-width:440px; background:var(--white); border:1px solid rgba(27,36,48,0.08);
    border-radius:20px; padding:40px 36px;
  }
  h1{ font-family:'Fraunces', serif; font-weight:600; font-size:24px; margin-bottom:6px; }
  .desc{ color:var(--slate); font-size:14px; line-height:1.6; margin-bottom:28px; }

  .summary-row{ display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid rgba(27,36,48,0.08); font-size:14.5px; }
  .summary-row.total{ font-weight:700; font-size:16px; border-bottom:none; margin-bottom:24px; }

  .btn{
    font-family:'Inter', sans-serif; font-weight:600; font-size:15px; padding:14px 28px;
    border-radius:8px; cursor:pointer; border:none; width:100%; text-align:center;
    background:var(--ink); color:var(--paper); box-shadow:0 8px 20px -8px rgba(27,36,48,0.5);
    transition:transform .2s ease;
  }
  .btn:hover{ transform:translateY(-1px); }
  .btn:disabled{ opacity:0.6; cursor:not-allowed; transform:none; }

  #checkout-error{
    display:none; background:rgba(193,68,68,0.08); border:1px solid rgba(193,68,68,0.3); color:#a33;
    padding:11px 14px; border-radius:8px; font-size:13px; margin-top:16px;
  }
  .stripe-note{ text-align:center; font-size:12px; color:var(--slate); margin-top:16px; }
  .stripe-note svg{ vertical-align:middle; margin-right:4px; }
</style>
<link rel="stylesheet" href="../veyn-buttons.css"></head>
<body>

<header>
  <div class="nav">
    <a href="../index.html" class="logo"><span class="dot"></span>veyn</a>
  </div>
</header>

<div class="wrap">
  <div class="checkout-card">
    <h1 id="checkout-title">Checkout</h1>
    <p class="desc" id="checkout-desc">Loading…</p>

    <div class="summary-row">
      <span id="summary-label">Item</span>
      <span id="summary-price">—</span>
    </div>
    <div class="summary-row total">
      <span>Total due today</span>
      <span id="summary-total">—</span>
    </div>

    <button class="btn" id="pay-btn" disabled>Continue to payment</button>
    <p id="checkout-error"></p>
    <p class="stripe-note">Payments processed securely by Stripe. Veyn never sees your card details.</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0/dist/umd/supabase.js" integrity="sha384-3wY11tldQ5+yWqAvmTN4XtQvnjoTva0cV15O/O/O5NTtp0ivVopSzLOzsVXWZse9" crossorigin="anonymous"></script>
<script src="supabase-config.js"></script>
<script src="specialist-courses-data.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const type = params.get('type');

  const PASS_PLANS = {
    '2week':  { label: '2-Week Pass',  price: 75,  days: 14  },
    '1month': { label: '1-Month Pass', price: 130, days: 30  },
    '6month': { label: '6-Month Pass', price: 600, days: 182 },
  };

  let session = null;
  let checkoutPayload = null;

  (async () => {
    const { data: { session: s } } = await supabaseClient.auth.getSession();
    if (!s) { window.location.href = 'login.html'; return; }
    session = s;

    if (type === 'contact') {
      const secretaryId = params.get('secretary_id');
      const secretaryName = params.get('secretary_name') || 'this secretary';
      document.getElementById('checkout-title').textContent = 'Unlock conversation';
      document.getElementById('checkout-desc').textContent = `Unlock messaging with ${secretaryName}. No expiry on the thread — no commission if hired.`;
      document.getElementById('summary-label').textContent = `Contact unlock — ${secretaryName}`;
      document.getElementById('summary-price').textContent = '£12.00';
      document.getElementById('summary-total').textContent = '£12.00';
      document.getElementById('pay-btn').textContent = 'Pay £12.00';
      checkoutPayload = { type: 'contact', secretary_id: secretaryId, secretary_name: secretaryName };

    } else if (type === 'pass') {
      const plan = PASS_PLANS[params.get('plan')];
      if (!plan) { document.getElementById('checkout-desc').textContent = 'Unknown plan.'; return; }
      document.getElementById('checkout-title').textContent = plan.label;
      document.getElementById('checkout-desc').textContent = `Unlimited unlocks across every profile for ${plan.days} days.`;
      document.getElementById('summary-label').textContent = plan.label;
      document.getElementById('summary-price').textContent = `£${plan.price.toFixed(2)}`;
      document.getElementById('summary-total').textContent = `£${plan.price.toFixed(2)}`;
      document.getElementById('pay-btn').textContent = `Pay £${plan.price.toFixed(2)}`;
      checkoutPayload = { type: 'pass', plan: params.get('plan') };

    } else if (type === 'job_posting') {
      const draftRaw = sessionStorage.getItem('veyn_job_draft');
      if (!draftRaw) { document.getElementById('checkout-desc').textContent = 'Could not find your job details — please fill out the form again.'; return; }
      document.getElementById('checkout-title').textContent = 'Post a job';
      document.getElementById('checkout-desc').textContent = 'One posting, with unlimited messaging to anyone who responds.';
      document.getElementById('summary-label').textContent = 'Job posting bundle';
      document.getElementById('summary-price').textContent = '£29.00';
      document.getElementById('summary-total').textContent = '£29.00';
      document.getElementById('pay-btn').textContent = 'Pay £29.00';
      checkoutPayload = { type: 'job_posting', draft: JSON.parse(draftRaw) };

    } else if (type === 'premium_boost') {
      document.getElementById('checkout-title').textContent = 'Premium boost';
      document.getElementById('checkout-desc').textContent = 'Featured placement and priority ranking in consultant search results for 30 days.';
      document.getElementById('summary-label').textContent = 'Premium boost — 30 days';
      document.getElementById('summary-price').textContent = '£8.00';
      document.getElementById('summary-total').textContent = '£8.00';
      document.getElementById('pay-btn').textContent = 'Pay £8.00';
      checkoutPayload = { type: 'premium_boost' };

    } else if (type === 'specialist_course') {
      const course = SPECIALIST_COURSES[params.get('slug')];
      if (!course) { document.getElementById('checkout-desc').textContent = 'Unknown course.'; return; }
      document.getElementById('checkout-title').textContent = course.title;
      document.getElementById('checkout-desc').textContent = 'One-off purchase — yours for good. Includes the full reference course, flashcards, and quiz with a verified completion badge.';
      document.getElementById('summary-label').textContent = `${course.title} specialist course`;
      document.getElementById('summary-price').textContent = `£${course.price.toFixed(2)}`;
      document.getElementById('summary-total').textContent = `£${course.price.toFixed(2)}`;
      document.getElementById('pay-btn').textContent = `Pay £${course.price.toFixed(2)}`;
      checkoutPayload = { type: 'specialist_course', slug: course.slug, title: course.title, price: course.price };

    } else if (type === 'specialist_bundle') {
      const slugs = (params.get('slugs') || '').split(',').filter(Boolean);
      const bundleCourses = slugs.map(s => SPECIALIST_COURSES[s]).filter(Boolean);
      if (bundleCourses.length !== 3) { document.getElementById('checkout-desc').textContent = 'Invalid bundle — please go back and select exactly 3 courses.'; return; }
      document.getElementById('checkout-title').textContent = '3-course bundle';
      document.getElementById('checkout-desc').textContent = `${bundleCourses.map(c => c.title).join(', ')} — all yours for good.`;
      document.getElementById('summary-label').textContent = '3 specialist courses (bundle)';
      document.getElementById('summary-price').textContent = '£35.00';
      document.getElementById('summary-total').textContent = '£35.00';
      document.getElementById('pay-btn').textContent = 'Pay £35.00';
      checkoutPayload = { type: 'specialist_bundle', slugs };

    } else {
      document.getElementById('checkout-desc').textContent = 'Nothing to check out.';
      return;
    }

    document.getElementById('pay-btn').disabled = false;
  })();

  document.getElementById('pay-btn').addEventListener('click', async () => {
    const errorBox = document.getElementById('checkout-error');
    const payBtn = document.getElementById('pay-btn');
    errorBox.style.display = 'none';
    payBtn.disabled = true;
    payBtn.textContent = 'Redirecting to Stripe…';

    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/create-checkout-session`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${session.access_token}`,
        },
        body: JSON.stringify(checkoutPayload),
      });

      const data = await res.json();
      if (!res.ok || !data.url) {
        throw new Error(data.error || 'Could not start checkout. Please try again.');
      }

      // Clear job draft only after successfully handing off to Stripe
      if (type === 'job_posting') sessionStorage.removeItem('veyn_job_draft');

      window.location.href = data.url;
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.style.display = 'block';
      payBtn.disabled = false;
      payBtn.textContent = document.getElementById('pay-btn').dataset.label || 'Continue to payment';
    }
  });
</script>

<script src="../mobile-nav.js"></script>
<script src="../cookie-consent.js"></script>
</body>
</html>
