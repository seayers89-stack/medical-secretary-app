<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout — Veyn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

  :root{
    --ink:#1B2430;
    --paper:#F7F4ED;
    --gold:#B8924A;
    --slate:#5C6470;
    --green:#3F6B4F;
    --white:#FFFFFF;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{ color:inherit; text-decoration:none; }

  header{
    position:sticky; top:0; z-index:50;
    background:rgba(247,244,237,0.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(27,36,48,0.08);
  }
  .nav{ display:flex; align-items:center; justify-content:space-between; padding:20px 32px; max-width:1180px; margin:0 auto; }
  .logo{ font-family:'Fraunces', serif; font-weight:600; font-size:24px; display:flex; align-items:center; gap:8px; }
  .logo .dot{ width:7px; height:7px; border-radius:50%; background:var(--gold); display:inline-block; }

  .wrap{ display:flex; align-items:center; justify-content:center; padding:64px 32px 100px; }
  .checkout-card{
    width:100%; max-width:440px; background:var(--white); border:1px solid rgba(27,36,48,0.08);
    border-radius:20px; padding:40px 36px;
  }
  .mock-badge{
    display:inline-flex; align-items:center; gap:6px; font-family:'IBM Plex Mono', monospace; font-size:10.5px;
    letter-spacing:0.06em; text-transform:uppercase; color:#8F6F36; background:rgba(184,146,74,0.12);
    border:1px solid rgba(184,146,74,0.35); padding:5px 12px; border-radius:999px; margin-bottom:18px;
  }
  h1{ font-family:'Fraunces', serif; font-weight:600; font-size:24px; margin-bottom:6px; }
  .desc{ color:var(--slate); font-size:14px; line-height:1.6; margin-bottom:28px; }

  .summary-row{ display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid rgba(27,36,48,0.08); font-size:14.5px; }
  .summary-row.total{ font-weight:700; font-size:16px; }

  .field{ margin:20px 0 16px; }
  .field-row2{ display:flex; gap:12px; }
  .field-row2 .field{ flex:1; }
  .field label{ display:block; font-size:12.5px; font-weight:600; margin-bottom:6px; color:var(--ink); }
  .field input{
    width:100%; padding:11px 14px; font-family:'Inter', sans-serif; font-size:14px;
    border:1.5px solid rgba(27,36,48,0.15); border-radius:8px; background:var(--paper); color:var(--ink);
  }
  .field input:focus{ outline:none; border-color:var(--gold); }

  .btn{
    font-family:'Inter', sans-serif; font-weight:600; font-size:15px; padding:14px 28px;
    border-radius:8px; cursor:pointer; border:none; width:100%; text-align:center; margin-top:8px;
    background:var(--ink); color:var(--paper); box-shadow:0 8px 20px -8px rgba(27,36,48,0.5);
    transition:transform .2s ease;
  }
  .btn:hover{ transform:translateY(-1px); }
  .btn:disabled{ opacity:0.6; cursor:not-allowed; }

  #checkout-error{
    display:none; background:rgba(193,68,68,0.08); border:1px solid rgba(193,68,68,0.3); color:#a33;
    padding:11px 14px; border-radius:8px; font-size:13px; margin-top:16px;
  }
  .lock-note{ text-align:center; font-size:12px; color:var(--slate); margin-top:18px; }

</style>
</head>
<body>

<header>
  <div class="nav">
    <a href="../index.html" class="logo"><span class="dot"></span>veyn</a>
  </div>
</header>

<div class="wrap">
  <div class="checkout-card">
    <div class="mock-badge">⚠ Test checkout — no real charge</div>
    <h1 id="checkout-title">Checkout</h1>
    <p class="desc" id="checkout-desc">Loading…</p>

    <div class="summary-row">
      <span id="summary-label">Item</span>
      <span id="summary-price">—</span>
    </div>
    <div class="summary-row total">
      <span>Total due today</span>
      <span id="summary-total">—</span>
    </div>

    <form id="checkout-form">
      <div class="field">
        <label for="card-number">Card number</label>
        <input type="text" id="card-number" placeholder="4242 4242 4242 4242" value="4242 4242 4242 4242" required>
      </div>
      <div class="field-row2">
        <div class="field">
          <label for="card-expiry">Expiry</label>
          <input type="text" id="card-expiry" placeholder="12/30" value="12/30" required>
        </div>
        <div class="field">
          <label for="card-cvc">CVC</label>
          <input type="text" id="card-cvc" placeholder="123" value="123" required>
        </div>
      </div>
      <button type="submit" class="btn" id="pay-btn">Pay</button>
      <p id="checkout-error"></p>
    </form>
    <p class="lock-note">This is a placeholder for Stripe Checkout — no card details are sent anywhere.</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="specialist-courses-data.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const type = params.get('type');

  const PASS_PLANS = {
    '2week':  { label: '2-Week Pass',  price: 75,  days: 14 },
    '1month': { label: '1-Month Pass', price: 130, days: 30 },
    '6month': { label: '6-Month Pass', price: 600, days: 182 },
  };

  let userId = null;

  (async () => {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      window.location.href = 'login.html';
      return;
    }
    userId = session.user.id;

    if (type === 'contact') {
      const secretaryId = params.get('secretary_id');
      const secretaryName = params.get('secretary_name') || 'this secretary';
      document.getElementById('checkout-title').textContent = 'Unlock conversation';
      document.getElementById('checkout-desc').textContent = `Unlock messaging with ${secretaryName}. No expiry on the thread, no commission if hired.`;
      document.getElementById('summary-label').textContent = `Contact unlock — ${secretaryName}`;
      document.getElementById('summary-price').textContent = '£12.00';
      document.getElementById('summary-total').textContent = '£12.00';
      document.getElementById('pay-btn').textContent = 'Pay £12.00';
    } else if (type === 'pass') {
      const plan = PASS_PLANS[params.get('plan')];
      if (!plan) {
        document.getElementById('checkout-desc').textContent = 'Unknown plan.';
        return;
      }
      document.getElementById('checkout-title').textContent = plan.label;
      document.getElementById('checkout-desc').textContent = `Unlimited unlocks across every profile for ${plan.days} days.`;
      document.getElementById('summary-label').textContent = plan.label;
      document.getElementById('summary-price').textContent = `£${plan.price.toFixed(2)}`;
      document.getElementById('summary-total').textContent = `£${plan.price.toFixed(2)}`;
      document.getElementById('pay-btn').textContent = `Pay £${plan.price.toFixed(2)}`;
    } else if (type === 'job_posting') {
      document.getElementById('checkout-title').textContent = 'Post a job';
      document.getElementById('checkout-desc').textContent = 'One posting, with unlimited messaging to anyone who responds.';
      document.getElementById('summary-label').textContent = 'Job posting bundle';
      document.getElementById('summary-price').textContent = '£29.00';
      document.getElementById('summary-total').textContent = '£29.00';
      document.getElementById('pay-btn').textContent = 'Pay £29.00';
    } else if (type === 'premium_boost') {
      document.getElementById('checkout-title').textContent = 'Premium boost';
      document.getElementById('checkout-desc').textContent = 'Featured placement and priority ranking in consultant search results. Never gates access or your data — purely visibility.';
      document.getElementById('summary-label').textContent = 'Premium boost — 30 days';
      document.getElementById('summary-price').textContent = '£8.00';
      document.getElementById('summary-total').textContent = '£8.00';
      document.getElementById('pay-btn').textContent = 'Pay £8.00';
    } else if (type === 'specialist_course') {
      const course = SPECIALIST_COURSES[params.get('slug')];
      if (!course) {
        document.getElementById('checkout-desc').textContent = 'Unknown course.';
        return;
      }
      document.getElementById('checkout-title').textContent = course.title;
      document.getElementById('checkout-desc').textContent = `One-off purchase — yours for good. Includes the full reference course, flashcards, and quiz with a verified completion badge.`;
      document.getElementById('summary-label').textContent = `${course.title} specialist course`;
      document.getElementById('summary-price').textContent = `£${course.price.toFixed(2)}`;
      document.getElementById('summary-total').textContent = `£${course.price.toFixed(2)}`;
      document.getElementById('pay-btn').textContent = `Pay £${course.price.toFixed(2)}`;
    } else {
      document.getElementById('checkout-desc').textContent = 'Nothing to check out.';
    }
  })();

  document.getElementById('checkout-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById('checkout-error');
    const payBtn = document.getElementById('pay-btn');
    errorBox.style.display = 'none';
    payBtn.disabled = true;
    payBtn.textContent = 'Processing…';

    if (type === 'contact') {
      const secretaryId = params.get('secretary_id');
      const { error } = await supabaseClient.from('unlocks').insert({
        consultant_id: userId,
        secretary_id: secretaryId,
        price_paid: 12,
      });
      if (error) {
        errorBox.textContent = error.message;
        errorBox.style.display = 'block';
        payBtn.disabled = false;
        payBtn.textContent = 'Pay £12.00';
        return;
      }
      window.location.href = `thread.html?consultant_id=${userId}&secretary_id=${secretaryId}`;
    } else if (type === 'pass') {
      const plan = PASS_PLANS[params.get('plan')];
      const expires = new Date(Date.now() + plan.days * 24 * 60 * 60 * 1000).toISOString();
      const { error } = await supabaseClient
        .from('consultant_profiles')
        .update({ pass_type: params.get('plan'), pass_expires_at: expires })
        .eq('profile_id', userId);
      if (error) {
        errorBox.textContent = error.message;
        errorBox.style.display = 'block';
        payBtn.disabled = false;
        payBtn.textContent = `Pay £${plan.price.toFixed(2)}`;
        return;
      }
      window.location.href = 'profile.html?pass_active=1';
    } else if (type === 'job_posting') {
      const draftRaw = sessionStorage.getItem('veyn_job_draft');
      if (!draftRaw) {
        errorBox.textContent = 'Could not find your job details — please fill out the form again.';
        errorBox.style.display = 'block';
        payBtn.disabled = false;
        payBtn.textContent = 'Pay £29.00';
        return;
      }
      const draft = JSON.parse(draftRaw);
      const { data: job, error } = await supabaseClient
        .from('job_postings')
        .insert({
          consultant_id: userId,
          title: draft.title,
          specialty: draft.specialty,
          systems: draft.systems,
          location: draft.location,
          day_rate: draft.day_rate,
          description: draft.description,
          status: 'open',
        })
        .select()
        .single();

      if (error) {
        errorBox.textContent = error.message;
        errorBox.style.display = 'block';
        payBtn.disabled = false;
        payBtn.textContent = 'Pay £29.00';
        return;
      }

      sessionStorage.removeItem('veyn_job_draft');
      window.location.href = 'my-postings.html';
    } else if (type === 'premium_boost') {
      const expires = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString();
      const { error } = await supabaseClient
        .from('secretary_profiles')
        .update({ premium_active: true, premium_expires_at: expires })
        .eq('profile_id', userId);

      if (error) {
        errorBox.textContent = error.message;
        errorBox.style.display = 'block';
        payBtn.disabled = false;
        payBtn.textContent = 'Pay £8.00';
        return;
      }

      window.location.href = 'profile.html?boost_active=1';
    } else if (type === 'specialist_course') {
      const course = SPECIALIST_COURSES[params.get('slug')];
      const { error } = await supabaseClient.from('specialist_course_purchases').insert({
        profile_id: userId,
        course_slug: course.slug,
        price_paid: course.price,
      });
      if (error) {
        errorBox.textContent = error.message;
        errorBox.style.display = 'block';
        payBtn.disabled = false;
        payBtn.textContent = `Pay £${course.price.toFixed(2)}`;
        return;
      }
      window.location.href = `specialist-course.html?slug=${course.slug}`;
    }
  });
</script>

</body>
</html>
