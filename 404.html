<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Page not found — Veyn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#1B2430; --paper:#F7F4ED; --gold:#B8924A; --slate:#5C6470; --green:#3F6B4F; --white:#FFFFFF; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--paper); color:var(--ink); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; min-height:100vh; display:flex; flex-direction:column; }
  a{ color:inherit; text-decoration:none; }

  header{
    position:sticky; top:0; z-index:50;
    background:rgba(247,244,237,0.92); backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(27,36,48,0.08);
  }
  .nav{ display:flex; align-items:center; justify-content:space-between; padding:20px 32px; max-width:1180px; margin:0 auto; }
  .logo{ font-family:'Fraunces',serif; font-weight:600; font-size:24px; display:flex; align-items:center; gap:8px; }
  .logo .dot{ width:7px; height:7px; border-radius:50%; background:var(--gold); display:inline-block; }

  .wrap{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:64px 32px 100px; text-align:center;
  }
  .code{
    font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.14em;
    text-transform:uppercase; color:var(--gold); margin-bottom:18px;
  }
  h1{ font-family:'Fraunces',serif; font-weight:600; font-size:48px; line-height:1.1; margin-bottom:16px; }
  .sub{ color:var(--slate); font-size:16px; line-height:1.6; max-width:440px; margin:0 auto 36px; }

  .btn-group{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  .btn{
    font-family:'Inter',sans-serif; font-weight:600; font-size:14.5px; padding:12px 26px;
    border-radius:8px; cursor:pointer; border:none; transition:transform .15s;
    display:inline-block;
  }
  .btn:hover{ transform:translateY(-1px); }
  .btn-primary{ background:var(--ink); color:var(--paper); }
  .btn-outline{ background:none; border:1.5px solid rgba(27,36,48,0.2); color:var(--ink); }

  .deco{
    font-family:'Fraunces',serif; font-size:160px; font-weight:700; line-height:1;
    color:rgba(27,36,48,0.05); user-select:none; margin-bottom:-20px; letter-spacing:-4px;
  }

  footer{ background:var(--ink); color:rgba(247,244,237,0.45); padding:28px 32px; }
  .foot-bottom{ max-width:1180px; margin:0 auto; font-size:12.5px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; }
</style>
</head>
<body>

<header>
  <div class="nav">
    <a href="/" class="logo"><span class="dot"></span>veyn</a>
  </div>
</header>

<div class="wrap">
  <div class="deco">404</div>
  <div class="code">Error 404 · Page not found</div>
  <h1>This page doesn't exist.</h1>
  <p class="sub">The link may be broken, the page may have moved, or you may have mistyped the address.</p>
  <div class="btn-group">
    <a href="/" class="btn btn-primary">Go to homepage</a>
    <a href="/account/login.html" class="btn btn-outline">Log in</a>
  </div>
</div>

<footer>
  <div class="foot-bottom">
    <span>© 2026 Veyn. All rights reserved.</span>
    <span>Founded by a medical secretary, not a market gap.</span>
  </div>
</footer>

<script src="cookie-consent.js"></script>
</body>
</html>
